<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Estatísticas POLYDEV</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h2>📊 Estatísticas do Sistema</h2>

<h3 id="total">Total de downloads: 0</h3>

<h3>🏆 Top Downloads</h3>

<table border="1">
<thead>
<tr>
<th>Título</th>
<th>Categoria</th>
<th>Downloads</th>
</tr>
</thead>

<tbody id="ranking"></tbody>
</table>

<br><br>

<canvas id="grafico" width="600" height="300"></canvas>

<script>

async function carregarEstatisticas(){

    // TOTAL GERAL
    const { data: totalData } = await db
        .from("downloads")
        .select("*")

    let total = totalData ? totalData.length : 0
    document.getElementById("total").innerText = "Total de downloads: " + total

    // TOP DOWNLOADS
    const { data } = await db
        .from("conteudos")
        .select("*")
        .order("downloads", { ascending: false })
        .limit(10)

    let tabela = document.getElementById("ranking")
    tabela.innerHTML = ""

    let labels = []
    let valores = []

    if(data){
        data.forEach(item => {

            tabela.innerHTML += `
            <tr>
                <td>${item.titulo}</td>
                <td>${item.categoria}</td>
                <td>${item.downloads}</td>
            </tr>
            `

            labels.push(item.titulo)
            valores.push(item.downloads)
        })
    }

    // GRÁFICO
    const ctx = document.getElementById('grafico').getContext('2d')

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Downloads',
                data: valores
            }]
        },
        options: {
            responsive: true
        }
    })
}

// INICIALIZA
carregarEstatisticas()

</script>

</body>
</html>
