<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Top Downloads - POLYDEV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h2>Top Downloads</h2>

<table border="1">
<thead>
<tr>
<th>Título</th>
<th>Linguagem</th>
<th>Tipo</th>
<th>Downloads</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>

<script>

const { createClient } = supabase

const db = createClient(
"https://vdpucrilxzlnxxnaohdh.supabase.co",
"SUA_CHAVE"
)

async function carregarTop(){

const { data, error } = await db
.from("conteudos")
.select("*")
.order("downloads", { ascending: false })
.limit(10)

let tabela = document.getElementById("tabela")

data.forEach(item => {
tabela.innerHTML += `
<tr>
<td>${item.titulo}</td>
<td>${item.linguagem}</td>
<td>${item.tipo}</td>
<td>${item.downloads}</td>
</tr>
`
})

}

carregarTop()

</script>

</body>
</html>
