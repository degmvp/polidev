<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>POLYDEV | Top Downloads</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:yellowgreen;
    color:black;
}

header{
    background:black;
    color:#FFD700;
    text-align:center;
    padding:25px;
}

.container{
    max-width:1150px;
    margin:25px auto;
    padding:20px;
}

.card{
    background:black;
    color:white;
    border-radius:14px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 4px 12px rgba(0,0,0,.35);
}

h2{
    color:#FFD700;
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#111;
}

th,td{
    border:1px solid yellowgreen;
    padding:12px;
    text-align:left;
}

th{
    background:#222;
    color:#FFD700;
}

tr:hover{
    background:#333;
}

.ranking{
    color:#FFD700;
    font-weight:bold;
    text-align:center;
}

.destaque{
    color:#FFD700;
    font-weight:bold;
}

button{
    background:black;
    color:#FFD700;
    border:2px solid #FFD700;
    padding:10px 16px;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#FFD700;
    color:black;
}

.status{
    background:#063;
    color:white;
    padding:12px;
    border-radius:10px;
    margin-bottom:15px;
    text-align:center;
    font-weight:bold;
}

.erro{
    background:#400;
    color:white;
    padding:12px;
    border-radius:10px;
    margin-bottom:15px;
    text-align:center;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
    <h1>🏆 POLYDEV Top Downloads</h1>
    <p>Leia • Entenda • Execute seu código</p>
</header>

<div class="container">

    <button onclick="location.href='index.html'">⬅ Voltar</button>

    <div id="status" class="status">Carregando top downloads...</div>

    <div class="card">
        <h2>Ranking Geral de Conteúdos</h2>

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Título</th>
                    <th>Categoria</th>
                    <th>Downloads</th>
                    <th>Acessar</th>
                </tr>
            </thead>
            <tbody id="tbodyTop"></tbody>
        </table>
    </div>

</div>

<footer>
    POLYDEV V1.0 — Top Downloads
</footer>

<script>
const statusBox = document.getElementById("status");

function mostrarStatus(msg){
    statusBox.className = "status";
    statusBox.innerText = msg;
}

function mostrarErro(msg){
    statusBox.className = "erro";
    statusBox.innerText = msg;
    console.error(msg);
}

if(typeof SUPABASE_URL === "undefined" || typeof SUPABASE_KEY === "undefined"){
    mostrarErro("Erro: config.js não carregou SUPABASE_URL ou SUPABASE_KEY.");
} else {
    iniciar();
}

async function iniciar(){

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    const { data, error } = await db
        .from("conteudos")
        .select("id,titulo,categoria,arquivo_url,downloads")
        .order("downloads", { ascending:false });

    if(error){
        mostrarErro("Erro ao carregar dados: " + error.message);
        return;
    }

    if(!data || data.length === 0){
        mostrarErro("Nenhum conteúdo encontrado.");
        return;
    }

    montarTabela(data);
    mostrarStatus("Top downloads carregado com sucesso: " + data.length + " conteúdos.");
}

function montarTabela(lista){

    const tbody = document.getElementById("tbodyTop");
    tbody.innerHTML = "";

    lista.forEach((item, index) => {

        const downloads = Number(item.downloads || 0);
        const classeDestaque = index < 3 ? "destaque" : "";

        tbody.innerHTML += `
            <tr>
                <td class="ranking">${index + 1}</td>
                <td class="${classeDestaque}">${item.titulo || ""}</td>
                <td>${item.categoria || ""}</td>
                <td>${downloads}</td>
                <td>
                    <button onclick="abrirConteudo('${item.categoria}')">Exibir</button>
                </td>
            </tr>
        `;
    });
}

function abrirConteudo(categoria){
    location.href = "vw.html?categoria=" + categoria;
}
</script>

</body>
</html>
