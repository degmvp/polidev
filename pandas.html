<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POLYDEV | Pandas</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    font-family:Arial, Helvetica, sans-serif;
    background:yellowgreen;
    color:black;
}

header{
    background:black;
    color:#FFD700;
    padding:25px 15px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:38px;
}

header p{
    margin:8px 0 0;
    color:yellowgreen;
    font-weight:bold;
    font-size:18px;
}

.container{
    width:95%;
    max-width:1200px;
    margin:25px auto;
}

.topo-acoes{
    text-align:center;
    margin-bottom:25px;
}

button, .btn{
    background:black;
    color:#FFD700;
    border:none;
    padding:10px 18px;
    margin:5px;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
    text-decoration:none;
    display:inline-block;
}

button:hover, .btn:hover{
    background:#222;
    color:white;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
    gap:15px;
}

.card{
    background:white;
    border:2px solid black;
    border-radius:10px;
    padding:15px;
    box-shadow:4px 4px 0 black;
}

.card h3{
    margin-top:0;
    color:black;
}

.card p{
    min-height:45px;
}

pre{
    background:black;
    color:white;
    padding:20px;
    border-radius:10px;
    overflow-x:auto;
    margin-top:30px;
    text-align:left;
    white-space:pre-wrap;
    border:3px solid #FFD700;
}

footer{
    text-align:center;
    margin:30px 0;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
    <h1>🐼 POLYDEV | Pandas</h1>
    <p>Leia • Entenda • Execute seu código</p>
</header>

<div class="container">

    <div class="topo-acoes">
        <a class="btn" href="home.html">⬅ Voltar ao Menu</a>
        <button onclick="baixarArquivo('downloads/pandas/pandas.html')">⬇ Baixar Guia Completo</button>
    </div>

    <div class="grid" id="lista"></div>

    <pre id="codigo">Clique em EXIBIR para visualizar o código Pandas aqui.</pre>

</div>

<footer>
    POLYDEV | Módulo Pandas
</footer>

<script>
const programas = [
    ["pd01.py", "Criar DataFrame"],
    ["pd02.py", "Ler CSV"],
    ["pd03.py", "Salvar CSV"],
    ["pd04.py", "Selecionar colunas"],
    ["pd05.py", "Filtrar linhas"],
    ["pd06.py", "Ordenar dados"],
    ["pd07.py", "GroupBy simples"],
    ["pd08.py", "Agregações"],
    ["pd09.py", "Tratar valores nulos"],
    ["pd10.py", "Criar coluna calculada"],
    ["pd11.py", "Merge / Join"],
    ["pd12.py", "Concat"],
    ["pd13.py", "Pivot Table"],
    ["pd14.py", "Datas com to_datetime"],
    ["pd15.py", "Exportar Excel"],
    ["pd16.py", "Ler Excel"],
    ["pd17.py", "Estatísticas descritivas"],
    ["pd18.py", "Ranking / Top N"],
    ["pd19.py", "Apply / Lambda"],
    ["pd20.py", "Mini análise completa"]
];

const base = "downloads/pandas/";

function montarLista(){
    const lista = document.getElementById("lista");

    programas.forEach((item, index) => {
        const arquivo = item[0];
        const titulo = item[1];
        const caminho = base + arquivo;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h3>${String(index + 1).padStart(2, "0")} - ${titulo}</h3>
            <p><strong>Arquivo:</strong> ${arquivo}</p>
            <button onclick="exibirArquivo('${caminho}')">👁 EXIBIR</button>
            <button onclick="baixarArquivo('${caminho}')">⬇ DOWNLOAD</button>
        `;

        lista.appendChild(card);
    });
}

function exibirArquivo(caminho){
    const area = document.getElementById("codigo");

    area.textContent = "Carregando " + caminho + "...";

    fetch(caminho)
        .then(resp => {
            if(!resp.ok){
                throw new Error("Erro ao carregar: " + caminho);
            }
            return resp.text();
        })
        .then(texto => {
            area.textContent = texto;
            area.scrollIntoView({ behavior: "smooth" });
        })
        .catch(erro => {
            area.textContent = erro.message;
        });
}

function baixarArquivo(caminho){
    const link = document.createElement("a");
    link.href = caminho;
    link.download = caminho.split("/").pop();
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

montarLista();
</script>

</body>
</html>
