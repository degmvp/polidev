<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POLYDEV | Pandas</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#000;
    color:#FFD700;
}

header{
    text-align:center;
    padding:22px;
    background:#000;
    border-bottom:3px solid #FFD700;
}

header h1{
    margin:0;
    font-size:36px;
    color:#FFD700;
}

header p{
    margin:8px 0 0;
    color:yellowgreen;
    font-weight:bold;
}

.layout{
    display:grid;
    grid-template-columns:360px 1fr;
    gap:20px;
    padding:20px;
}

.menu{
    background:#111;
    border:2px solid #FFD700;
    border-radius:12px;
    padding:15px;
    height:calc(100vh - 130px);
    overflow-y:auto;
}

.menu h2{
    text-align:center;
    color:#FFD700;
    margin-top:0;
}

.item{
    background:#FFD700;
    color:#000;
    border-radius:8px;
    padding:10px;
    margin-bottom:10px;
    box-shadow:3px 3px 0 yellowgreen;
}

.item strong{
    display:block;
    margin-bottom:8px;
}

.acoes{
    display:flex;
    gap:6px;
}

button{
    border:none;
    background:#000;
    color:#FFD700;
    padding:7px 10px;
    border-radius:5px;
    font-weight:bold;
    cursor:pointer;
    font-size:13px;
}

button:hover{
    background:#333;
    color:white;
}

.area{
    background:#111;
    border:2px solid #FFD700;
    border-radius:12px;
    padding:15px;
    height:calc(100vh - 130px);
    overflow:auto;
}

.area h2{
    color:#FFD700;
    margin-top:0;
}

pre{
    background:#000;
    color:white;
    border:1px solid #FFD700;
    border-radius:8px;
    padding:18px;
    overflow:auto;
    white-space:pre-wrap;
    min-height:420px;
}

.topo{
    text-align:center;
    margin-bottom:15px;
}

.btn-topo{
    margin:4px;
}

@media(max-width:900px){
    .layout{
        grid-template-columns:1fr;
    }

    .menu,
    .area{
        height:auto;
    }
}
</style>
</head>

<body>

<header>
    <h1>🐼 POLYDEV | Pandas</h1>
    <p>Leia • Entenda • Execute seu código</p>
</header>

<div class="layout">

    <aside class="menu">
        <h2>Programas Pandas</h2>

        <div class="topo">
            <button class="btn-topo" onclick="voltarMenu()">⬅ MENU</button>
            <button class="btn-topo" onclick="mostrarGuia()">📘 GUIA</button>
        </div>

        <div id="lista"></div>
        <div class="item">
    <strong>📘 Guia Especializado</strong>
    <small>pfserie.html</small>

    <div class="acoes">
        <button type="button"
            onclick="location.href='pfserie.html'">
            ABRIR
        </button>
    </div>
</div>
    </aside>

    <main class="area">
        <h2 id="tituloArea">Área de Exibição</h2>
        <pre id="codigo">Escolha um programa no menu lateral e clique em EXIBIR.</pre>
    </main>

</div>

<script>
const base = "downloads/pandas/";

const programas = [
    ["pd01.py", "Criar DataFrame"],
    ["pd02.py", "Ler CSV"],
    ["pd03.py", "Salvar CSV"],
    ["pd04.py", "Selecionar colunas"],
    ["pd05.py", "Filtrar linhas"],
    ["pd06.py", "Ordenar dados"],
    ["pd07.py", "GroupBy simples"],
    ["pd08.py", "Agregações"],
    ["pd09.py", "Tratar valores nulos"],
    ["pd10.py", "Criar coluna calculada"],
    ["pd11.py", "Merge / Join"],
    ["pd12.py", "Concat"],
    ["pd13.py", "Pivot Table"],
    ["pd14.py", "Datas com to_datetime"],
    ["pd15.py", "Exportar Excel"],
    ["pd16.py", "Ler Excel"],
    ["pd17.py", "Estatísticas descritivas"],
    ["pd18.py", "Ranking / Top N"],
    ["pd19.py", "Apply / Lambda"],
    ["pd20.py", "Mini análise completa"]
];

function montarMenu(){
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    programas.forEach((p, i) => {
        const arquivo = p[0];
        const titulo = p[1];
        const caminho = base + arquivo;

        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <strong>${String(i + 1).padStart(2, "0")} - ${titulo}</strong>
            <small>${arquivo}</small>
            <div class="acoes">
                <button type="button" onclick="exibirArquivo('${caminho}', '${arquivo}')">EXIBIR</button>
                <button type="button" onclick="baixarArquivo('${caminho}')">BAIXAR</button>
            </div>
        `;

        lista.appendChild(div);
    });
}

function exibirArquivo(caminho, nome){
    const codigo = document.getElementById("codigo");
    const titulo = document.getElementById("tituloArea");

    titulo.textContent = "Exibindo: " + nome;
    codigo.textContent = "Carregando " + caminho + "...";

    fetch(caminho, { cache:"no-store" })
        .then(resp => {
            if(!resp.ok){
                throw new Error("Arquivo não encontrado: " + caminho);
            }
            return resp.text();
        })
        .then(texto => {
            codigo.textContent = texto;
        })
        .catch(err => {
            codigo.textContent = err.message;
        });
}

function baixarArquivo(caminho){
    const a = document.createElement("a");
    a.href = caminho;
    a.download = caminho.split("/").pop();
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

function mostrarGuia(){
    document.getElementById("tituloArea").textContent = "Guia Pandas";

    document.getElementById("codigo").textContent =
`POLYDEV | GUIA PANDAS

Este módulo reúne 20 exemplos práticos de Pandas.

Sequência:

pd01.py  → criar DataFrame
pd02.py  → ler CSV
pd03.py  → salvar CSV
pd04.py  → selecionar colunas
pd05.py  → filtrar linhas
pd06.py  → ordenar dados
pd07.py  → groupby simples
pd08.py  → agregações
pd09.py  → tratar valores nulos
pd10.py  → criar coluna calculada
pd11.py  → merge/join
pd12.py  → concat
pd13.py  → pivot_table
pd14.py  → datas com to_datetime
pd15.py  → exportar Excel
pd16.py  → ler Excel
pd17.py  → estatísticas descritivas
pd18.py  → ranking/top N
pd19.py  → apply/lambda
pd20.py  → mini análise completa

Padrão POLYDEV:
Leia • Entenda • Execute seu código`;
}

function voltarMenu(){
    window.location.href = "home.html";
}

montarMenu();
</script>

</body>
</html>
