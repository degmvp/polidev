<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>POLYDEV | Pandas</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:yellowgreen;
    color:black;
}

header{
    background:black;
    color:#FFD700;
    text-align:center;
    padding:25px;
}

header p{
    color:yellowgreen;
    font-weight:bold;
}

.container{
    width:95%;
    max-width:1200px;
    margin:25px auto;
}

.btn{
    background:black;
    color:#FFD700;
    border:none;
    padding:10px 16px;
    margin:5px;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

.btn:hover{
    background:#222;
    color:white;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:15px;
}

.card{
    background:white;
    border:2px solid black;
    border-radius:10px;
    padding:15px;
    box-shadow:4px 4px 0 black;
}

pre{
    background:black;
    color:white;
    padding:20px;
    border-radius:10px;
    overflow-x:auto;
    white-space:pre-wrap;
    margin-top:30px;
    border:3px solid #FFD700;
}

.topo{
    text-align:center;
    margin-bottom:20px;
}
</style>
</head>

<body>

<header>
    <h1>🐼 POLYDEV | Pandas</h1>
    <p>Leia • Entenda • Execute seu código</p>
</header>

<div class="container">

    <div class="topo">
        <button class="btn" onclick="voltarMenu()">⬅ VOLTAR AO MENU</button>
        <button class="btn" onclick="exibirArquivo('downloads/pandas/panda.html')">📘 EXIBIR GUIA</button>
    </div>

    <div id="lista" class="grid"></div>

    <pre id="codigo">Clique em EXIBIR para visualizar o código aqui.</pre>

</div>

<script>
const programas = [
    ["pd01.py", "Criar DataFrame"],
    ["pd02.py", "Ler CSV"],
    ["pd03.py", "Salvar CSV"],
    ["pd04.py", "Selecionar colunas"],
    ["pd05.py", "Filtrar linhas"],
    ["pd06.py", "Ordenar dados"],
    ["pd07.py", "GroupBy simples"],
    ["pd08.py", "Agregações"],
    ["pd09.py", "Tratar valores nulos"],
    ["pd10.py", "Criar coluna calculada"],
    ["pd11.py", "Merge / Join"],
    ["pd12.py", "Concat"],
    ["pd13.py", "Pivot Table"],
    ["pd14.py", "Datas com to_datetime"],
    ["pd15.py", "Exportar Excel"],
    ["pd16.py", "Ler Excel"],
    ["pd17.py", "Estatísticas descritivas"],
    ["pd18.py", "Ranking / Top N"],
    ["pd19.py", "Apply / Lambda"],
    ["pd20.py", "Mini análise completa"]
];

const base = "downloads/pandas/";

function montarLista(){
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    programas.forEach((p, i) => {
        const arquivo = p[0];
        const titulo = p[1];
        const caminho = base + arquivo;

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h3>${String(i + 1).padStart(2, "0")} - ${titulo}</h3>
            <p><b>Arquivo:</b> ${arquivo}</p>

            <button type="button" class="btn" onclick="exibirArquivo('${caminho}')">
                👁 EXIBIR
            </button>

            <button type="button" class="btn" onclick="baixarArquivo('${caminho}')">
                ⬇ BAIXAR
            </button>
        `;

        lista.appendChild(div);
    });
}

function exibirArquivo(caminho){
    const area = document.getElementById("codigo");

    area.textContent = "Carregando: " + caminho;

    fetch(caminho, { cache: "no-store" })
        .then(resp => {
            if(!resp.ok){
                throw new Error("Erro ao carregar: " + caminho);
            }
            return resp.text();
        })
        .then(texto => {
            area.textContent = texto;
            area.scrollIntoView({ behavior:"smooth" });
        })
        .catch(err => {
            area.textContent = err.message;
        });
}

function baixarArquivo(caminho){
    const a = document.createElement("a");
    a.href = caminho;
    a.setAttribute("download", caminho.split("/").pop());
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

function voltarMenu(){
    window.location.href = "home.html";
}

montarLista();
</script>

</body>
</html>
