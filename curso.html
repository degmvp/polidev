<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POLYDEV | Curso</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:navy;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

header{
    background:black;
    color:#FFD700;
    text-align:center;
    padding:20px;
    border-bottom:3px solid yellowgreen;
}

header h1{
    margin:0;
    font-size:34px;
}

header p{
    margin:8px 0 0;
    color:yellowgreen;
    font-weight:bold;
}

.info{
    max-width:1200px;
    margin:15px auto;
    background:black;
    border:2px solid yellowgreen;
    border-radius:12px;
    padding:15px;
    text-align:center;
}

.info h2{
    color:#FFD700;
    margin:5px 0;
}

.info span{
    color:lightgreen;
    font-weight:bold;
}

.container{
    max-width:1200px;
    margin:20px auto;
    display:flex;
    gap:20px;
    padding:0 15px;
}

.menu{
    width:30%;
    background:black;
    border:2px solid yellowgreen;
    border-radius:12px;
    padding:15px;
    max-height:75vh;
    overflow-y:auto;
}

.menu h3{
    color:#FFD700;
    text-align:center;
    margin-top:0;
}

.menu button{
    width:100%;
    margin:6px 0;
    padding:12px;
    background:yellowgreen;
    color:black;
    border:0;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    text-align:left;
}

.menu button:hover{
    background:#FFD700;
}

.menu button.ativo{
    background:#FFD700;
    border:2px solid white;
}

.viewer{
    width:70%;
    background:black;
    border:2px solid yellowgreen;
    border-radius:12px;
    padding:15px;
}

iframe{
    width:100%;
    height:65vh;
    border:3px solid yellowgreen;
    border-radius:10px;
    background:white;
}

.botoes{
    margin-top:12px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
}

.botoes button,
.botoes a{
    background:#FFD700;
    color:black;
    border:0;
    border-radius:8px;
    padding:10px 18px;
    font-weight:bold;
    text-decoration:none;
    cursor:pointer;
}

.botoes button:hover,
.botoes a:hover{
    background:yellowgreen;
}

.status{
    text-align:center;
    color:lightgreen;
    font-weight:bold;
    padding:20px;
}

@media(max-width:850px){
    .container{
        flex-direction:column;
    }

    .menu,
    .viewer{
        width:100%;
    }

    iframe{
        height:70vh;
    }
}
</style>
</head>

<body>

<header>
    <h1>🎓 POLYDEV Curso</h1>
    <p>Leia • Entenda • Execute seu código</p>
</header>

<section class="info">
    <h2 id="tituloCurso">Carregando curso...</h2>
    <p id="resumoCurso">Aguarde...</p>
</section>

<div class="container">

    <aside class="menu">
        <h3>Módulos do Curso</h3>
        <div id="listaModulos" class="status">Carregando módulos...</div>
    </aside>

    <main class="viewer">
        <div id="tituloModulo" class="status">Selecione um módulo</div>

        <iframe id="frameCurso"></iframe>

        <div class="botoes">
            <button onclick="anterior()">⬅ Aula anterior</button>
            <button onclick="proxima()">Próxima aula ➡</button>
            <a href="home.html">🏠 Home</a>
            <a href="javascript:history.back()">↩ Voltar</a>
        </div>
    </main>

</div>

<script>
let modulos = [];
let indiceAtual = 0;

const params = new URLSearchParams(window.location.search);
const categoria = params.get("categoria") || "pycl";
const titulo = params.get("titulo") || "Curso POLYDEV";

document.getElementById("tituloCurso").innerText = titulo;

async function carregarCurso(){

    const lista = document.getElementById("listaModulos");
    const resumo = document.getElementById("resumoCurso");

    try{
        const { data, error } = await db
            .from("conteudos")
            .select("id,titulo,categoria,arquivo_url,downloads,ativo")
            .eq("categoria", categoria)
            .eq("ativo", true)
            .order("id", { ascending:true });

        if(error){
            lista.innerHTML = "Erro ao carregar curso.";
            resumo.innerHTML = error.message;
            return;
        }

        if(!data || data.length === 0){
            lista.innerHTML = "Nenhum módulo encontrado.";
            resumo.innerHTML = "Categoria: " + categoria;
            return;
        }

        modulos = data;

        resumo.innerHTML =
            "Categoria <span>" + categoria + "</span> — Curso com <span>" +
            modulos.length + "</span> módulos/aulas.";

        montarMenu();
        abrirModulo(0);

    }catch(e){
        lista.innerHTML = "Erro inesperado.";
        resumo.innerHTML = e.message;
    }
}

function montarMenu(){
    const lista = document.getElementById("listaModulos");
    lista.innerHTML = "";

    modulos.forEach((item, index) => {
        const btn = document.createElement("button");
        btn.innerText = (index + 1).toString().padStart(2, "0") + " - " + item.titulo;
        btn.onclick = () => abrirModulo(index);
        btn.id = "modulo_" + index;
        lista.appendChild(btn);
    });
}

function abrirModulo(index){
    if(index < 0 || index >= modulos.length) return;

    indiceAtual = index;
    const item = modulos[index];

    document.getElementById("frameCurso").src = item.arquivo_url;
    document.getElementById("tituloModulo").innerHTML =
        "Módulo " + (index + 1) + " de " + modulos.length + " — " + item.titulo;

    modulos.forEach((_, i) => {
        const btn = document.getElementById("modulo_" + i);
        if(btn) btn.classList.remove("ativo");
    });

    const atual = document.getElementById("modulo_" + index);
    if(atual) atual.classList.add("ativo");
}

function anterior(){
    if(indiceAtual > 0){
        abrirModulo(indiceAtual - 1);
    }
}

function proxima(){
    if(indiceAtual < modulos.length - 1){
        abrirModulo(indiceAtual + 1);
    }
}

carregarCurso();
</script>

</body>
</html>
