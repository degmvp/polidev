<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>POLYDEV - GUIAS</title>

<style>
body{
    background:navy;
    color:white;
    font-family:Arial;
    margin:20px;
}

h1{
    color:lightgreen;
    text-align:center;
}

h2{
    color:yellowgreen;
    margin-top:20px;
}

.container{
    display:flex;
    gap:20px;
}

.menu{
    width:30%;
    background:black;
    border:1px solid yellowgreen;
    padding:15px;
    border-radius:10px;
}

.viewer{
    width:70%;
    background:white;
    border:3px solid yellowgreen;
    border-radius:10px;
}

button{
    width:100%;
    margin:6px 0;
    padding:10px;
    background:yellowgreen;
    border:0;
    font-weight:bold;
    cursor:pointer;
    border-radius:6px;
}

button:hover{
    background:lightgreen;
}

iframe{
    width:100%;
    height:700px;
    border:0;
    border-radius:10px;
}

#status{
    margin-bottom:10px;
    color:lightgreen;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>📚 POLYDEV - GUIAS</h1>

<div id="status">Escolha um guia no menu.</div>

<div class="container">

<div class="menu">
    <h2>🗄️ Bancos</h2>
    <div id="bancos"></div>

    <h2>💻 Linguagens</h2>
    <div id="linguagens"></div>
</div>

<div class="viewer">
    <iframe id="viewer"></iframe>
</div>

</div>

<script>

const BASE = "downloads";

// 🔹 BANCOS
const bancos = [
{ nome:"MySQL", arq:"html_mysql_guia.html" },
{ nome:"SQL Server", arq:"html_sqlserver_guia.html" },
{ nome:"PostgreSQL", arq:"html_postgres_guia.html" },
{ nome:"Oracle 23 Guia", arq:"html_ora23_guia.html" },
{ nome:"Oracle Backup", arq:"html_ora23_backup.html" },
{ nome:"Oracle Comandos", arq:"html_ora23_cmd.html" },
{ nome:"Oracle PL/SQL", arq:"html_ora23_pl.html" }
];

// 🔹 LINGUAGENS
const linguagens = [
{ nome:"Python", arq:"html_python_prog1.html" },
{ nome:"C++", arq:"html_cpp_prog1.html" },
{ nome:"JavaScript", arq:"html_js_prog1.html" },
{ nome:"Node.js", arq:"html_nodejs_prog1.html" },
{ nome:"Go", arq:"html_go_prog1.html" },
{ nome:"Rust", arq:"html_rust_prog1.html" },
{ nome:"Ruby", arq:"html_ruby_prog1.html" },
{ nome:"Pandas", arq:"html_pandas_prog1.html" }
];

// 🔥 ABRIR GUIA
function abrir(pasta, arquivo, nome){
    const caminho = `${BASE}/${pasta}/${arquivo}`;

    document.getElementById("viewer").src = caminho;
    document.getElementById("status").innerText = "Exibindo: " + nome;
}

// 🔧 MONTAR MENU
function montar(lista, pasta, destino){

    const area = document.getElementById(destino);

    lista.forEach(item => {

        const btn = document.createElement("button");
        btn.innerText = item.nome;

        btn.onclick = function(){
            abrir(pasta, item.arq, item.nome);
        };

        area.appendChild(btn);
    });
}

// 🚀 EXECUÇÃO
montar(bancos, "bancos", "bancos");
montar(linguagens, "linguagens", "linguagens");

</script>

</body>
</html>
