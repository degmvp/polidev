<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard POLYDEV</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
body {
    background-color: navy;
    color: white;
    font-family: Arial;
}

h1, h2 {
    color: lightgreen;
}

table {
    width: 100%;
    background: white;
    color: black;
    margin-bottom: 20px;
}

th {
    background: yellowgreen;
}

td, th {
    padding: 8px;
    text-align: center;
}
</style>

</head>

<body>

<h1>📊 Dashboard POLYDEV</h1>

<h2>Total de Downloads</h2>
<p id="total">Carregando...</p>

<h2>📁 Downloads por Categoria</h2>
<table border="1">
<thead>
<tr>
<th>Categoria</th>
<th>Total</th>
</tr>
</thead>
<tbody id="categorias"></tbody>
</table>

<h2>🏆 Top Conteúdos</h2>
<table border="1">
<thead>
<tr>
<th>Título</th>
<th>Downloads</th>
</tr>
</thead>
<tbody id="ranking"></tbody>
</table>

<script>

// 🔐 Verificar login
async function verificarUsuario() {
    const { data: { user } } = await db.auth.getUser()

    if (!user) {
        alert("Faça login primeiro")
        window.location.href = "login.html"
    }
}

// 🚀 Carregar Dashboard
async function carregarDashboard(){

    try {

        // 1. DOWNLOADS
        const { data: downloads, error: erro1 } = await db
            .from("downloads")
            .select("conteudo_id")

        if (erro1) {
            console.log("Erro downloads:", erro1)
            return
        }

        document.getElementById("total").innerText = downloads.length

        // 2. CONTEUDOS
        const { data: conteudos, error: erro2 } = await db
            .from("conteudos")
            .select("id, titulo, categoria")

        if (erro2) {
            console.log("Erro conteudos:", erro2)
            return
        }

        // 3. MAPA
        let mapa = {}
        conteudos.forEach(c => {
            mapa[c.id] = c
        })

        // 4. CONTAGEM
        let categorias = {}
        let ranking = {}

        downloads.forEach(d => {

            let c = mapa[d.conteudo_id]
            if (!c) return

            categorias[c.categoria] = (categorias[c.categoria] || 0) + 1
            ranking[c.titulo] = (ranking[c.titulo] || 0) + 1
        })

        // 5. MOSTRAR CATEGORIAS
        let tabelaCat = document.getElementById("categorias")
        tabelaCat.innerHTML = ""

        for (let cat in categorias){
            let linha = document.createElement("tr")
            linha.innerHTML = `
                <td>${cat}</td>
                <td>${categorias[cat]}</td>
            `
            tabelaCat.appendChild(linha)
        }

        // 6. MOSTRAR RANKING
        let tabelaRank = document.getElementById("ranking")
        tabelaRank.innerHTML = ""

        let ordenado = Object.entries(ranking)
            .sort((a,b)=>b[1]-a[1])

        ordenado.forEach(item => {
            let linha = document.createElement("tr")
            linha.innerHTML = `
                <td>${item[0]}</td>
                <td>${item[1]}</td>
            `
            tabelaRank.appendChild(linha)
        })

    } catch (e) {
        console.log("Erro geral:", e)
    }
}

// EXECUÇÃO
verificarUsuario()
carregarDashboard()

</script>

</body>
</html>
