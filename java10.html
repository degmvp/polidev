<style>

    overflow:auto;

    white-space:pre-wrap;

<body>

<header>
    <h1>🐉 POLYDEV | Java 10 Engineering</h1>
    <p>JVM • Performance • Security • Internals</p>
</header>

<img src="banpol.jpg" class="banner" alt="POLYDEV Banner">

<div class="layout">

    <aside class="sidebar">
        <h2>Menu Java 10</h2>
        <div id="menuJava10">Carregando módulos...</div>
    </aside>

    <main class="content">
        <h2 id="tituloConteudo">Selecione um módulo Java 10</h2>

        <div class="toolbar">
            <button class="tool-btn" onclick="copiarConteudo()">Copiar Conteúdo</button>
            <a id="downloadBtn" class="tool-btn" href="#" download>Download</a>
            <button class="tool-btn" onclick="location.href='home.html'">Voltar Home</button>
        </div>

        <div class="viewer">
            <pre id="codigo">Selecione JV10_01 a JV10_10 no menu lateral.</pre>
        </div>
    </main>

</div>

<footer>
    <img src="poly.jpg" alt="POLYDEV">
    <h2>POLYDEV</h2>
    <p>Leia • Entenda • Execute seu código</p>
</footer>

<script>
let conteudos = [];
let conteudoAtual = "";

function normalizarUrl(url){
    if(!url) return "";
    return String(url).replace(/^\/+/, "");
}

async function carregarJava10(){
    const menu = document.getElementById("menuJava10");
    const codigo = document.getElementById("codigo");

    menu.innerHTML = "Carregando módulos Java 10...";

    try{
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const { data, error } = await db
            .from("conteudos")
            .select("id,titulo,categoria,arquivo_url,downloads,ativo")
            .limit(3000);

        if(error){
            menu.innerHTML = "Erro Supabase";
            codigo.textContent = error.message;
            return;
        }

        conteudos = (data || []).filter(item =>
            String(item.categoria || "").trim().toLowerCase() === "jv10"
        );

        conteudos.sort((a,b) => String(a.titulo).localeCompare(String(b.titulo)));

        if(conteudos.length === 0){
            menu.innerHTML = "Nenhum módulo JV10 encontrado.";
            codigo.textContent = "Categoria 'jv10' não encontrada no banco.";
            return;
        }

        montarMenu();

    }catch(e){
        menu.innerHTML = "Erro geral";
        codigo.textContent = e.message;
    }
}

function montarMenu(){
    const menu = document.getElementById("menuJava10");
    menu.innerHTML = "";

    conteudos.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "menu-btn";
        btn.textContent = item.titulo;
        btn.onclick = () => abrirConteudo(item);
        menu.appendChild(btn);
    });
}

async function abrirConteudo(item){
    const url = normalizarUrl(item.arquivo_url);

    document.getElementById("tituloConteudo").textContent = item.titulo;
    document.getElementById("downloadBtn").href = url;

    try{
        const resp = await fetch(url);
        if(!resp.ok) throw new Error("Arquivo não encontrado: " + url);

        conteudoAtual = await resp.text();
        document.getElementById("codigo").textContent = conteudoAtual;
    }catch(e){
        conteudoAtual = "";
        document.getElementById("codigo").textContent = e.message;
    }
}

function copiarConteudo(){
    if(!conteudoAtual){
        alert("Nenhum conteúdo carregado.");
        return;
    }

    navigator.clipboard.writeText(conteudoAtual)
        .then(() => alert("Conteúdo copiado."))
        .catch(() => alert("Não foi possível copiar."));
}

carregarJava10();
</script>
