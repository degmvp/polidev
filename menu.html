<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>POLYDEV | Python</title>

<style>
body{
    background-color: yellowgreen;
    font-family: Arial;
    text-align: center;
    color: black;
}

h1{
    margin-top: 40px;
}

.container{
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 15px;
    max-width: 900px;
    margin: 40px auto;
}

.item{
    background: black;
    color: white;
    padding: 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

.item:hover{
    background: white;
    color: black;
}
</style>

</head>

<body>

<h1>🐍 PYTHON PROGRAMAS</h1>
<p>Leia • Entenda • Execute seu código</p>

<div class="container" id="menu"></div>

<script>

// 🔹 cria os 34 programas automaticamente
const container = document.getElementById("menu");

for(let i = 1; i <= 34; i++){

    const nome = "python_prog" + i;

    const div = document.createElement("div");
    div.className = "item";
    div.innerText = "Programa " + i;

    div.onclick = () => {
        window.location.href = "viewer_py.html?prog=" + nome;
    };

    container.appendChild(div);
}

</script>

</body>
</html>
