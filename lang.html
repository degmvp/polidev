<script>
// 🔥 CONFIG SUPABASE (USE O SEU)
const SUPABASE_URL = "https://vdpucrilxzlnxxnaohdh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcHVjcmlseHpsbnh4bmFvaGRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0OTc0NzIsImV4cCI6MjA4ODA3MzQ3Mn0.hdGtfK0eQf0-Iu_LqYqKKLvt8189euaGy-mmGMALJ_I";


async function carregarGuias(){
    const lista = document.getElementById("listaGuias");

    try{
        const url = `${SUPABASE_URL}/rest/v1/conteudos?select=id,titulo,categoria,url,downloads&categoria=eq.lang&order=id.asc`;

        const resp = await fetch(url, {
            headers:{
                "apikey": SUPABASE_KEY,
                "Authorization": "Bearer " + SUPABASE_KEY
            }
        });

        const data = await resp.json();

        if(!Array.isArray(data) || data.length === 0){
            lista.innerHTML = "<p class='status'>Nenhum guia LANG encontrado.</p>";
            return;
        }

        lista.innerHTML = "";

        data.forEach(item => {
            const btn = document.createElement("button");
            btn.textContent = item.titulo;
            btn.onclick = () => abrirGuia(item);
            lista.appendChild(btn);
        });

    }catch(erro){
        console.error("Erro ao carregar guias:", erro);
        lista.innerHTML = "<p class='status'>Erro ao carregar guias.</p>";
    }
}

function limparCaminho(urlBanco){
    if(!urlBanco) return "";

    let caminho = urlBanco.trim();

    caminho = caminho.replace("/downloads/html/bancos/", "downloads/lang/");
    caminho = caminho.replace("downloads/html/bancos/", "downloads/lang/");
    caminho = caminho.replace("/downloads/bancos/", "downloads/lang/");
    caminho = caminho.replace("downloads/bancos/", "downloads/lang/");

    if(caminho.startsWith("/")){
        caminho = caminho.substring(1);
    }

    return caminho;
}

function abrirGuia(item){
    const caminho = limparCaminho(item.url);

    if(!caminho){
        alert("Guia sem URL cadastrada.");
        return;
    }

    document.getElementById("frame").src = caminho;
}

carregarGuias();
</script>
