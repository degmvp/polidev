<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>POLYDEV - GUIAS LANG</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
    background-color:#FFD700;
    color:black;
    font-family:Arial, sans-serif;
    margin:20px;
}

h1{
    color:black;
    text-align:center;
}

h2{
    color:black;
    text-align:center;
}

#listaGuias{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:16px;
    margin-top:25px;
}

.card{
    background:black;
    border:2px solid yellowgreen;
    border-radius:12px;
    padding:14px;
    text-align:center;
    min-height:150px;
}

.card h3{
    color:#FFD700;
    margin-bottom:12px;
    font-size:18px;
}

.card p{
    color:white;
    font-size:14px;
}

button{
    padding:10px 18px;
    margin:6px;
    background:yellowgreen;
    color:black;
    border:0;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:limegreen;
}

#areaViewer{
    display:none;
    margin-top:20px;
}

#viewer{
    width:100%;
    height:650px;
    background:white;
    border:3px solid black;
    border-radius:10px;
}

.barra{
    text-align:center;
    margin-bottom:15px;
}
</style>
</head>

<body>

<h1>POLYDEV - GUIAS DE LINGUAGENS</h1>

<div id="areaLista">
    <h2>Carregando guias...</h2>
    <div id="listaGuias"></div>
</div>

<div id="areaViewer">
    <div class="barra">
        <button onclick="voltar()">⬅ Voltar</button>
        <button id="btnDownloadAtual">⬇ Download</button>
    </div>

    <iframe id="viewer"></iframe>
</div>

<script>

const SUPABASE_URL = "https://vdpucrilxzlnxxnaohdh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcHVjcmlseHpsbnh4bmFvaGRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0OTc0NzIsImV4cCI6MjA4ODA3MzQ3Mn0.hdGtfK0eQf0-Iu_LqYqKKLvt8189euaGy-mmGMALJ_I";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const BASE_URL = "https://degmvp.github.io/polidev/";

let guiaAtual = null;

function pegarNome(item){
    return item.titulo || "Guia sem título";
}

function montarUrl(item){
    if(!item.arquivo_url){
        return "";
    }

    let caminho = String(item.arquivo_url).trim();

    if(caminho.startsWith("http://") || caminho.startsWith("https://")){
        return caminho;
    }

    caminho = caminho.replace(/^\/+/, "");

    caminho = caminho.replace(/^python\//, "");
    caminho = caminho.replace(/^sql\//, "");
    caminho = caminho.replace(/^lang\//, "");

    return BASE_URL + caminho;
}

function abrirGuia(item){
    guiaAtual = item;

    const url = montarUrl(item);

    if(!url){
        return;
    }

    document.getElementById("viewer").src = url;
    document.getElementById("areaLista").style.display = "none";
    document.getElementById("areaViewer").style.display = "block";
}

function voltar(){
    document.getElementById("viewer").src = "";
    document.getElementById("areaViewer").style.display = "none";
    document.getElementById("areaLista").style.display = "block";
}

async function downloadGuia(item){
    const url = montarUrl(item);

    if(!url){
        return;
    }

    const { data, error: erroBusca } = await db
        .from("conteudos")
        .select("downloads")
        .eq("id", item.id)
        .single();

    if(erroBusca){
        alert("Erro ao consultar contador atual.");
        return;
    }

    const atual = Number(data.downloads || 0);
    const novoTotal = atual + 1;

    const { error: erroUpdate } = await db
        .from("conteudos")
        .update({ downloads: novoTotal })
        .eq("id", item.id);

    if(erroUpdate){
        alert("Erro ao incrementar download.");
        return;
    }

    item.downloads = novoTotal;

    const nomeArquivo = String(item.arquivo_url).split("/").pop();

    const a = document.createElement("a");
    a.href = url;
    a.download = nomeArquivo;
    a.target = "_blank";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

async function carregarGuias(){
    const { data, error } = await db
        .from("conteudos")
        .select("id,titulo,descricao,categoria,arquivo_url,downloads,ativo")
        .eq("categoria", "lang")
        .eq("ativo", true)
        .order("id", { ascending:true });

    if(error){
        document.querySelector("#areaLista h2").innerText = "Erro ao carregar guias";
        return;
    }

    const lista = document.getElementById("listaGuias");
    lista.innerHTML = "";

    if(!data || data.length === 0){
        document.querySelector("#areaLista h2").innerText = "Nenhum guia encontrado";
        return;
    }

    data.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        const titulo = document.createElement("h3");
        titulo.innerText = pegarNome(item);

        const info = document.createElement("p");
        info.innerText = "Downloads: " + (item.downloads || 0);

        const btnExibir = document.createElement("button");
        btnExibir.innerText = "📖 Exibir";
        btnExibir.addEventListener("click", function(){
            abrirGuia(item);
        });

        const btnDownload = document.createElement("button");
        btnDownload.innerText = "⬇ Download";
        btnDownload.addEventListener("click", function(){
            downloadGuia(item);
        });

        card.appendChild(titulo);
        card.appendChild(info);
        card.appendChild(btnExibir);
        card.appendChild(btnDownload);

        lista.appendChild(card);
    });

    document.getElementById("btnDownloadAtual").onclick = function(){
        if(guiaAtual){
            downloadGuia(guiaAtual);
        }
    };

    document.querySelector("#areaLista h2").innerText = "Selecione um guia";
}

carregarGuias();
</script>

</body>
</html>
