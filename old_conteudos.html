<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>POLYDEV - CONTEÚDOS</title>

<style>
body{
    background:navy;
    color:white;
    font-family:Arial, sans-serif;
    margin:20px;
}

h1{
    color:lightgreen;
    text-align:center;
}

h2{
    color:yellowgreen;
    text-align:center;
}

#listaGuias{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
    gap:18px;
    margin-top:25px;
}

.card{
    background:black;
    border:2px solid yellowgreen;
    border-radius:12px;
    padding:18px;
    text-align:center;
}

.card h3{
    color:lightgreen;
    margin-bottom:15px;
}

button{
    padding:10px 18px;
    margin:6px;
    background:yellowgreen;
    color:black;
    border:0;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:limegreen;
}

#areaViewer{
    display:none;
    margin-top:20px;
}

#viewer{
    width:100%;
    height:650px;
    background:white;
    border:3px solid yellowgreen;
    border-radius:10px;
}

.barra{
    text-align:center;
    margin-bottom:15px;
}
</style>
</head>

<body>

<h1>POLYDEV - GUIAS</h1>

<div id="areaLista">
    <h2>Selecione um guia para leitura ou download</h2>
    <div id="listaGuias"></div>
</div>

<div id="areaViewer">
    <div class="barra">
        <button onclick="voltar()">⬅ Voltar</button>
        <button id="btnDownloadAtual">⬇ Download</button>
    </div>

    <iframe id="viewer"></iframe>
</div>

<script>
const BASE_URL = "https://degmvp.github.io/polidev/";

let guiaAtual = null;

const dados = [
    {
        id: 1,
        nome: "Guia MySQL",
        categoria: "bancos",
        arquivo: "html_mysql_guia.html"
    }

    /*
    Adicione os outros guias aqui:

    {
        id: 2,
        nome: "Guia SQL Server",
        categoria: "bancos",
        arquivo: "html_sqlserver_guia.html"
    },
    {
        id: 3,
        nome: "Guia PostgreSQL",
        categoria: "bancos",
        arquivo: "html_postgresql_guia.html"
    }
    */
];

function montarCaminho(item){
    if(!item || !item.arquivo) return "";

    if(item.categoria === "bancos"){
        return `downloads/bancos/${item.arquivo}`;
    }

    return `downloads/${item.arquivo}`;
}

function exibirGuia(item){
    guiaAtual = item;

    const caminho = montarCaminho(item);
    const url = BASE_URL + caminho;

    console.log("ABRINDO:", url);

    document.getElementById("viewer").src = url;
    document.getElementById("areaLista").style.display = "none";
    document.getElementById("areaViewer").style.display = "block";

    document.getElementById("btnDownloadAtual").onclick = function(){
        downloadArquivo(item);
    };
}

function voltar(){
    document.getElementById("viewer").src = "";
    document.getElementById("areaViewer").style.display = "none";
    document.getElementById("areaLista").style.display = "block";
}

function downloadArquivo(item){
    const caminho = montarCaminho(item);
    const url = BASE_URL + caminho;

    console.log("DOWNLOAD:", url);

    const a = document.createElement("a");
    a.href = url;
    a.download = item.arquivo;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

function carregarGuias(){
    const lista = document.getElementById("listaGuias");
    lista.innerHTML = "";

    dados.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h3>${item.nome}</h3>
            <button onclick='exibirGuia(${JSON.stringify(item)})'>📖 Exibir</button>
            <button onclick='downloadArquivo(${JSON.stringify(item)})'>⬇ Download</button>
        `;

        lista.appendChild(card);
    });
}

carregarGuias();
</script>

</body>
</html>
