<script>
let conteudoAtual = "";

const modulos = {
m1: {
titulo: "01 - Objetivo",
texto: `POLYDEV | Security Engineering
HACK17 — Capturando Tráfego com Wireshark

Objetivo:

Analisar o tráfego de rede de forma prática usando captura de pacotes e filtros de investigação.

O foco deste artigo é entender como observar o que está passando pela rede, salvar uma captura em arquivo PCAP e depois analisar esse material no Wireshark.

Leia • Entenda • Execute seu código.`
},
m2: {
titulo: "02 - Conceitos Principais",
texto: `Conceitos principais:

- Captura de tráfego
  Processo de observar pacotes que passam por uma interface de rede.

- PCAP
  Formato de arquivo usado para armazenar pacotes capturados.

- Interface de rede
  Placa ou adaptador por onde o tráfego passa, como eth0, wlan0 ou enp0s3.

- Filtro de captura
  Define o que será salvo durante a coleta.

- Filtro de exibição
  Define o que será visualizado depois dentro do Wireshark.

Regra prática:
Capture somente o necessário e analise com filtros objetivos.`
},
m3: {
titulo: "03 - Captura com tcpdump",
texto: `Comando útil:

sudo tcpdump -i eth0 -w captura.pcap port 80 or port 443

Interpretação:

- sudo
  Executa com permissão administrativa.

- tcpdump
  Ferramenta de linha de comando para captura de pacotes.

- -i eth0
  Define a interface de rede usada na captura.

- -w captura.pcap
  Salva o tráfego capturado em um arquivo PCAP.

- port 80 or port 443
  Limita a captura a tráfego HTTP e HTTPS.

Esse arquivo pode ser aberto depois no Wireshark para análise visual.`
},
m4: {
titulo: "04 - Filtros HTTP e DNS",
texto: `Filtros importantes no Wireshark:

http

Mostra pacotes HTTP detectados.

dns

Mostra consultas e respostas DNS.

Uso prático:

- Investigar domínios acessados.
- Verificar requisições HTTP.
- Identificar endpoints chamados por uma aplicação.
- Diagnosticar problemas de resolução de nomes.

Observação:
HTTP pode exibir conteúdo em texto claro. HTTPS normalmente exige chaves de sessão para inspeção do conteúdo.`
},
m5: {
titulo: "05 - Filtros TCP e TLS",
texto: `Filtros importantes:

tcp.port == 443

Mostra tráfego TCP na porta 443, normalmente usado por HTTPS.

tls.handshake.type == 1

Mostra mensagens Client Hello do TLS.

Uso prático:

- Identificar início de conexões TLS.
- Verificar servidores acessados.
- Analisar handshakes.
- Observar SNI quando disponível.
- Diagnosticar falhas de negociação TLS.

Esse tipo de filtro ajuda a separar ruído de tráfego realmente relevante.`
},
m6: {
titulo: "06 - Buscando Credenciais",
texto: `Filtro de exemplo:

http contains "password"

Esse filtro procura a palavra "password" em tráfego HTTP.

Uso em laboratório:

- Verificar aplicações inseguras.
- Demonstrar risco de HTTP sem criptografia.
- Investigar formulários expostos.
- Confirmar vazamento de dados sensíveis.

Atenção:
Esse tipo de análise deve ser feito somente em ambiente autorizado, laboratório próprio ou rede onde você tem permissão explícita.

POLYDEV trabalha com aprendizado técnico responsável.`
},
m7: {
titulo: "07 - SSLKEYLOGFILE",
texto: `Dica avançada:

Configure a variável SSLKEYLOGFILE para permitir análise do conteúdo de conexões TLS em laboratório.

Ideia geral:

- O navegador grava chaves de sessão em um arquivo.
- O Wireshark usa esse arquivo para descriptografar conexões TLS capturadas.
- A análise passa a mostrar conteúdo que normalmente estaria protegido.

Uso típico:

- Laboratório local.
- Debug de aplicações próprias.
- Estudo de TLS.
- Diagnóstico de comunicação cliente-servidor.

Nunca use essa técnica para interceptar tráfego de terceiros sem autorização.`
},
m8: {
titulo: "08 - Resumo Técnico",
texto: `Resumo Técnico

Neste artigo, você viu:

- Como capturar tráfego com tcpdump.
- Como salvar a captura em arquivo PCAP.
- Como abrir e analisar o material no Wireshark.
- Filtros úteis para HTTP, DNS, TCP e TLS.
- Como localizar tráfego na porta 443.
- Como identificar handshakes TLS.
- Como usar SSLKEYLOGFILE em laboratório.

Comando central:

sudo tcpdump -i eth0 -w captura.pcap port 80 or port 443

POLYDEV | Security Engineering
Leia • Entenda • Execute seu código.`
}
};

function abrirConteudo(chave){
    const item = modulos[chave];
    document.getElementById("tituloConteudo").textContent = item.titulo;
    document.getElementById("codigo").textContent = item.texto;
    conteudoAtual = item.texto;
}

function copiarConteudo(){
    if(!conteudoAtual){
        conteudoAtual = document.getElementById("codigo").textContent;
    }

    navigator.clipboard.writeText(conteudoAtual)
        .then(() => alert("Conteúdo copiado."))
        .catch(() => alert("Não foi possível copiar."));
}
</script>
