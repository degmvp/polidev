<header>

<div class="container">

```
<aside class="menu">
    <h2>BBPART Scripts</h2>

```

</div>

<footer>
    <img class="footer-logo" src="poly.jpg" alt="POLYDEV">
    POLYDEV BLACK BELT | Big Data Partitioning
</footer>

<script>
let itemAtual = null;
let listaItens = [];

function normalizarUrl(url){
    if(!url) return "";

    if(url.startsWith("http://") || url.startsWith("https://")){
        return url;
    }

    if(url.startsWith("/")){
        return "https://degmvp.github.io" + url;
    }

    return "https://degmvp.github.io/polidev/" + url;
}

async function carregarProgramas(){
    const lista = document.getElementById("listaProgramas");
    lista.innerHTML = "Carregando scripts BBPART...";

    const { data, error } = await db
        .from("conteudos")
        .select("id,titulo,descricao,categoria,arquivo_url,downloads")
        .eq("categoria", "bbpart")
        .order("arquivo_url", { ascending:true });

    if(error){
        lista.innerHTML = "Erro ao consultar o banco.";
        document.getElementById("codigo").innerText = error.message;
        return;
    }

    if(!data || data.length === 0){
        lista.innerHTML = "Nenhum script encontrado na categoria bbpart.";
        return;
    }

    listaItens = data;
    lista.innerHTML = "";

    data.forEach(item => {
        const btn = document.createElement("button");
        btn.innerText = item.titulo || item.arquivo_url || "Script BBPART";
        btn.onclick = () => exibirPrograma(item);
        lista.appendChild(btn);
    });

    exibirPrograma(data[0]);
}

async function exibirPrograma(item){
    itemAtual = item;

    const titulo = item.titulo || "Script BBPART";
    const url = normalizarUrl(item.arquivo_url);

    document.getElementById("tituloArquivo").innerText = titulo;
    document.getElementById("descricaoArquivo").innerText = item.descricao || "";
    document.getElementById("codigo").innerText = "Carregando código...";

    try{
        const resposta = await fetch(url + "?v=" + Date.now());

        if(!resposta.ok){
            throw new Error("HTTP " + resposta.status);
        }

        const texto = await resposta.text();
        document.getElementById("codigo").innerText = texto;

    }catch(e){
        document.getElementById("codigo").innerText =
            "Erro ao abrir:\n" + url + "\n\n" + e.message;
    }
}

async function incrementarDownload(item){
    const atual = Number(item.downloads || 0);
    const novoTotal = atual + 1;

    const { error } = await db
        .from("conteudos")
        .update({ downloads: novoTotal })
        .eq("id", item.id);

    if(!error){
        item.downloads = novoTotal;
    }
}

async function baixar(){
    if(!itemAtual){
        alert("Selecione primeiro um script BBPART.");
        return;
    }

    const url = normalizarUrl(itemAtual.arquivo_url);

    await incrementarDownload(itemAtual);

    const link = document.createElement("a");
    link.href = url;
    link.download = url.split("/").pop();
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

carregarProgramas();
</script>
