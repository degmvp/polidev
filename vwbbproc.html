<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POLYDEV BLACK BELT | SQL Procedures</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Consolas, Arial, sans-serif;
    background-color:#050505;
    color:#FFD700;
    padding:20px;
}

.container{
    max-width:1400px;
    margin:auto;
}

header{
    text-align:center;
    margin-bottom:30px;
}

header h1{
    font-size:42px;
    color:#FFD700;
    margin-bottom:10px;
}

header p{
    color:yellowgreen;
    font-size:18px;
}

.topo{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:30px;
    flex-wrap:wrap;
}

.btn{
    background:#111;
    color:#FFD700;
    border:1px solid #FFD700;
    padding:12px 22px;
    text-decoration:none;
    border-radius:8px;
    transition:0.3s;
    font-weight:bold;
}

.btn:hover{
    background:#FFD700;
    color:#000;
    transform:scale(1.05);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

.card{
    background:#0b0b0b;
    border:1px solid #333;
    border-left:5px solid #FFD700;
    border-radius:10px;
    padding:20px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    border-color:#FFD700;
    box-shadow:0 0 15px rgba(255,215,0,0.3);
}

.card h2{
    color:#FFD700;
    margin-bottom:10px;
    font-size:22px;
}

.card p{
    color:#ccc;
    margin-bottom:18px;
    line-height:1.5;
}

.acoes{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

footer{
    margin-top:50px;
    text-align:center;
    color:#777;
    font-size:14px;
}

.sqltag{
    color:yellowgreen;
    font-size:14px;
    margin-bottom:10px;
    display:block;
}

</style>

</head>

<body>

<div class="container">

<header>
    <h1>POLYDEV BLACK BELT</h1>
    <p>SQL Engineering Procedures | Jack of All Trades Engineering Lab</p>
</header>

<div class="topo">
    <a class="btn" href="home.html">⬅ Home</a>
    <a class="btn" href="blackbelt.html">⚔ BLACK BELT</a>
    <a class="btn" href="#">📘 Guia SQL Engineering</a>
</div>

<div class="grid" id="conteudos"></div>

<footer>
    POLYDEV BLACK BELT | SQL ENGINEERING PROCEDURES
</footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="config.js"></script>

<script>

async function carregarProcedures(){

    const container = document.getElementById("conteudos");

    container.innerHTML = `
        <div class="card">
            <h2>Carregando Procedures...</h2>
        </div>
    `;

    try{

        const response = await fetch(
            `${SUPABASE_URL}/rest/v1/conteudos?categoria=eq.bbproc&select=*`,
            {
                headers:{
                    apikey: SUPABASE_KEY,
                    Authorization:`Bearer ${SUPABASE_KEY}`
                }
            }
        );

        const dados = await response.json();

        container.innerHTML = "";

        if(!dados || dados.length === 0){

            container.innerHTML = `
                <div class="card">
                    <h2>Nenhuma Procedure Encontrada</h2>
                    <p>A categoria bbproc ainda não possui registros.</p>
                </div>
            `;

            return;
        }

        dados.forEach(item => {

            const card = document.createElement("div");

            card.className = "card";

            card.innerHTML = `
            
                <span class="sqltag">SQL ENGINEERING PROCEDURE</span>

                <h2>${item.titulo}</h2>

                <p>${item.descricao || 'Procedure BLACK BELT SQL Engineering.'}</p>

                <div class="acoes">
                    <a class="btn"
                       href="./viewer_bbproc.html?arquivo=${encodeURIComponent(item.arquivo_url)}">
                            👁 Exibir
                    </a>

                    <a class="btn"
                       href="${item.arquivo_url}"
                       download>
                       ⬇ Download
                    </a>

                </div>
            `;

            container.appendChild(card);

        });

    }
    catch(erro){

        container.innerHTML = `
            <div class="card">
                <h2>Erro ao carregar</h2>
                <p>${erro.message}</p>
            </div>
        `;

        console.error(erro);

    }

}

carregarProcedures();

</script>

</body>
</html>
