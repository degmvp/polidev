<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POLYDEV | Ubuntu Engineering</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
*{ box-sizing:border-box; }

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#000;
    color:#FFD700;
}

header{
    text-align:center;
    padding:24px;
    border-bottom:3px solid #E95420;
}

header h1{
    margin:0;
    font-size:34px;
    color:#E95420;
}

header p{
    color:yellowgreen;
    font-size:18px;
    font-weight:bold;
}

.banner{
    width:55%;
    max-width:700px;
    display:block;
    margin:18px auto 28px auto;
    border:2px solid #E95420;
    border-radius:8px;
}

.layout{
    display:grid;
    grid-template-columns:320px 1fr;
    gap:25px;
    width:96%;
    margin:auto;
}

.sidebar{
    border-right:3px solid #E95420;
    padding:15px;
}

.sidebar h2{
    color:#E95420;
    margin-top:0;
}

.menu-btn{
    width:100%;
    display:block;
    margin:10px 0;
    padding:14px;
    background:#111;
    color:#FFD700;
    border:1px solid #E95420;
    border-radius:8px;
    text-align:left;
    font-weight:bold;
    cursor:pointer;
}

.menu-btn:hover{
    background:#E95420;
    color:#000;
}

.content{
    padding:15px;
}

.content h2{
    color:#FFD700;
    font-size:28px;
}

.toolbar{
    margin-bottom:15px;
}

.tool-btn{
    padding:10px 14px;
    margin-right:8px;
    background:#E95420;
    color:#000;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
    text-decoration:none;
}

.tool-btn:hover{
    background:#FFD700;
}

.viewer{
    background:#0b1a00;
    color:#fff;
    border:2px solid #E95420;
    border-radius:10px;
    padding:20px;
    min-height:620px;
    overflow:auto;
}

pre{
    white-space:pre-wrap;
    word-wrap:break-word;
    font-size:15px;
    line-height:1.45;
    margin:0;
}

footer{
    text-align:center;
    margin-top:40px;
    padding:28px;
    border-top:3px solid #E95420;
    color:yellowgreen;
    font-weight:bold;
}

footer img{
    width:110px;
    height:110px;
    border-radius:50%;
    border:4px solid #E95420;
}

@media(max-width:850px){
    .layout{
        grid-template-columns:1fr;
    }

    .sidebar{
        border-right:none;
        border-bottom:3px solid #E95420;
    }

    .banner{
        width:90%;
    }
}
</style>
</head>

<body>

<header>
    <h1>🐧 POLYDEV | Ubuntu Engineering</h1>
    <p>Linux Administration • Infrastructure • Professional Operations</p>
</header>

<img src="banpol.jpg" class="banner" alt="POLYDEV Banner">

<div class="layout">

    <aside class="sidebar">
        <h2>Menu Ubuntu</h2>
        <div id="menuUbuntu">Carregando módulos...</div>
    </aside>

    <main class="content">
        <h2 id="tituloConteudo">Selecione um módulo Ubuntu</h2>

        <div class="toolbar">
            <button class="tool-btn" onclick="copiarConteudo()">Copiar Conteúdo</button>
            <a id="downloadBtn" class="tool-btn" href="#" download>Download</a>
            <button class="tool-btn" onclick="location.href='home.html'">Voltar Home</button>
        </div>

        <div class="viewer">
            <pre id="codigo">Escolha UBU01 a UBU09 no menu lateral.</pre>
        </div>
    </main>

</div>

<footer>
    <img src="poly.jpg" alt="POLYDEV">
    <h2>POLYDEV</h2>
    <p>Leia • Entenda • Execute seu código</p>
</footer>

<script>

let conteudos = [];
let conteudoAtual = "";

function normalizarUrl(url){
    if(!url) return "";
    return String(url).replace(/^\/+/, "");
}
async function carregarUbuntu(){
    const menu = document.getElementById("menuUbuntu");
    const codigo = document.getElementById("codigo");

    menu.innerHTML = "Diagnosticando...";
    codigo.textContent = "Iniciando diagnóstico Ubuntu Viewer...";

    try{
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const { data, error } = await db
            .from("conteudos")
            .select("id,titulo,categoria,arquivo_url,downloads,ativo")
            .limit(2000);

        if(error){
            menu.innerHTML = "Erro Supabase.";
            codigo.textContent = error.message;
            return;
        }

        const total = data ? data.length : 0;

        const categorias = [...new Set((data || []).map(x =>
            String(x.categoria || "").trim().toLowerCase()
        ))].sort();

        conteudos = (data || []).filter(item =>
            String(item.categoria || "").trim().toLowerCase() === "ubu"
        );

        conteudos.sort((a,b) => String(a.titulo).localeCompare(String(b.titulo)));

        codigo.textContent =
            "Registros lidos: " + total + "\n" +
            "Categorias encontradas:\n" + categorias.join("\n") + "\n\n" +
            "Registros categoria ubu: " + conteudos.length;

        montarMenu();

    }catch(e){
        menu.innerHTML = "Erro geral.";
        codigo.textContent = e.message;
    }
}

function montarMenu(){
    const menu = document.getElementById("menuUbuntu");
    menu.innerHTML = "";

    if(conteudos.length === 0){
        menu.innerHTML = "Nenhum módulo Ubuntu encontrado.";
        return;
    }

    conteudos.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "menu-btn";
        btn.textContent = item.titulo;
        btn.onclick = () => abrirConteudo(item);
        menu.appendChild(btn);
    });
}

async function abrirConteudo(item){
    const url = normalizarUrl(item.arquivo_url);

    document.getElementById("tituloConteudo").textContent = item.titulo;
    document.getElementById("downloadBtn").href = url;

    try{
        const resp = await fetch(url);
        if(!resp.ok) throw new Error("Arquivo não encontrado: " + url);

        conteudoAtual = await resp.text();
        document.getElementById("codigo").textContent = conteudoAtual;
    }catch(e){
        conteudoAtual = "";
        document.getElementById("codigo").textContent = e.message;
    }
}

function copiarConteudo(){
    if(!conteudoAtual){
        alert("Nenhum conteúdo carregado.");
        return;
    }

    navigator.clipboard.writeText(conteudoAtual)
        .then(() => alert("Conteúdo copiado."))
        .catch(() => alert("Não foi possível copiar."));
}

carregarUbuntu();
</script>

</body>
</html>
