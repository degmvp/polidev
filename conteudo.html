<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Conteúdo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h2>Conteúdo</h2>
<div id="conteudo">Carregando...</div>

<script>
alert("JS carregou");
const { createClient } = supabase

const db = createClient(
"https://vdpucrilxzlnxxnaohdh.supabase.co",
"sb_publishable_iCOZMw9xc0QZaGQWTHdxMQ_O33nfE42"
)

const params = new URLSearchParams(window.location.search)
const id = params.get("id")

// Se não tiver ID, não consulta o banco
if(!id){
document.getElementById("conteudo").innerHTML =
"<h3>Nenhum conteúdo selecionado</h3>"
}else{
carregar()
}

async function carregar(){

const { data, error } = await db
.from("conteudos")
.select("*")
.eq("id", parseInt(id))
.single()

if(error){
document.getElementById("conteudo").innerText =
"Erro: " + error.message
return
}

document.getElementById("conteudo").innerHTML = `
<h3>${data.titulo}</h3>
<p>Categoria: ${data.categoria}</p>
<p>${data.descricao}</p>
<p>Downloads: ${data.downloads}</p>

<a href="${data.arquivo_url}" target="_blank">
<button>Download</button>
</a>
`
}

</script>

</body>
</html>
