<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POLYDEV BLACK BELT | SQL Viewer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    color:#FFD700;
    font-family:Consolas, Arial, sans-serif;
    padding:20px;
}

.container{
    max-width:1400px;
    margin:auto;
}

header{
    text-align:center;
    margin-bottom:25px;
}

header h1{
    font-size:40px;
    color:#FFD700;
    margin-bottom:10px;
}

header p{
    color:yellowgreen;
    font-size:18px;
}

.topo{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:25px;
}

.btn{
    background:#111;
    color:#FFD700;
    border:1px solid #FFD700;
    padding:12px 22px;
    text-decoration:none;
    border-radius:8px;
    transition:0.3s;
    font-weight:bold;
    cursor:pointer;
}

.btn:hover{
    background:#FFD700;
    color:#000;
    transform:scale(1.05);
}

.viewer{
    background:#0b0b0b;
    border:1px solid #333;
    border-left:5px solid #FFD700;
    border-radius:10px;
    padding:25px;
    overflow:auto;
    min-height:500px;
}

pre{
    color:#00ff66;
    white-space:pre-wrap;
    word-wrap:break-word;
    line-height:1.5;
    font-size:15px;
}

footer{
    text-align:center;
    margin-top:40px;
    color:#777;
    font-size:14px;
}

.info{
    color:yellowgreen;
    margin-bottom:15px;
}

</style>

</head>

<body>

<div class="container">

<header>
    <h1>POLYDEV BLACK BELT</h1>
    <p>SQL ENGINEERING VIEWER</p>
</header>

<div class="topo">

    <a class="btn" href="vwbbproc.html">
        ⬅ Voltar
    </a>

    <a class="btn" href="home.html">
        🏠 Home
    </a>

</div>

<div class="viewer">

    <div class="info" id="arquivoInfo">
        Carregando arquivo...
    </div>

    <pre id="conteudo"></pre>

</div>

<footer>
    POLYDEV BLACK BELT | SQL ENGINEERING VIEWER
</footer>

</div>

<script>

async function carregarArquivo(){

    const params = new URLSearchParams(window.location.search);

    const arquivo = params.get("arquivo");

    const conteudo = document.getElementById("conteudo");

    const info = document.getElementById("arquivoInfo");

    if(!arquivo){

        info.innerHTML = "Arquivo não informado.";

        return;
    }

    info.innerHTML = `Arquivo: ${arquivo}`;

    try{

        const response = await fetch(arquivo);

        const texto = await response.text();

        conteudo.textContent = texto;

    }
    catch(erro){

        conteudo.textContent =
            "Erro ao carregar arquivo:\n\n" + erro.message;

        console.error(erro);

    }

}

carregarArquivo();

</script>

</body>
</html>
