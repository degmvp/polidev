<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin POLYDEV</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

</head>

<body>

<script>
if(localStorage.getItem("logado") !== "sim"){
    alert("Acesso negado")
    window.location.href = "login.html"
}
</script>

<h2>Administração de Conteúdos</h2>

<button onclick="logout()">Sair</button>

<br><br>

<input type="text" id="titulo" placeholder="Título"><br><br>
<input type="text" id="categoria" placeholder="Categoria"><br><br>

<input type="file" id="arquivo"><br><br>

<button id="btnSalvar">Salvar</button>

<p id="msg"></p>

<h3>Conteúdos cadastrados</h3>

<table border="1">
<thead>
<tr>
<th>ID</th>
<th>Título</th>
<th>Categoria</th>
<th>Downloads</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>
</table>

<script>

// 🔥 CARREGAR LISTA
async function carregar(){

    const { data, error } = await db
        .from("conteudos")
        .select("*")
        .order("downloads", { ascending: false })

    console.log("DATA:", data)
    console.log("ERROR:", error)

    let tabela = document.getElementById("lista")
    tabela.innerHTML = ""

    if(error){
        tabela.innerHTML = `<tr><td colspan="5">Erro ao carregar</td></tr>`
        return
    }

    if(!data || data.length === 0){
        tabela.innerHTML = `<tr><td colspan="5">Nenhum registro encontrado</td></tr>`
        return
    }

    data.forEach(item => {

        let botaoExcluir = item.downloads > 0
            ? `<button disabled>Excluir</button>`
            : `<button onclick="excluir(${item.id})">Excluir</button>`

        tabela.innerHTML += `
        <tr>
            <td>${item.id}</td>
            <td>${item.titulo}</td>
            <td>${item.categoria}</td>
            <td>${item.downloads}</td>
            <td>
                <button onclick="window.open('${item.arquivo_url}')">Abrir</button>
                <button onclick="editar(${item.id}, \`${item.titulo}\`, \`${item.categoria}\`, \`${item.arquivo_url}\`)">Editar</button>
                ${botaoExcluir}
            </td>
        </tr>
        `
    })
}

// 🔥 INSERIR OU ATUALIZAR
async function salvar(){

    let id = document.getElementById("titulo").dataset.id
    let titulo = document.getElementById("titulo").value
    let categoria = document.getElementById("categoria").value

    // 🔵 UPDATE (não precisa arquivo)
    if(id){

        const { error } = await db
            .from("conteudos")
            .update({
                titulo: titulo,
                categoria: categoria
            })
            .eq("id", id)

        if(error){
            alert("Erro ao atualizar")
        } else {
            alert("Atualizado com sucesso")
            limpar()
            carregar()
        }

        return
    }

    // 🔴 INSERT (com upload)
    let file = document.getElementById("arquivo").files[0]

    if(!file){
        alert("Selecione um arquivo")
        return
    }

    let nomeArquivo = Date.now() + "_" + file.name

    const { error: uploadError } = await db.storage
        .from("downloads")
        .upload(nomeArquivo, file)

    if(uploadError){
        console.log(uploadError)
        alert("Erro no upload")
        return
    }

    const { data } = db.storage
        .from("downloads")
        .getPublicUrl(nomeArquivo)

    let url = data.publicUrl

    const { error } = await db
        .from("conteudos")
        .insert([
            {
                titulo: titulo,
                categoria: categoria,
                arquivo_url: url,
                downloads: 0
            }
        ])

    if(error){
        alert("Erro ao salvar")
    } else {
        alert("Inserido com sucesso")
        limpar()
        carregar()
    }
}

// 🔥 EDITAR
function editar(id, titulo, categoria, url){

    document.getElementById("titulo").value = titulo
    document.getElementById("categoria").value = categoria
    document.getElementById("arquivo").value = ""

    document.getElementById("titulo").dataset.id = id
}

// 🔥 EXCLUIR
async function excluir(id){

    if(!confirm("Deseja excluir?")) return

    const { error } = await db
        .from("conteudos")
        .delete()
        .eq("id", id)

    if(error){

        if(error.message.includes("foreign key")){
            alert("Não pode excluir: possui downloads")
        } else {
            alert("Erro ao excluir")
        }

    } else {
        alert("Excluído com sucesso")
        carregar()
    }
}

// 🔥 LIMPAR
function limpar(){
    document.getElementById("titulo").value = ""
    document.getElementById("categoria").value = ""
    document.getElementById("arquivo").value = ""
    delete document.getElementById("titulo").dataset.id
}

// 🔥 LOGOUT
function logout(){
    localStorage.removeItem("logado")
    window.location.href = "login.html"
}

// 🔥 BOTÃO
document.getElementById("btnSalvar").onclick = salvar

// 🔥 INIT
carregar()

</script>

</body>
</html>
