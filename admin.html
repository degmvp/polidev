<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin POLYDEV</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

</head>

<body>

<script>
if(localStorage.getItem("logado") !== "sim"){
    alert("Acesso negado")
    window.location.href = "login.html"
}
</script>

<h2>Administração de Conteúdos</h2>

<button onclick="logout()">Sair</button>

<br><br>

<input type="text" id="titulo" placeholder="Título"><br><br>
<input type="text" id="categoria" placeholder="Categoria"><br><br>

<!-- 🔥 NOVO: upload -->
<input type="file" id="arquivo"><br><br>

<button id="btnSalvar">Enviar e Salvar</button>

<p id="msg"></p>

<h3>Conteúdos cadastrados</h3>

<table border="1">
<thead>
<tr>
<th>ID</th>
<th>Título</th>
<th>Categoria</th>
<th>Downloads</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>
</table>

<script>

// UPLOAD + INSERT
async function inserir(){

    let titulo = document.getElementById("titulo").value
    let categoria = document.getElementById("categoria").value
    let file = document.getElementById("arquivo").files[0]

    if(!file){
        alert("Selecione um arquivo")
        return
    }

    let nomeArquivo = Date.now() + "_" + file.name

    // 🔥 UPLOAD
    const { error: uploadError } = await db.storage
        .from("downloads")
        .upload(nomeArquivo, file)

    if(uploadError){
        console.log(uploadError)
        alert("Erro no upload")
        return
    }

    // 🔥 PEGAR URL
    const { data } = db.storage
        .from("downloads")
        .getPublicUrl(nomeArquivo)

    let url = data.publicUrl

    // 🔥 SALVAR NO BANCO
    const { error } = await db
        .from("conteudos")
        .insert([
            {
                titulo: titulo,
                categoria: categoria,
                arquivo_url: url,
                downloads: 0
            }
        ])

    if(error){
        alert("Erro ao salvar")
    } else {
        alert("Upload realizado com sucesso")
        limpar()
        carregar()
    }
}

// RESTO DO SISTEMA (igual antes)

// CARREGAR
async function carregar(){

    const { data } = await db
        .from("conteudos")
        .select("*")
        .order("downloads", { ascending: false })

    let tabela = document.getElementById("lista")
    tabela.innerHTML = ""

    if(data){
        data.forEach(item => {

            let botaoExcluir = item.downloads > 0
                ? `<button disabled>Excluir</button>`
                : `<button onclick="excluir(${item.id})">Excluir</button>`

            tabela.innerHTML += `
            <tr>
                <td>${item.id}</td>
                <td>${item.titulo}</td>
                <td>${item.categoria}</td>
                <td>${item.downloads}</td>
            <td>
            <button onclick="window.open('${item.arquivo_url}')">Abrir</button>
            <button onclick="editar(${item.id}, '${item.titulo}', '${item.categoria}', '${item.arquivo_url}')">Editar</button>
            ${botaoExcluir}
            </td>
            </tr>
            `
        })
    }
}

// EXCLUIR
async function excluir(id){

    if(!confirm("Excluir?")) return

    const { error } = await db
        .from("conteudos")
        .delete()
        .eq("id", id)

    if(error){
        alert("Erro ao excluir")
    } else {
        carregar()
    }
}

// LIMPAR
function limpar(){
    document.getElementById("titulo").value = ""
    document.getElementById("categoria").value = ""
    document.getElementById("arquivo").value = ""
}

// LOGOUT
function logout(){
    localStorage.removeItem("logado")
    window.location.href = "login.html"
}

// BOTÃO
document.getElementById("btnSalvar").onclick = inserir

// INIT
carregar()

</script>

</body>
</html>
