<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin POLYDEV</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

</head>

<body>

<!-- 🔒 PROTEÇÃO (SOMENTE AQUI) -->
<script>
if(localStorage.getItem("logado") !== "sim"){
    alert("Acesso negado")
    window.location.href = "login.html"
}
</script>

<h2>Administração de Conteúdos</h2>

<button onclick="logout()">Sair</button>

<br><br>

<input type="text" id="titulo" placeholder="Título"><br><br>
<input type="text" id="categoria" placeholder="Categoria"><br><br>
<input type="text" id="url" placeholder="URL do arquivo"><br><br>

<button onclick="inserir()">Inserir</button>

<p id="msg"></p>
<h3>Conteúdos cadastrados</h3>

<table border="1">
<thead>
<tr>
<th>ID</th>
<th>Título</th>
<th>Categoria</th>
<th>Downloads</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>
</table>
<script>

// CARREGAR LISTA
async function carregar(){

    const { data, error } = await db
        .from("conteudos")
        .select("*")
        .order("id", { ascending: true })

    let tabela = document.getElementById("lista")
    tabela.innerHTML = ""

    data.forEach(item => {
        tabela.innerHTML += `
        <tr>
            <td>${item.id}</td>
            <td>${item.titulo}</td>
            <td>${item.categoria}</td>
            <td>${item.downloads}</td>
            <td>
                <button onclick="editar(${item.id}, '${item.titulo}', '${item.categoria}', '${item.arquivo_url}')">Editar</button>
                <button onclick="excluir(${item.id})">Excluir</button>
            </td>
        </tr>
        `
    })
}

// INSERIR
async function inserir(){

    let titulo = document.getElementById("titulo").value
    let categoria = document.getElementById("categoria").value
    let url = document.getElementById("url").value

    const { error } = await db
        .from("conteudos")
        .insert([
            {
                titulo: titulo,
                categoria: categoria,
                arquivo_url: url,
                downloads: 0
            }
        ])

    if(error){
        alert("Erro ao inserir")
    } else {
        alert("Inserido com sucesso")
        carregar()
    }
}

// EXCLUIR
async function excluir(id){

    if(!confirm("Deseja excluir?")) return

    const { error } = await db
        .from("conteudos")
        .delete()
        .eq("id", id)

    if(error){
        console.log(error)
        alert("Erro ao excluir")
    } else {
        alert("Excluído com sucesso")
        carregar()
    }
}
// EDITAR (preenche o formulário)
function editar(id, titulo, categoria, url){

    document.getElementById("titulo").value = titulo
    document.getElementById("categoria").value = categoria
    document.getElementById("url").value = url

    // guarda id para update
    document.getElementById("titulo").dataset.id = id
}

// ATUALIZAR
async function atualizar(){

    let id = document.getElementById("titulo").dataset.id

    let titulo = document.getElementById("titulo").value
    let categoria = document.getElementById("categoria").value
    let url = document.getElementById("url").value

    const { error } = await db
        .from("conteudos")
        .update({
            titulo: titulo,
            categoria: categoria,
            arquivo_url: url
        })
        .eq("id", id)

    if(error){
        alert("Erro ao atualizar")
    } else {
        alert("Atualizado com sucesso")
        limpar()
        carregar()
    }
}

// LIMPAR FORM
function limpar(){
    document.getElementById("titulo").value = ""
    document.getElementById("categoria").value = ""
    document.getElementById("url").value = ""
    delete document.getElementById("titulo").dataset.id
}

// LOGOUT
function logout(){
    localStorage.removeItem("logado")
    window.location.href = "login.html"
}

// ALTERAR BOTÃO DINAMICAMENTE
document.querySelector("button[onclick='inserir()']").onclick = function(){

    let id = document.getElementById("titulo").dataset.id

    if(id){
        atualizar()
    } else {
        inserir()
    }
}

// INICIALIZA
carregar()

</script>
</body>
</html>
