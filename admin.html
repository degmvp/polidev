<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin POLYDEV</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

</head>

<body>

<!-- 🔒 PROTEÇÃO (SOMENTE AQUI) -->
<script>
if(localStorage.getItem("logado") !== "sim"){
    alert("Acesso negado")
    window.location.href = "login.html"
}
</script>

<h2>Administração de Conteúdos</h2>

<button onclick="logout()">Sair</button>

<br><br>

<input type="text" id="titulo" placeholder="Título"><br><br>
<input type="text" id="categoria" placeholder="Categoria"><br><br>
<input type="text" id="url" placeholder="URL do arquivo"><br><br>

<button onclick="inserir()">Inserir</button>

<p id="msg"></p>

<script>

async function inserir(){

    let titulo = document.getElementById("titulo").value
    let categoria = document.getElementById("categoria").value
    let url = document.getElementById("url").value

    const { error } = await db
        .from("conteudos")
        .insert([
            {
                titulo: titulo,
                categoria: categoria,
                arquivo_url: url,
                downloads: 0
            }
        ])

    if(error){
        document.getElementById("msg").innerText = "Erro ao inserir"
    } else {
        document.getElementById("msg").innerText = "Inserido com sucesso"
    }
}

function logout(){
    localStorage.removeItem("logado")
    window.location.href = "login.html"
}

</script>

</body>
</html>
