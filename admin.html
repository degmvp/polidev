<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Admin - POLYDEV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

</head>

<body>
<script>

let status = localStorage.getItem("logado")

if(status !== "sim"){
    alert("Acesso negado")
    window.location.href = "login.html"
}

</script>

<h2>Administração - Inserir Conteúdo</h2>

<label>Título:</label><br>
<input type="text" id="titulo"><br><br>

<label>Descrição:</label><br>
<textarea id="descricao"></textarea><br><br>

<label>Categoria:</label><br>
<select id="categoria">
  <option value="python">Python</option>
  <option value="sql">SQL</option>
  <option value="html">HTML</option>
</select><br><br>

<label>URL do Arquivo:</label><br>
<input type="text" id="arquivo"><br><br>

<button onclick="salvar()">Salvar</button>

<p id="msg"></p>

<script>

async function salvar(){

let titulo = document.getElementById("titulo").value
let descricao = document.getElementById("descricao").value
let categoria = document.getElementById("categoria").value
let arquivo = document.getElementById("arquivo").value

const { error } = await db
.from("conteudos")
.insert([
  {
    titulo: titulo,
    descricao: descricao,
    categoria: categoria,
    arquivo_url: arquivo,
    ativo: true,
    downloads: 0
  }
])

if(error){
document.getElementById("msg").innerText = "Erro: " + error.message
return
}

document.getElementById("msg").innerText = "Inserido com sucesso!"

// limpa campos
document.getElementById("titulo").value = ""
document.getElementById("descricao").value = ""
document.getElementById("arquivo").value = ""

}

</script>

</body>
</html>
