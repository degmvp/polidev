async function executarView(view, tabelaId, statusId){

.from(view)
.select("*")

}

if(data.length === 0){
document.getElementById(statusId).innerText =
"OK (sem dados)"
return
}

// montar tabela dinâmica
let html = "<tr>"

Object.keys(data[0]).forEach(col=>{
html += `<th>${col}</th>`
})

html += "</tr>"

data.forEach(row=>{
html += "<tr>"
Object.values(row).forEach(v=>{
html += `<td>${v}</td>`
})
html += "</tr>"
})

document.getElementById(tabelaId).innerHTML = html

document.getElementById(statusId).innerText =
"OK (" + data.length + " registros)"

}
