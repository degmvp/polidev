<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>POLYDEV | Go Engineering</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #050505;
      color: #f5f5f5;
    }

    header {
      text-align: center;
      padding: 25px 15px 10px;
    }

    header img {
      width: 55%;
      max-width: 620px;
      border-radius: 12px;
    }

    h1 {
      color: #FFD700;
      margin: 20px 0 8px;
      font-size: 2rem;
    }

    .subtitle {
      color: yellowgreen;
      font-size: 1rem;
      margin-bottom: 20px;
    }

    .module-box {
      max-width: 780px;
      margin: 20px auto;
      padding: 20px;
      border: 1px solid #333;
      border-radius: 12px;
      background: #111;
      text-align: center;
    }

    .module-box label {
      display: block;
      color: #FFD700;
      margin-bottom: 10px;
      font-weight: bold;
    }

    select, button {
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      margin: 6px;
    }

    select {
      min-width: 280px;
      background: #222;
      color: #fff;
      border: 1px solid #555;
    }

    button {
      background: #FFD700;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #e6c200;
    }

    .layout {
      display: flex;
      min-height: 520px;
    }

    aside {
      width: 320px;
      background: #0d0d0d;
      border-right: 1px solid #333;
      padding: 20px;
      display: none;
    }

    aside h2 {
      color: #FFD700;
      font-size: 1.1rem;
      margin-top: 0;
    }

    .menu-item {
      padding: 12px;
      margin-bottom: 10px;
      background: #1a1a1a;
      border-left: 4px solid #FFD700;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.92rem;
    }

    .menu-item:hover {
      background: #292929;
    }

    main {
      flex: 1;
      padding: 25px;
    }

    .viewer-title {
      color: #FFD700;
      margin-top: 0;
    }

    pre {
      background: #101010;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 20px;
      overflow-x: auto;
      white-space: pre-wrap;
      color: #e8e8e8;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .download {
      display: inline-block;
      margin: 12px 0 20px;
      padding: 10px 14px;
      background: #FFD700;
      color: #000;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .msg {
      text-align: center;
      color: #ccc;
      margin: 25px;
    }

    footer {
      text-align: center;
      padding: 30px 10px;
      color: #aaa;
    }

    footer img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    @media (max-width: 800px) {
      .layout {
        flex-direction: column;
      }

      aside {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #333;
      }

      header img {
        width: 90%;
      }
    }
  </style>
</head>

<body>

<header>
  <img src="banpol.jpg" alt="POLYDEV">
  <h1>Go Engineering</h1>
  <div class="subtitle">Concorrência, resiliência, HTTP e produção em Go</div>
</header>

<section class="module-box">
  <label for="programa">Selecione o módulo de estudo</label>

  <select id="programa">
    <option value="">-- escolha o módulo --</option>
    <option value="12">12 - Worker Pool + Fan-Out/Fan-In</option>
    <option value="34">34 - Pipeline + Rate Limiter</option>
    <option value="56">56 - Retry + Circuit Breaker</option>
    <option value="78">78 - HTTP Client + Middleware</option>
    <option value="99">99 - Health Check + Graceful Shutdown</option>
  </select>

  <button onclick="carregarModulo()">Consultar</button>
</section>

<div class="layout">
  <aside id="menu">
    <h2>Módulo</h2>
    <div id="menu-list"></div>
  </aside>

  <main>
    <h2 class="viewer-title" id="titulo">Leia • Entenda • Execute seu código.</h2>
    <div id="conteudo" class="msg">
      Selecione um módulo para exibir os arquivos Go Engineering.
    </div>
  </main>
</div>

<footer>
  <img src="poly.jpg" alt="POLYDEV">
  <div>POLYDEV | Multiprogramming & Multidatabase</div>
</footer>

<script>
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function carregarModulo() {
    const modulo = document.getElementById("programa").value;
    const menu = document.getElementById("menu");
    const menuList = document.getElementById("menu-list");
    const conteudo = document.getElementById("conteudo");
    const titulo = document.getElementById("titulo");

    menuList.innerHTML = "";
    conteudo.innerHTML = "Carregando módulo...";
    titulo.textContent = "Go Engineering";

    if (!modulo) {
      menu.style.display = "none";
      conteudo.innerHTML = "Selecione um módulo válido.";
      return;
    }

    const { data, error } = await db
      .from("conteudos")
      .select("*")
      .eq("categoria", "goeng")
      .eq("programa", modulo)
      .eq("ativo", "true")
      .order("titulo", { ascending: true });

    if (error) {
      menu.style.display = "none";
      conteudo.innerHTML = "Erro ao consultar o Supabase.";
      console.error(error);
      return;
    }

    if (!data || data.length === 0) {
      menu.style.display = "none";
      conteudo.innerHTML = "Nenhum arquivo encontrado para este módulo.";
      return;
    }

    menu.style.display = "block";
    conteudo.innerHTML = "Selecione um item no menu lateral.";

    data.forEach(item => {
      const div = document.createElement("div");
      div.className = "menu-item";
      div.textContent = item.titulo;
      div.onclick = () => abrirArquivo(item);
      menuList.appendChild(div);
    });

    abrirArquivo(data[0]);
  }

  async function abrirArquivo(item) {
    const titulo = document.getElementById("titulo");
    const conteudo = document.getElementById("conteudo");

    titulo.textContent = item.titulo;
    conteudo.innerHTML = "Carregando arquivo...";

    try {
      const resp = await fetch(item.arquivo_url);

      if (!resp.ok) {
        conteudo.innerHTML = "Erro ao carregar o arquivo.";
        return;
      }

      const texto = await resp.text();

      conteudo.innerHTML = `
        <a class="download" href="${item.arquivo_url}" download>Download</a>
        <pre>${escapeHtml(texto)}</pre>
      `;
    } catch (e) {
      console.error(e);
      conteudo.innerHTML = "Falha ao abrir o arquivo.";
    }
  }

  function escapeHtml(text) {
    return text
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;");
  }
</script>

</body>
</html>
