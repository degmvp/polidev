<script>
let conteudoAtual = "";

const modulos = {
m1: {
titulo: "01 - Objetivo",
texto: `POLYDEV | Security Engineering
HACK22 — Segurança em APIs REST

Objetivo:

Aplicar um checklist essencial de segurança para APIs REST.

APIs expõem regras de negócio, dados e operações críticas. Por isso, segurança em API não pode depender apenas de autenticação básica.

Neste artigo, o foco é proteger endpoints REST com rate limiting, OAuth2 + JWT, validação rigorosa de inputs, defesa contra BOLA/IDOR, CORS bem configurado, logging e monitoramento.

Leia • Entenda • Execute seu código.`
},
m2: {
titulo: "02 - Checklist Essencial",
texto: `Checklist de segurança essencial:

- Rate Limiting forte
- Autenticação com OAuth2 + JWT
- Validação rigorosa de todos os inputs
- Proteção contra BOLA/IDOR
- CORS bem configurado
- Logging e monitoramento

Esse checklist cobre pontos básicos que precisam existir antes de uma API ser exposta publicamente.

Uma API REST sem esses controles pode vazar dados, permitir abuso de endpoints ou expor operações sensíveis.`
},
m3: {
titulo: "03 - Rate Limiting",
texto: `Rate Limiting forte:

Rate limiting controla a quantidade de requisições permitidas por usuário, IP, token ou aplicação.

Objetivos:

- Reduzir abuso
- Diminuir força bruta
- Proteger recursos internos
- Evitar scraping agressivo
- Reduzir impacto de ataques automatizados

Boas práticas:

- Limite por IP
- Limite por usuário
- Limite por token
- Resposta adequada para excesso de requisições
- Monitoramento de picos anormais

Sem rate limiting, uma API pode ser consumida de forma abusiva até afetar o serviço.`
},
m4: {
titulo: "04 - OAuth2 + JWT",
texto: `Autenticação:

Use OAuth2 + JWT.

O token deve representar uma autorização válida, com escopo e tempo de vida definidos.

Verifique sempre:

- Assinatura do token
- Expiração
- Emissor
- Público
- Escopos
- Claims obrigatórias

Erros comuns:

- Aceitar token sem validar assinatura
- Ignorar expiração
- Não validar escopo
- Usar token longo demais
- Confiar apenas no payload decodificado

Autenticação forte é base, mas autorização correta endpoint por endpoint é o ponto crítico.`
},
m5: {
titulo: "05 - Validação de Inputs",
texto: `Validação rigorosa de todos os inputs:

Toda entrada deve ser tratada como não confiável.

Valide:

- Parâmetros de URL
- Query strings
- Headers
- Body JSON
- Tipos de dados
- Tamanho máximo
- Formato esperado
- Campos obrigatórios

Riscos evitados:

- Injection
- Dados inválidos
- Quebra de regra de negócio
- Abuso de filtros
- Falhas por payload malformado

A validação deve acontecer antes de qualquer processamento sensível.`
},
m6: {
titulo: "06 - BOLA / IDOR",
texto: `Proteção contra BOLA/IDOR:

BOLA significa Broken Object Level Authorization.

IDOR significa Insecure Direct Object Reference.

Exemplo conceitual:

/users/123

O problema ocorre quando o usuário autenticado consegue acessar o recurso de outro usuário apenas mudando o identificador.

Defesa:

- Validar propriedade do recurso
- Validar autorização por objeto
- Não confiar apenas no ID da URL
- Verificar contexto do usuário
- Aplicar controle no backend
- Testar endpoints com IDs de outros usuários

Autenticação responde quem é o usuário.

Autorização responde o que ele pode acessar.`
},
m7: {
titulo: "07 - CORS e Logs",
texto: `CORS bem configurado:

CORS define quais origens podem acessar a API pelo navegador.

Boas práticas:

- Evitar wildcard em produção
- Permitir apenas origens confiáveis
- Revisar métodos permitidos
- Controlar headers permitidos
- Separar ambientes dev/homolog/prod

Logging e monitoramento:

Registre eventos relevantes:

- Falhas de autenticação
- Erros de autorização
- Picos de requisição
- Acesso a objetos sensíveis
- Erros 4xx e 5xx
- Tentativas suspeitas

Sem logs, não existe investigação confiável depois do incidente.`
},
m8: {
titulo: "08 - Teste com curl",
texto: `Teste rápido com curl:

curl -H "Authorization: Bearer token" https://api.exemplo.com/users/123

O que testar:

- Token válido
- Token expirado
- Token ausente
- Token de outro usuário
- ID de outro usuário
- Escopo insuficiente
- Origem CORS não autorizada
- Excesso de requisições

Resumo:

Segurança em API REST depende de camadas.

Não basta autenticar.

É preciso limitar, validar, autorizar, registrar e monitorar.

POLYDEV | Security Engineering
Leia • Entenda • Execute seu código.`
}
};

function abrirConteudo(chave){
    const item = modulos[chave];
    document.getElementById("tituloConteudo").textContent = item.titulo;
    document.getElementById("codigo").textContent = item.texto;
    conteudoAtual = item.texto;
}

function copiarConteudo(){
    if(!conteudoAtual){
        conteudoAtual = document.getElementById("codigo").textContent;
    }

    navigator.clipboard.writeText(conteudoAtual)
        .then(() => alert("Conteúdo copiado."))
        .catch(() => alert("Não foi possível copiar."));
}
</script>
