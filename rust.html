<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>POLYDEV | Rust</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:yellowgreen;
    color:black;
}

header{
    background:black;
    color:#FFD700;
    text-align:center;
    padding:25px;
}

header h1{
    margin:0;
    font-size:38px;
}

header p{
    color:yellowgreen;
    font-weight:bold;
}

.container{
    display:grid;
    grid-template-columns:320px 1fr;
    gap:20px;
    padding:20px;
}

.menu{
    background:black;
    color:white;
    border-radius:12px;
    padding:15px;
}

.menu h2{
    color:#FFD700;
    text-align:center;
}

button{
    width:100%;
    margin:6px 0;
    padding:12px;
    border:0;
    border-radius:8px;
    background:#FFD700;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:white;
}

.viewer{
    background:white;
    border:4px solid black;
    border-radius:12px;
    padding:20px;
    min-height:500px;
}

pre{
    background:#111;
    color:white;
    padding:20px;
    border-radius:10px;
    overflow-x:auto;
    font-size:15px;
    line-height:1.5;
}

.botoes{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

.botoes button{
    width:auto;
    min-width:150px;
    background:black;
    color:#FFD700;
}

.status{
    text-align:center;
    font-weight:bold;
    margin-top:20px;
}

@media(max-width:800px){
    .container{
        grid-template-columns:1fr;
    }

    .botoes{
        flex-direction:column;
    }

    .botoes button{
        width:100%;
    }
}
</style>
</head>

<body>

<header>
    <h1>🦀 POLYDEV Rust</h1>
    <p>Leia • Entenda • Execute seu código</p>
</header>

<div class="container">

    <aside class="menu">
        <h2>Programas Rust</h2>

        <button onclick="baixarGuia()">⬇ Baixar Guia Completo</button>
        <button onclick="voltarHome()">⬅ Voltar</button>

        <hr>

        <div id="listaProgramas" class="status">Carregando programas...</div>
    </aside>

    <main class="viewer">
        <h2 id="titulo">Selecione um programa Rust</h2>

        <div class="botoes">
            <button onclick="baixarAtual()">⬇ Download</button>
            <button onclick="limparViewer()">🧹 Limpar</button>
        </div>

        <pre id="codigo">// O código Rust selecionado aparecerá aqui.</pre>
    </main>

</div>

<script>
let programas = [];
let programaAtual = null;

async function carregarProgramas(){
    const lista = document.getElementById("listaProgramas");

    const { data, error } = await db
        .from("conteudos")
        .select("id,titulo,descricao,categoria,arquivo_url,downloads,ativo")
        .eq("categoria", "rs")
        .eq("ativo", true)
        .order("titulo", { ascending:true });

    if(error){
        lista.innerHTML = "Erro ao carregar Rust.";
        console.error(error);
        return;
    }

    if(!data || data.length === 0){
        lista.innerHTML = "Nenhum programa Rust encontrado.";
        return;
    }

    programas = data;
    lista.innerHTML = "";

    programas.forEach(item => {
        if(item.arquivo_url && item.arquivo_url.endsWith(".rs")){
            const btn = document.createElement("button");
            btn.innerText = item.titulo;
            btn.onclick = () => abrirPrograma(item);
            lista.appendChild(btn);
        }
    });
}

async function abrirPrograma(item){
    programaAtual = item;

    document.getElementById("titulo").innerText = item.titulo;

    try{
        const resp = await fetch(item.arquivo_url);

        if(!resp.ok){
            throw new Error("Arquivo não encontrado: " + item.arquivo_url);
        }

        const texto = await resp.text();
        document.getElementById("codigo").textContent = texto;

    }catch(e){
        document.getElementById("codigo").textContent =
            "Erro ao abrir:\n" + item.arquivo_url + "\n\n" + e.message;
    }
}

async function baixarAtual(){
    if(!programaAtual){
        alert("Selecione primeiro um programa Rust.");
        return;
    }

    await incrementarDownload(programaAtual.id);

    const a = document.createElement("a");
    a.href = programaAtual.arquivo_url;
    a.download = programaAtual.arquivo_url.split("/").pop();
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

async function incrementarDownload(id){
    const item = programas.find(p => p.id === id);
    const atual = item && item.downloads ? item.downloads : 0;

    const { error } = await db
        .from("conteudos")
        .update({ downloads: atual + 1 })
        .eq("id", id);

    if(error){
        console.error("Erro ao incrementar download:", error);
    }
}

function baixarGuia(){
    const a = document.createElement("a");
    a.href = "downloads/rust/rust.html";
    a.download = "rust.html";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

function limparViewer(){
    programaAtual = null;
    document.getElementById("titulo").innerText = "Selecione um programa Rust";
    document.getElementById("codigo").textContent =
        "// O código Rust selecionado aparecerá aqui.";
}

function voltarHome(){
    window.location.href = "home.html";
}

carregarProgramas();
</script>

</body>
</html>
