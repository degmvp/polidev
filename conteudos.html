<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>POLYDEV - CONTEÚDOS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

body{
    background:navy;
    color:white;
    font-family:Arial;
    margin:20px;
}

h1{
    color:lightgreen;
    text-align:center;
}

#lista, #viewer{
    background:black;
    border:1px solid yellowgreen;
    border-radius:10px;
    padding:15px;
}

.card{
    background:#001f3f;
    border:1px solid yellowgreen;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
}

button{
    margin:5px;
    padding:8px 12px;
    background:yellowgreen;
    border:0;
    font-weight:bold;
    cursor:pointer;
    border-radius:6px;
}

button:hover{
    background:lightgreen;
}

iframe{
    width:100%;
    height:650px;
    border:0;
    background:white;
}

.topbar{
    margin-bottom:10px;
}

@media (max-width: 768px){
    iframe{
        height:400px;
    }
}

</style>
</head>

<body>

<h1>📚 POLYDEV - CONTEÚDOS</h1>

<div id="lista"></div>

<div id="viewer" style="display:none;">
    <div class="topbar">
        <button onclick="voltar()">⬅ Voltar</button>
        <button onclick="downloadAtual()">⬇ Download</button>
    </div>
    <iframe id="frame"></iframe>
</div>

<script>

// BASE CORRETA
const BASE = "downloads";

// DADOS (ligado ao banco depois se quiser)
const dados = [
    { id:1, titulo:"MySQL", pasta:"bancos", arquivo:"html_mysql_guia.html" },
    { id:2, titulo:"SQL Server", pasta:"bancos", arquivo:"html_sqlserver_guia.html" },
    { id:3, titulo:"PostgreSQL", pasta:"bancos", arquivo:"html_postgres_guia.html" },
    { id:4, titulo:"Oracle 23 Guia", pasta:"bancos", arquivo:"html_ora23_guia.html" },
    { id:5, titulo:"Oracle Backup", pasta:"bancos", arquivo:"html_ora23_backup.html" },
    { id:6, titulo:"Oracle Comandos", pasta:"bancos", arquivo:"html_ora23_cmd.html" },
    { id:7, titulo:"Oracle PL/SQL", pasta:"bancos", arquivo:"html_ora23_pl.html" },

    { id:8, titulo:"Python", pasta:"linguagens", arquivo:"html_python_prog1.html" },
    { id:9, titulo:"C++", pasta:"linguagens", arquivo:"html_cpp_prog1.html" },
    { id:10, titulo:"JavaScript", pasta:"linguagens", arquivo:"html_js_prog1.html" },
    { id:11, titulo:"Node.js", pasta:"linguagens", arquivo:"html_nodejs_prog1.html" },
    { id:12, titulo:"Go", pasta:"linguagens", arquivo:"html_go_prog1.html" },
    { id:13, titulo:"Rust", pasta:"linguagens", arquivo:"html_rust_prog1.html" },
    { id:14, titulo:"Ruby", pasta:"linguagens", arquivo:"html_ruby_prog1.html" },
    { id:15, titulo:"Pandas", pasta:"linguagens", arquivo:"html_pandas_prog1.html" },
    { id:16, titulo:"Knex", pasta:"linguagens", arquivo:"html_knex_prog1.html" },
    { id:17, titulo:"OOP Python", pasta:"linguagens", arquivo:"html_ooppy_prog1.html" },
    { id:18, titulo:"OOP C++", pasta:"linguagens", arquivo:"html_oopcpp_prog1.html" },
    { id:19, titulo:"OOP Go", pasta:"linguagens", arquivo:"html_oopgo_prog1.html" },
    { id:20, titulo:"OOP Rust", pasta:"linguagens", arquivo:"html_ooprust_prog1.html" }
];

let atual = null;

// 🔹 MONTAR LISTA
function montar(){

    const area = document.getElementById("lista");
    area.innerHTML = "";

    dados.forEach(item => {

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <strong>${item.titulo}</strong><br>
            <button onclick="abrir(${item.id})">Abrir</button>
        `;

        area.appendChild(card);
    });
}

// 🔹 ABRIR GUIA
function abrir(id){

    const item = dados.find(x => x.id === id);
    atual = item;

    const caminho = `${BASE}/${item.pasta}/${item.arquivo}`;

    document.getElementById("frame").src = caminho;

    document.getElementById("lista").style.display = "none";
    document.getElementById("viewer").style.display = "block";
}

// 🔹 VOLTAR
function voltar(){
    document.getElementById("viewer").style.display = "none";
    document.getElementById("lista").style.display = "block";
}

// 🔹 DOWNLOAD + INCREMENTO
async function downloadAtual(){

    if (!atual) return;

    const caminho = `${BASE}/${atual.pasta}/${atual.arquivo}`;

    try{
        await db.rpc("incrementar_download", { conteudo_id: atual.id });
    }catch(e){
        console.log("Erro ao incrementar:", e);
    }

    const link = document.createElement("a");
    link.href = caminho;
    link.download = atual.arquivo;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

// INIT
montar();

</script>

</body>
</html>
