<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>POLYDEV - Conteúdos</title>

<style>
body{
    background:navy;
    color:white;
    font-family:Arial, sans-serif;
    margin:20px;
}

h1{
    color:lightgreen;
    text-align:center;
}

h2{
    color:yellowgreen;
    border-bottom:1px solid yellowgreen;
    padding-bottom:8px;
}

.container{
    background:#001f3f;
    border:1px solid yellowgreen;
    border-radius:10px;
    padding:15px;
    margin-bottom:25px;
}

.card{
    background:black;
    color:white;
    border:1px solid yellowgreen;
    border-radius:8px;
    padding:12px;
    margin:10px 0;
}

.card a{
    display:inline-block;
    margin-top:10px;
    background:yellowgreen;
    color:black;
    padding:8px 12px;
    text-decoration:none;
    font-weight:bold;
    border-radius:6px;
}

.card a:hover{
    background:lightgreen;
}

.status{
    text-align:center;
    color:yellowgreen;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>📚 POLYDEV - GUIAS DISPONÍVEIS</h1>

<div id="status" class="status">Carregando conteúdos...</div>

<div class="container">
    <h2>🗄️ Guias de Bancos de Dados</h2>
    <div id="bancos"></div>
</div>

<div class="container">
    <h2>💻 Guias de Linguagens</h2>
    <div id="linguagens"></div>
</div>

<script>

/*
    ATENÇÃO:
    Este código usa o caminho atual encontrado no GitHub:

    downloads/test_supa.html/bancos/
    downloads/test_supa.html/linguagens/

    Depois, quando reorganizar o Git, basta trocar BASE.
*/

const BASE = "downloads/test_supa.html";

const guiasBancos = [
    { titulo: "Guia SQL Server", arquivo: "guia_sqlserver.html" },
    { titulo: "Guia MySQL", arquivo: "guia_mysql.html" },
    { titulo: "Guia PostgreSQL", arquivo: "guia_postgresql.html" },
    { titulo: "Guia Oracle", arquivo: "guia_oracle.html" }
];

const guiasLinguagens = [
    { titulo: "Guia Python", arquivo: "guia_python.html" },
    { titulo: "Guia Java", arquivo: "guia_java.html" },
    { titulo: "Guia C", arquivo: "guia_c.html" },
    { titulo: "Guia C++", arquivo: "guia_cpp.html" },
    { titulo: "Guia JavaScript", arquivo: "guia_javascript.html" },
    { titulo: "Guia Rust", arquivo: "guia_rust.html" },
    { titulo: "Guia Go", arquivo: "guia_go.html" },
    { titulo: "Guia Node.js", arquivo: "guia_nodejs.html" }
];

function montarLista(id, pasta, lista){

    const area = document.getElementById(id);
    area.innerHTML = "";

    lista.forEach(item => {

        const caminho = `${BASE}/${pasta}/${item.arquivo}`;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <strong>${item.titulo}</strong>
            <br>
            <small>${caminho}</small>
            <br>
            <a href="${caminho}" target="_blank">Abrir Guia</a>
        `;

        area.appendChild(card);
    });
}

try{
    montarLista("bancos", "bancos", guiasBancos);
    montarLista("linguagens", "linguagens", guiasLinguagens);

    document.getElementById("status").innerText = "Conteúdos carregados com sucesso.";
}catch(e){
    document.getElementById("status").innerText = "Erro ao carregar conteúdos.";
    console.log(e);
}

</script>

</body>
</html>
