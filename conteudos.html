<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>POLYDEV - GUIAS</title>

<style>
body{
    background:navy;
    color:white;
    font-family:Arial;
    margin:20px;
}

h1{
    color:lightgreen;
    text-align:center;
}

h2{
    color:yellowgreen;
    margin-top:20px;
}

.container{
    display:flex;
    gap:20px;
}

.menu{
    width:30%;
    background:black;
    border:1px solid yellowgreen;
    padding:15px;
    border-radius:10px;
}

.viewer{
    width:70%;
    background:white;
    border:3px solid yellowgreen;
    border-radius:10px;
    padding:10px;
}

button{
    width:100%;
    margin:6px 0;
    padding:10px;
    background:yellowgreen;
    border:0;
    font-weight:bold;
    cursor:pointer;
    border-radius:6px;
}

button:hover{
    background:lightgreen;
}

iframe{
    width:100%;
    height:650px;
    border:0;
    border-radius:10px;
}

#status{
    margin-bottom:10px;
    color:lightgreen;
    font-weight:bold;
}

.acoes{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

.acoes button{
    width:auto;
    min-width:150px;
}

@media(max-width:800px){
    .container{
        flex-direction:column;
    }

    .menu,
    .viewer{
        width:100%;
    }

    .acoes{
        flex-direction:column;
    }

    .acoes button{
        width:100%;
    }
}
</style>
</head>

<body>

<h1>📚 POLYDEV - GUIAS</h1>

<div id="status">Escolha um guia no menu.</div>

<div class="container">

<div class="menu">
    <h2>🗄️ Bancos</h2>
    <div id="bancos"></div>

    <h2>💻 Linguagens</h2>
    <div id="linguagens"></div>
</div>

<div class="viewer">
    <div class="acoes">
        <button onclick="voltar()">⬅ Voltar</button>
        <button onclick="baixarGuia()">📥 Download Guia</button>
    </div>

    <iframe id="viewer"></iframe>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>

const BASE = "downloads";
let guiaAtual = null;

let db = null;

try {
    db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
} catch(e) {
    console.error("Erro ao iniciar Supabase:", e);
}

// 🔹 BANCOS
const bancos = [
{ id:1, nome:"MySQL", arq:"html_mysql_guia.html" },
{ id:2, nome:"SQL Server", arq:"html_sqlserver_guia.html" },
{ id:3, nome:"PostgreSQL", arq:"html_postgres_guia.html" },
{ id:4, nome:"Oracle 23 Guia", arq:"html_ora23_guia.html" },
{ id:5, nome:"Oracle Backup", arq:"html_ora23_backup.html" },
{ id:6, nome:"Oracle Comandos", arq:"html_ora23_cmd.html" },
{ id:7, nome:"Oracle PL/SQL", arq:"html_ora23_pl.html" }
];

// 🔹 LINGUAGENS
const linguagens = [
{ id:8, nome:"Python", arq:"html_python_prog1.html" },
{ id:9, nome:"C++", arq:"html_cpp_prog1.html" },
{ id:10, nome:"JavaScript", arq:"html_js_prog1.html" },
{ id:11, nome:"Node.js", arq:"html_nodejs_prog1.html" },
{ id:12, nome:"Go", arq:"html_go_prog1.html" },
{ id:13, nome:"Rust", arq:"html_rust_prog1.html" },
{ id:14, nome:"Ruby", arq:"html_ruby_prog1.html" },
{ id:15, nome:"Pandas", arq:"html_pandas_prog1.html" }
];

// 🔥 ABRIR GUIA
function abrir(pasta, item){
    const caminho = `${BASE}/${pasta}/${item.arq}`;

    guiaAtual = {
        id: item.id,
        nome: item.nome,
        caminho: caminho
    };

    document.getElementById("viewer").src = caminho;
    document.getElementById("status").innerText = "Exibindo: " + item.nome;
}

// 🔥 INCREMENTAR DOWNLOAD
async function incrementarDownload(id){

    if(!db){
        alert("Supabase não inicializado. Verifique config.js.");
        return false;
    }

    const { error } = await db.rpc("incrementar_download", {
        p_id: id
    });

    if(error){
        console.error("Erro ao registrar download:", error);
        alert("Erro ao registrar download.");
        return false;
    }

    return true;
}

// 📥 DOWNLOAD GUIA
async function baixarGuia(){

    if(!guiaAtual){
        alert("Escolha um guia primeiro.");
        return;
    }

    const ok = await incrementarDownload(guiaAtual.id);

    if(!ok) return;

    const link = document.createElement("a");
    link.href = guiaAtual.caminho;
    link.download = guiaAtual.caminho.split("/").pop();

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    document.getElementById("status").innerText =
        "Download registrado: " + guiaAtual.nome;
}

// 🔙 VOLTAR
function voltar(){
    document.getElementById("viewer").src = "";
    document.getElementById("status").innerText = "Escolha um guia no menu.";
    guiaAtual = null;
}

// 🔧 MONTAR MENU
function montar(lista, pasta, destino){

    const area = document.getElementById(destino);

    lista.forEach(item => {

        const btn = document.createElement("button");
        btn.innerText = item.nome;

        btn.onclick = function(){
            abrir(pasta, item);
        };

        area.appendChild(btn);
    });
}

// 🚀 EXECUÇÃO
montar(bancos, "bancos", "bancos");
montar(linguagens, "linguagens", "linguagens");

</script>

</body>
</html>
