<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>POLYDEV - GUIAS</title>

<style>
body{
    background:navy;
    color:white;
    font-family:Arial;
    margin:20px;
}

h1{
    color:lightgreen;
    text-align:center;
}

.container{
    display:flex;
    gap:20px;
}

.menu{
    width:30%;
    background:black;
    border:1px solid yellowgreen;
    padding:15px;
    border-radius:10px;
}

.viewer{
    width:70%;
    background:white;
    border:3px solid yellowgreen;
    border-radius:10px;
    height:600px;
}

button{
    width:100%;
    margin:6px 0;
    padding:10px;
    background:yellowgreen;
    border:0;
    font-weight:bold;
    cursor:pointer;
    border-radius:6px;
}

button:hover{
    background:limegreen;
}
</style>
</head>

<body>

<h1>POLYDEV - GUIAS</h1>

<div class="container">

    <div class="menu" id="menu"></div>

    <iframe class="viewer" id="viewer"></iframe>

</div>

<script>

// 🔥 BASE DO GITHUB
const BASE_URL = "https://degmvp.github.io/polidev/";

// 🔥 DADOS (SIMULANDO BANCO POR ENQUANTO)
const dados = [
    {id:1, nome:"Guia MySQL", categoria:"bancos", arquivo:"html_mysql_guia.html"},
    {id:2, nome:"Programa C++ 1", categoria:"linguagens", arquivo:"html_cpp_prog1.html"}
];

// 🔥 MONTA CAMINHO CORRETO
function montarCaminho(item){
    if(!item.arquivo) return "";

    if(item.categoria === "bancos"){
        return `downloads/bancos/${item.arquivo}`;
    }

    if(item.categoria === "linguagens"){
        return `downloads/linguagens/${item.arquivo}`;
    }

    return `downloads/${item.arquivo}`;
}

// 🔥 EXIBIR NO VIEWER
function exibir(item){
    const caminho = montarCaminho(item);
    const url = BASE_URL + caminho;

    console.log("ABRINDO:", url);

    document.getElementById("viewer").src = url;
}

// 🔥 DOWNLOAD REAL
function downloadArquivo(item){
    const caminho = montarCaminho(item);
    const url = BASE_URL + caminho;

    const a = document.createElement("a");
    a.href = url;
    a.download = item.arquivo;
    a.click();
}

// 🔥 CRIAR MENU
function carregarMenu(){

    const menu = document.getElementById("menu");

    dados.forEach(item => {

        const btnExibir = document.createElement("button");
        btnExibir.innerText = "📖 " + item.nome;
        btnExibir.onclick = () => exibir(item);

        const btnDownload = document.createElement("button");
        btnDownload.innerText = "⬇ Download";
        btnDownload.onclick = () => downloadArquivo(item);

        menu.appendChild(btnExibir);
        menu.appendChild(btnDownload);

    });
}

carregarMenu();

</script>

</body>
</html>
