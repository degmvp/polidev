<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>POLYDEV - MENU</title>

<style>
body{
    background:navy;
    color:white;
    font-family:Arial;
    margin:20px;
}

h1{
    text-align:center;
    color:lightgreen;
}

.container{
    display:flex;
    gap:20px;
}

.menu{
    width:30%;
    background:black;
    padding:15px;
    border-radius:10px;
}

.viewer{
    width:70%;
    background:white;
    color:black;
    padding:15px;
    border-radius:10px;
}

button{
    width:100%;
    margin:5px 0;
    padding:10px;
    background:yellowgreen;
    border:0;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>POLYDEV</h1>

<div class="container">

    <div class="menu">
        <h2>Bancos</h2>
        <button onclick="abrir('sql.html')">Guia SQL</button>
        <button onclick="abrir('mysql.html')">Guia MySQL</button>

        <h2>Linguagens</h2>
        <button onclick="abrir('python.html')">Python</button>
        <button onclick="abrir('cpp.html')">C++</button>
    </div>

    <div class="viewer" id="viewer">
        <h2>Selecione um guia</h2>
    </div>

</div>

<script>
function abrir(arquivo){
    fetch(arquivo)
    .then(r => r.text())
    .then(html => {
        document.getElementById("viewer").innerHTML =
            `<button onclick="voltar()">⬅ Voltar</button><hr>` + html;
    });
}

function voltar(){
    document.getElementById("viewer").innerHTML =
        "<h2>Selecione um guia</h2>";
}
</script>

</body>
</html>
