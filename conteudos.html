<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>POLYDEV Conteúdos</title>

<style>
body{
    background:navy;
    color:white;
    font-family:Arial, sans-serif;
    margin:20px;
}

h1{
    color:lightgreen;
    text-align:center;
}

h2{
    color:yellowgreen;
    border-bottom:1px solid yellowgreen;
    padding-bottom:8px;
}

.card{
    background:black;
    border:1px solid yellowgreen;
    border-radius:8px;
    padding:12px;
    margin:10px 0;
}

.card a{
    display:inline-block;
    margin-top:8px;
    background:yellowgreen;
    color:black;
    padding:8px 12px;
    text-decoration:none;
    font-weight:bold;
    border-radius:6px;
}

.card a:hover{
    background:lightgreen;
}

small{
    color:#cccccc;
}
</style>
</head>

<body>

<h1>📚 Conteúdos POLYDEV</h1>

<h2>🗄️ Bancos de Dados</h2>
<div id="bancos"></div>

<h2>💻 Linguagens</h2>
<div id="linguagens"></div>

<script>

const BASE = "downloads/test_supa.html";

const bancos = [
    { titulo: "Guia MySQL", arquivo: "html_mysql_guia.html" },
    { titulo: "Backup Oracle 23", arquivo: "html_ora23_backup.html" },
    { titulo: "Comandos Oracle 23", arquivo: "html_ora23_cmd.html" },
    { titulo: "Guia Oracle 23", arquivo: "html_ora23_guia.html" },
    { titulo: "PL/SQL Oracle 23", arquivo: "html_ora23_pl.html" },
    { titulo: "Guia PostgreSQL", arquivo: "html_postgres_guia.html" },
    { titulo: "Guia SQL Server", arquivo: "html_sqlserver_guia.html" }
];

const linguagens = [
    { titulo: "C++", arquivo: "html_cpp_prog1.html" },
    { titulo: "Go", arquivo: "html_go_prog1.html" },
    { titulo: "JavaScript", arquivo: "html_js_prog1.html" },
    { titulo: "Knex", arquivo: "html_knex_prog1.html" },
    { titulo: "Node.js", arquivo: "html_nodejs_prog1.html" },
    { titulo: "OOP C++", arquivo: "html_oopcpp_prog1.html" },
    { titulo: "OOP Go", arquivo: "html_oopgo_prog1.html" },
    { titulo: "OOP Python", arquivo: "html_ooppy_prog1.html" },
    { titulo: "OOP Rust", arquivo: "html_ooprust_prog1.html" },
    { titulo: "Pandas", arquivo: "html_pandas_prog1.html" },
    { titulo: "Python", arquivo: "html_python_prog1.html" },
    { titulo: "Ruby", arquivo: "html_ruby_prog1.html" },
    { titulo: "Rust", arquivo: "html_rust_rog1.html" }
];

function montar(lista, pasta, destino){

    const area = document.getElementById(destino);
    area.innerHTML = "";

    lista.forEach(item => {

        const caminho = `${BASE}/${pasta}/${item.arquivo}`;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <strong>${item.titulo}</strong><br>
            <small>${caminho}</small><br>
            <a href="${caminho}" target="_blank">Abrir Guia</a>
        `;

        area.appendChild(card);
    });
}

montar(bancos, "bancos", "bancos");
montar(linguagens, "linguagens", "linguagens");

</script>

</body>
</html>
