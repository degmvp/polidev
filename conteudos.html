<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste Download Guia</title>
</head>
<body>

  <h1>Teste Guia Individual</h1>

  <button onclick="baixarGuia(1, 'guias/mysql.html')">
    Baixar Guia MySQL
  </button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "SUA_URL_SUPABASE";
    const SUPABASE_KEY = "SUA_CHAVE_ANON";

    const supabase = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_KEY
    );

    async function baixarGuia(id, arquivo) {
      console.log("ID do guia:", id);
      console.log("Arquivo:", arquivo);

      const { error } = await supabase.rpc("incrementar_download", {
        p_id: id
      });

      if (error) {
        console.error("Erro ao incrementar download:", error);
        alert("Erro ao registrar download");
        return;
      }

      console.log("Download registrado com sucesso");

      const link = document.createElement("a");
      link.href = arquivo;
      link.download = arquivo.split("/").pop();
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>

</body>
</html>
