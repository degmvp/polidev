<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>POLYDEV - GUIAS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
    background:#FFD700;
    color:black;
    font-family:Arial, sans-serif;
    margin:20px;
}

h1{
    color:black;
    text-align:center;
    background:black;
    color:#FFD700;
    padding:18px;
    border-radius:12px;
}

h2{
    color:black;
    text-align:center;
}

#listaGuias{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
    gap:18px;
    margin-top:25px;
}

.card{
    background:black;
    border:3px solid #FFD700;
    border-radius:12px;
    padding:18px;
    text-align:center;
    box-shadow:0 0 12px rgba(0,0,0,0.35);
}

.card h3{
    color:#FFD700;
    margin-bottom:15px;
}

.card p{
    color:white;
    font-size:14px;
}

button{
    padding:10px 18px;
    margin:6px;
    background:black;
    color:#FFD700;
    border:2px solid #FFD700;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#FFD700;
    color:black;
}

#areaViewer{
    display:none;
    margin-top:20px;
}

#viewer{
    width:100%;
    height:650px;
    background:white;
    border:4px solid black;
    border-radius:10px;
}

.barra{
    text-align:center;
    margin-bottom:15px;
}

</style>

</head>

<body>
<h1 id="tituloPagina">POLYDEV - GUIAS</h1>

<div class="barra">
    <button onclick="location.href='home.html'">🏠 Home</button>
    <button onclick="location.href='isom.html'">🧭 Menu</button>
</div>

<div id="areaLista">
    <h2>Carregando guias...</h2>
    <div id="listaGuias"></div>
</div>

<div id="areaViewer">
<div class="barra">
    <button onclick="voltar()">⬅ Voltar aos Guias</button>
    <button onclick="location.href='home.html'">🏠 Home</button>
    <button onclick="location.href='isom.html'">🧭 Menu</button>
    <button id="btnDownloadAtual">⬇ Download</button>
</div>

    <iframe id="viewer"></iframe>
</div>

<script>

// 🔥 CONFIG SUPABASE (USE O SEU)
const SUPABASE_URL = "https://vdpucrilxzlnxxnaohdh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcHVjcmlseHpsbnh4bmFvaGRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0OTc0NzIsImV4cCI6MjA4ODA3MzQ3Mn0.hdGtfK0eQf0-Iu_LqYqKKLvt8189euaGy-mmGMALJ_I";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const BASE_URL = "https://degmvp.github.io/polidev/";

function pegarNome(item){
    return item.titulo || "Guia sem título";
}

function montarUrl(item){
    if(!item.arquivo_url){
        return "";
    }

    let caminho = String(item.arquivo_url).trim();
    caminho = caminho.replace(/^\/+/, "");

    return BASE_URL + caminho;
}

function exibirGuia(item){
    const url = montarUrl(item);

    console.log("EXIBIR:", url);

    if(!url){
        alert("Este guia não possui arquivo_url definido.");
        return;
    }

    document.getElementById("viewer").src = url;
    document.getElementById("areaLista").style.display = "none";
    document.getElementById("areaViewer").style.display = "block";

    document.getElementById("btnDownloadAtual").onclick = function(){
        downloadGuia(item);
    };
}

function voltar(){
    document.getElementById("viewer").src = "";
    document.getElementById("areaViewer").style.display = "none";
    document.getElementById("areaLista").style.display = "block";
}

async function downloadGuia(item){
    const url = montarUrl(item);

    if(!url){
        return;
    }

    const { data, error: erroBusca } = await db
        .from("conteudos")
        .select("downloads")
        .eq("id", item.id)
        .single();

    if(erroBusca){
        alert("Erro ao consultar contador.");
        return;
    }

    const atual = Number(data.downloads || 0);
    const novoTotal = atual + 1;

    const { error: erroUpdate } = await db
        .from("conteudos")
        .update({ downloads: novoTotal })
        .eq("id", item.id);

    if(erroUpdate){
        alert("Erro ao incrementar download.");
        return;
    }

    item.downloads = novoTotal;

    const nomeArquivo = String(item.arquivo_url).split("/").pop();

    const a = document.createElement("a");
    a.href = url;
    a.download = nomeArquivo;
    a.target = "_blank";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

async function carregarGuias(){

    const params = new URLSearchParams(window.location.search);
    const categoria = params.get("categoria") || "sql";

    const tituloPagina = document.getElementById("tituloPagina");

if(categoria === "sql"){
    tituloPagina.innerText = "POLYDEV - GUIAS DE BANCOS";
}

if(categoria === "lang"){
    tituloPagina.innerText = "POLYDEV - GUIAS DE LINGUAGENS";
}

    const { data, error } = await db
        .from("conteudos")
        .select("id,titulo,descricao,categoria,arquivo_url,downloads,ativo")
        .eq("categoria", categoria)
        .eq("ativo", true)
        .order("id", { ascending:true });

    if(error){
        console.error("ERRO SUPABASE:", error);
        document.querySelector("#areaLista h2").innerText = "Erro ao carregar guias";
        return;
    }

    console.log("GUIAS:", data);

    const lista = document.getElementById("listaGuias");
    lista.innerHTML = "";

    if(!data || data.length === 0){
        document.querySelector("#areaLista h2").innerText = "Nenhum guia encontrado";
        return;
    }

    data.forEach(item => {

    if(!item.arquivo_url){
        return;
    }

    if(!item.arquivo_url.toLowerCase().endsWith(".html")){
        return;
    }

        const card = document.createElement("div");
        card.className = "card";

        const titulo = document.createElement("h3");
        titulo.innerText = pegarNome(item);

        const info = document.createElement("p");
        info.innerText = "Downloads: " + (item.downloads || 0);

        const btnExibir = document.createElement("button");
        btnExibir.innerText = "📖 Exibir";
        btnExibir.onclick = function(){
            exibirGuia(item);
        };

        const btnDownload = document.createElement("button");
        btnDownload.innerText = "⬇ Download";
        btnDownload.onclick = function(){
            downloadGuia(item);
        };

        card.appendChild(titulo);
        card.appendChild(info);
        card.appendChild(btnExibir);
        card.appendChild(btnDownload);

        lista.appendChild(card);
    });

    document.querySelector("#areaLista h2").innerText = "Selecione um guia";
}

carregarGuias();
</script>

</body>
</html>
