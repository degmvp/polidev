<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Conteúdos POLYDEV</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

</head>

<body>

<h2>Lista de Conteúdos</h2>

<table border="1">
<thead>
<tr>
<th>Título</th>
<th>Categoria</th>
<th>Downloads</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>

<script>

// 🔐 Verifica login
async function verificarUsuario() {
    const { data: { user } } = await db.auth.getUser()

    if (!user) {
        alert("Você precisa fazer login")
        window.location.href = "login.html"
    }
}
verificarUsuario()

// 📊 Carregar conteúdos + contagem
async function carregar(){

    const { data: conteudos, error: erro1 } = await db
        .from("conteudos")
        .select("*")

    const { data: downloads, error: erro2 } = await db
        .from("downloads")
        .select("conteudo_id")

    if (erro1) {
        console.log("Erro conteudos:", erro1)
        return
    }

    if (erro2) {
        console.log("Erro downloads:", erro2)
        return
    }

    let tabela = document.getElementById("tabela")
    tabela.innerHTML = ""

    // 🔢 Contagem manual
    let contagem = {}

    downloads.forEach(d => {
        contagem[d.conteudo_id] = (contagem[d.conteudo_id] || 0) + 1
    })

    // 📋 Montar tabela
    conteudos.forEach(item => {

        let total = contagem[item.id] || 0

        let linha = document.createElement("tr")

        linha.innerHTML = `
            <td>${item.titulo}</td>
            <td>${item.categoria}</td>
            <td>${total}</td>
            <td>
                <button onclick="baixar(${item.id}, '${item.arquivo_url}')">
                    Download
                </button>
            </td>
        `

        tabela.appendChild(linha)
    })

}

// 🚀 Executa
carregar()

// 📥 Download + registro
async function baixar(id, url) {

    const { data: { user } } = await db.auth.getUser()

    if (!user) {
        alert("Faça login primeiro")
        return
    }

    const { error } = await db
        .from("downloads")
        .insert([
            {
                conteudo_id: id,
                email: user.email,
                ip: "0.0.0.0"
            }
        ])

    if (error) {
        console.log("ERRO:", error)
        alert("Erro ao registrar download")
        return
    }

    alert("Download registrado com sucesso!")

    let base = "https://degmvp.github.io/polidev/"
    window.open(base + url, "_blank")
}

</script>

</body>
</html>
