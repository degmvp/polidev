<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>POLYDEV - Conteúdos</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
body{
    background:navy;
    color:white;
    font-family:Arial;
    margin:20px;
}

h1{
    text-align:center;
    color:lightgreen;
}

#lista{
    max-width:900px;
    margin:auto;
}

.card{
    background:black;
    border:1px solid yellowgreen;
    border-radius:10px;
    padding:15px;
    margin:10px 0;
}

button{
    background:yellowgreen;
    border:0;
    padding:10px;
    font-weight:bold;
    cursor:pointer;
    margin:5px;
}

#viewer{
    display:none;
    max-width:1000px;
    margin:20px auto;
    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
    border:3px solid yellowgreen;
}
</style>
</head>

<body>

<h1>POLYDEV - GUIAS</h1>

<div id="lista">Carregando...</div>

<div id="viewer">
    <button onclick="voltar()">⬅ Voltar</button>
    <button id="btnDownload">⬇ Download</button>
    <hr>
    <div id="conteudo"></div>
</div>

<script>

// 🔥 BASE FIXA (SEM ERRO)
const BASE = "https://degmvp.github.io/polidev/";

// 🔧 FUNÇÃO CENTRAL DE CAMINHO (RESOLVE 404)
function montarCaminho(arquivo){

    arquivo = String(arquivo || "").trim();

    // se já vier completo
    if(arquivo.startsWith("http")){
        return arquivo;
    }

    // remove barra inicial se houver
    arquivo = arquivo.replace(/^\/+/, "");

    return BASE + arquivo;
}

// 🔹 CARREGAR LISTA
async function carregar(){

    const lista = document.getElementById("lista");

    const { data, error } = await db
        .from("conteudos")
        .select("*")
        .order("id", { ascending:true });

    if(error){
        lista.innerHTML = "Erro ao carregar";
        console.error(error);
        return;
    }

    lista.innerHTML = "";

    data.forEach(item => {

        // 🔒 garante que só entra quem tem caminho válido
        if(!item.arquivo){
            return;
        }

        const titulo =
            item.titulo ||
            item.nome ||
            item.arquivo;

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h2>${titulo}</h2>
            <p><b>Arquivo:</b> ${item.arquivo}</p>
            <p><b>Downloads:</b> ${item.downloads || 0}</p>
            <button>Exibir guia</button>
        `;

        div.querySelector("button").onclick = () => abrir(item);

        lista.appendChild(div);
    });
}

// 🔹 ABRIR GUIA
async function abrir(item){

    document.getElementById("lista").style.display = "none";
    document.getElementById("viewer").style.display = "block";

    const caminho = montarCaminho(item.arquivo);

    console.log("ABRINDO:", caminho);

    document.getElementById("conteudo").innerHTML = "Carregando...";

    try{
        const r = await fetch(caminho);

        if(!r.ok){
            throw new Error("HTTP " + r.status);
        }

        const html = await r.text();
        document.getElementById("conteudo").innerHTML = html;

    }catch(e){
        document.getElementById("conteudo").innerHTML =
            "<p style='color:red'>Erro ao abrir:<br>" + caminho + "</p>";
        console.error(e);
    }

    document.getElementById("btnDownload").onclick = () => baixar(item);
}

// 🔹 VOLTAR
function voltar(){
    document.getElementById("viewer").style.display = "none";
    document.getElementById("lista").style.display = "block";
}

// 🔹 DOWNLOAD + INCREMENTO
async function baixar(item){

    const caminho = montarCaminho(item.arquivo);

    // download
    const a = document.createElement("a");
    a.href = caminho;
    a.download = item.arquivo.split("/").pop();
    a.click();

    // incremento
    try{

        const { data } = await db
            .from("conteudos")
            .select("downloads")
            .eq("id", item.id)
            .single();

        const novo = (data.downloads || 0) + 1;

        await db
            .from("conteudos")
            .update({ downloads: novo })
            .eq("id", item.id);

        console.log("Download atualizado:", novo);

    }catch(e){
        console.error(e);
    }
}

// 🚀 START
carregar();

</script>

</body>
</html>
