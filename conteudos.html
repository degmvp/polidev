<!DOCTYPE html>
<html>
<link rel="stylesheet" href="style.css">
<head>
<meta charset="UTF-8">
<title>Conteúdos POLYDEV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

</head>

<body>

<h2>Lista de Conteúdos</h2>

<table border="1">
<thead>
<tr>
<th>Título</th>
<th>Categoria</th>
<th>Downloads</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>

<script>

// pegar categoria da URL
const params = new URLSearchParams(window.location.search)
const categoria = params.get("categoria")

async function carregar(){

    let query = db.from("conteudos").select("*")

    if(categoria){
        query = query.eq("categoria", categoria)
    }

    const { data, error } = await query

    if(error){
        console.log(error)
        alert("Erro ao carregar dados")
        return
    }

    let tabela = document.getElementById("tabela")
    tabela.innerHTML = ""

    data.forEach(item => {
        tabela.innerHTML += `
        <tr>
            <td>${item.titulo}</td>
            <td>${item.categoria}</td>
            <td>${item.downloads}</td>
            <td>
                <button onclick="baixar(${item.id}, '${item.arquivo_url}')">
                Download
                </button>
            </td>
        </tr>
        `
    })

}

carregar()

</script>

<script>
let usuario = null

async function verificarUsuario() {
    const { data: { user } } = await db.auth.getUser()

    if (!user) {
        alert("Você precisa fazer login")
        window.location.href = "login.html"
    } else {
        usuario = user
        console.log("Usuário logado:", user.email)
    }
}

verificarUsuario()

// FUNÇÃO FINAL 1.0
async function baixar(id, url) {

    const { data: { user } } = await db.auth.getUser()

    if (!user) {
        alert("Faça login primeiro")
        return
    }

    const { error } = await db
        .from("downloads")
        .insert([
            {
                conteudo_id: id,
                email: user.email,
                ip: "0.0.0.0"
            }
        ])

    if (error) {
        console.log("ERRO INSERT:", error)
        alert("Erro ao registrar download")
        return
    }
    console.log("Download registrado:", id)
    alert("Download registrado com sucesso!")

    // SÓ ABRE depois de gravar
    let base = "https://degmvp.github.io/polidev/"
    window.open(base + url, "_blank")
}


</script>

</body>
</html>
