<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>POLYDEV - Conteúdos</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
body{
    background:navy;
    color:white;
    font-family:Arial;
    margin:20px;
}
h1{
    text-align:center;
    color:lightgreen;
}
#lista{
    max-width:900px;
    margin:auto;
}
.card{
    background:black;
    border:1px solid yellowgreen;
    border-radius:10px;
    padding:15px;
    margin:10px 0;
}
button{
    background:yellowgreen;
    border:0;
    padding:10px;
    font-weight:bold;
    cursor:pointer;
    margin:5px;
}
#viewer{
    display:none;
    max-width:1000px;
    margin:20px auto;
    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
    border:3px solid yellowgreen;
}
.erro{
    background:#300;
    color:white;
    padding:15px;
    border:1px solid red;
    border-radius:8px;
}
</style>
</head>

<body>

<h1>POLYDEV - GUIAS</h1>

<div id="lista">Carregando...</div>

<div id="viewer">
    <button onclick="voltar()">⬅ Voltar</button>
    <button id="btnDownload">⬇ Download</button>
    <hr>
    <div id="conteudo"></div>
</div>

<script>
const BASE = "https://degmvp.github.io/polidev/";

const banco =
    window.db ||
    window.supabaseClient ||
    window.client ||
    (typeof db !== "undefined" ? db : null);

function erroTela(msg){
    document.getElementById("lista").innerHTML =
        `<div class="erro">${msg}</div>`;
}

function montarCaminho(arquivo){
    arquivo = String(arquivo || "").trim();

    if(!arquivo){
        return "";
    }

    if(arquivo.startsWith("http")){
        return arquivo;
    }

    arquivo = arquivo.replace(/^\/+/, "");

    return BASE + arquivo;
}

async function carregar(){

    const lista = document.getElementById("lista");

    if(!banco){
        erroTela(`
            ERRO: cliente Supabase não encontrado.<br><br>
            O arquivo <b>config.js</b> foi carregado, mas não criou uma variável global chamada
            <b>db</b>, <b>supabaseClient</b> ou <b>client</b>.
        `);
        return;
    }

    lista.innerHTML = "Carregando conteúdos do banco...";

    try{
        const { data, error } = await banco
            .from("conteudos")
            .select("*")
            .order("id", { ascending:true });

        if(error){
            console.error(error);
            erroTela("Erro ao consultar a tabela conteudos. Veja o console.");
            return;
        }

        if(!data || data.length === 0){
            lista.innerHTML = "Nenhum conteúdo encontrado.";
            return;
        }

        lista.innerHTML = "";

        data.forEach(item => {

            if(!item.arquivo){
                return;
            }

            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <h2>${item.titulo || item.nome || item.arquivo}</h2>
                <p><b>Arquivo:</b> ${item.arquivo}</p>
                <p><b>Downloads:</b> ${item.downloads || 0}</p>
                <button>Exibir guia</button>
            `;

            div.querySelector("button").onclick = () => abrir(item);

            lista.appendChild(div);
        });

        if(lista.innerHTML.trim() === ""){
            lista.innerHTML = "Nenhum guia com campo arquivo foi encontrado.";
        }

    }catch(e){
        console.error(e);
        erroTela("Erro geral ao carregar conteúdos. Veja o console.");
    }
}

async function abrir(item){

    document.getElementById("lista").style.display = "none";
    document.getElementById("viewer").style.display = "block";

    const caminho = montarCaminho(item.arquivo);

    document.getElementById("conteudo").innerHTML = "Carregando guia...";

    try{
        const r = await fetch(caminho);

        if(!r.ok){
            throw new Error("HTTP " + r.status);
        }

        const html = await r.text();
        document.getElementById("conteudo").innerHTML = html;

    }catch(e){
        console.error(e);
        document.getElementById("conteudo").innerHTML =
            `<p style="color:red">Erro ao abrir:<br>${caminho}</p>`;
    }

    document.getElementById("btnDownload").onclick = () => baixar(item);
}

function voltar(){
    document.getElementById("viewer").style.display = "none";
    document.getElementById("lista").style.display = "block";
    document.getElementById("conteudo").innerHTML = "";
}

async function baixar(item){

    const caminho = montarCaminho(item.arquivo);

    const a = document.createElement("a");
    a.href = caminho;
    a.download = item.arquivo.split("/").pop();
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    try{
        const atual = item.downloads || 0;
        const novo = atual + 1;

        const { error } = await banco
            .from("conteudos")
            .update({ downloads: novo })
            .eq("id", item.id);

        if(error){
            console.error(error);
            return;
        }

        item.downloads = novo;

    }catch(e){
        console.error(e);
    }
}

carregar();
</script>

</body>
</html>
