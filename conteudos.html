<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">

<style>
body {

}

header {
    text-align: center;

    border-bottom: 1px solid #FFD700;
}

.container {
    width: 90%;

}

.card {
    background: #111;
    padding: 20px;
    margin: 15px 0;
    border-left: 5px solid #FFD700;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: #FFD700;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: gold;
}

#viewer {
    display: none;
    width: 100%;
    height: 80vh;
    border: none;
}

#voltar {
    display: none;
    margin: 10px;
}
</style>

</head>

<body>

<header>
    <h1>📚 Biblioteca POLYDEV</h1>
</header>

<button id="voltar" onclick="voltar()">⬅ Voltar</button>

<div class="container" id="lista">
Carregando conteúdos...
</div>

<iframe id="viewer"></iframe>

<script>

const BASE = "/polidev";
const URL = "https://vdpucrilxzlnxxnaohdh.supabase.co/rest/v1/conteudos?select=*";
const APIKEY = "sb_publishable_iCOZMw9xc0QZaGQWTHdxMQ_O33nfE42";

async function carregar(){

const resp = await fetch(URL, {
headers: { "apikey": APIKEY }
});

const data = await resp.json();

let html = "";

data.forEach(c => {

html += `
<div class="card">
<h3>${c.titulo}</h3>
<p>${c.descricao}</p>

<button onclick="abrir('${c.arquivo_url}')">
Abrir Conteúdo
</button>
</div>
`;

});

document.getElementById("lista").innerHTML = html;

}

function abrir(url){

document.getElementById("viewer").src = BASE + url;

document.getElementById("lista").style.display = "none";
document.getElementById("viewer").style.display = "block";
document.getElementById("voltar").style.display = "inline-block";

}

function voltar(){

document.getElementById("viewer").style.display = "none";
document.getElementById("lista").style.display = "block";
document.getElementById("voltar").style.display = "none";

}

carregar();

</script>

</body>
</html>
