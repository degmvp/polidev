<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>POLYDEV - CONTEÚDOS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
    background:navy;
    color:white;
    font-family:Arial, sans-serif;
    margin:20px;
}

h1{
    color:lightgreen;
    text-align:center;
}

h2{
    color:yellowgreen;
    text-align:center;
}

#listaGuias{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
    gap:18px;
    margin-top:25px;
}

.card{
    background:black;
    border:2px solid yellowgreen;
    border-radius:12px;
    padding:18px;
    text-align:center;
}

.card h3{
    color:lightgreen;
}

button{
    padding:10px 18px;
    margin:6px;
    background:yellowgreen;
    color:black;
    border:0;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:limegreen;
}

#areaViewer{
    display:none;
    margin-top:20px;
}

#viewer{
    width:100%;
    height:650px;
    background:white;
    border:3px solid yellowgreen;
    border-radius:10px;
}

.barra{
    text-align:center;
    margin-bottom:15px;
}
</style>
</head>

<body>

<h1>POLYDEV - GUIAS</h1>

<div id="areaLista">
    <h2>Carregando guias...</h2>
    <div id="listaGuias"></div>
</div>

<div id="areaViewer">
    <div class="barra">
        <button onclick="voltar()">⬅ Voltar</button>
        <button id="btnDownloadAtual">⬇ Download</button>
    </div>

    <iframe id="viewer"></iframe>
</div>

<script>
// 🔥 CONFIG SUPABASE (USE O SEU)
const SUPABASE_URL = "https://vdpucrilxzlnxxnaohdh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcHVjcmlseHpsbnh4bmFvaGRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0OTc0NzIsImV4cCI6MjA4ODA3MzQ3Mn0.hdGtfK0eQf0-Iu_LqYqKKLvt8189euaGy-mmGMALJ_I";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const BASE_URL = "https://degmvp.github.io/polidev/";

function pegarArquivo(item){
    return item.downloads || item.download || item.arquivo || item.url || "";
}

function pegarNome(item){
    return item.nome || item.titulo || item.descricao || "Guia sem nome";
}

function montarCaminho(item){
    let arquivo = pegarArquivo(item);

    if(!arquivo){
        return "";
    }

    arquivo = arquivo.trim();
    arquivo = arquivo.replace(/^\/+/, "");

    if(arquivo.startsWith("http")){
        return arquivo;
    }

    if(arquivo.startsWith("downloads/")){
        return BASE_URL + arquivo;
    }

    if(item.categoria === "bancos" || item.categoria === "sql"){
        return BASE_URL + "downloads/bancos/" + arquivo;
    }

    if(item.categoria === "linguagens"){
        return BASE_URL + "downloads/linguagens/" + arquivo;
    }

    return BASE_URL + "downloads/bancos/" + arquivo;
}

function exibirGuia(item){
    const url = montarCaminho(item);

    console.log("ABRINDO:", url);

    if(!url){
        alert("Arquivo não encontrado neste registro.");
        return;
    }

    document.getElementById("viewer").src = url;
    document.getElementById("areaLista").style.display = "none";
    document.getElementById("areaViewer").style.display = "block";

    document.getElementById("btnDownloadAtual").onclick = function(){
        downloadArquivo(item);
    };
}

function voltar(){
    document.getElementById("viewer").src = "";
    document.getElementById("areaViewer").style.display = "none";
    document.getElementById("areaLista").style.display = "block";
}

function downloadArquivo(item){
    const url = montarCaminho(item);
    const arquivo = pegarArquivo(item).split("/").pop();

    console.log("DOWNLOAD:", url);

    if(!url){
        alert("Arquivo não encontrado para download.");
        return;
    }

    const a = document.createElement("a");
    a.href = url;
    a.download = arquivo;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

async function carregarGuias(){
    const { data, error } = await db
        .from("conteudos")
        .select("*")
        .order("id", { ascending:true });

    if(error){
        console.error("ERRO SUPABASE:", error);
        document.querySelector("#areaLista h2").innerText = "Erro ao carregar guias";
        return;
    }

    console.log("COLUNAS DO BANCO:", data && data.length ? Object.keys(data[0]) : []);
    console.log("REGISTROS:", data);

    const lista = document.getElementById("listaGuias");
    lista.innerHTML = "";

    if(!data || data.length === 0){
        document.querySelector("#areaLista h2").innerText = "Nenhum guia encontrado";
        return;
    }

    let totalExibidos = 0;

    data.forEach(item => {
        const arquivo = pegarArquivo(item);

        console.log("ITEM:", item);
        console.log("ARQUIVO DETECTADO:", arquivo);

        if(!arquivo){
            return;
        }

        const card = document.createElement("div");
        card.className = "card";

        const titulo = document.createElement("h3");
        titulo.innerText = pegarNome(item);

        const btnExibir = document.createElement("button");
        btnExibir.innerText = "📖 Exibir";
        btnExibir.onclick = function(){
            exibirGuia(item);
        };

        const btnDownload = document.createElement("button");
        btnDownload.innerText = "⬇ Download";
        btnDownload.onclick = function(){
            downloadArquivo(item);
        };

        card.appendChild(titulo);
        card.appendChild(btnExibir);
        card.appendChild(btnDownload);

        lista.appendChild(card);
        totalExibidos++;
    });

    if(totalExibidos === 0){
        document.querySelector("#areaLista h2").innerText =
            "Registros encontrados, mas nenhum campo downloads/arquivo foi localizado";
    }else{
        document.querySelector("#areaLista h2").innerText =
            "Selecione um guia";
    }
}

carregarGuias();
</script>

</body>
</html>
