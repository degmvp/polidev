<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>POLYDEV - GUIAS</title>

<style>
body{background:navy;color:white;font-family:Arial;margin:20px;}
h1{color:lightgreen;text-align:center;}
h2{color:yellowgreen;text-align:center;}
#status{text-align:center;color:lightgreen;font-weight:bold;margin:15px;}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-bottom:30px;
}

.card{
    background:black;
    border:1px solid yellowgreen;
    border-radius:10px;
    padding:15px;
    text-align:center;
}

.card h3{color:lightgreen;}

button{
    width:100%;
    margin:6px 0;
    padding:10px;
    background:yellowgreen;
    border:0;
    font-weight:bold;
    cursor:pointer;
    border-radius:6px;
}

button:hover{background:lightgreen;}

#areaViewer{display:none;}

.acoes{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

.acoes button{
    width:auto;
    min-width:160px;
}

.viewer{
    background:white;
    border:3px solid yellowgreen;
    border-radius:10px;
    padding:10px;
}

iframe{
    width:100%;
    height:700px;
    border:0;
    border-radius:10px;
}

@media(max-width:800px){
    .acoes{flex-direction:column;}
    .acoes button{width:100%;}
    iframe{height:620px;}
}
</style>
</head>

<body>

<h1>📚 POLYDEV - GUIAS</h1>

<div id="status">Escolha um guia.</div>

<div id="areaMenu">

    <h2>🗄️ Bancos de Dados</h2>
    <div id="bancos" class="grid"></div>

    <h2>💻 Linguagens</h2>
    <div id="linguagens" class="grid"></div>

</div>

<div id="areaViewer">

    <div class="acoes">
        <button onclick="voltar()">⬅ Voltar</button>
        <button onclick="baixarGuiaAtual()">📥 Download Guia</button>
    </div>

    <div class="viewer">
        <iframe id="viewer"></iframe>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>
const BASE = "downloads";
let guiaAtual = null;
let db = null;

const bancos = [
    { id:1, nome:"MySQL", arq:"html_mysql_guia.html" },
    { id:2, nome:"SQL Server", arq:"html_sqlserver_guia.html" },
    { id:3, nome:"PostgreSQL", arq:"html_postgres_guia.html" },
    { id:4, nome:"Oracle 23 Guia", arq:"html_ora23_guia.html" },
    { id:5, nome:"Oracle Backup", arq:"html_ora23_backup.html" },
    { id:6, nome:"Oracle Comandos", arq:"html_ora23_cmd.html" },
    { id:7, nome:"Oracle PL/SQL", arq:"html_ora23_pl.html" }
];

const linguagens = [
    { id:8, nome:"Python", arq:"html_python_prog1.html" },
    { id:9, nome:"C++", arq:"html_cpp_prog1.html" },
    { id:10, nome:"JavaScript", arq:"html_js_prog1.html" },
    { id:11, nome:"Node.js", arq:"html_nodejs_prog1.html" },
    { id:12, nome:"Go", arq:"html_go_prog1.html" },
    { id:13, nome:"Rust", arq:"html_rust_prog1.html" },
    { id:14, nome:"Ruby", arq:"html_ruby_prog1.html" },
    { id:15, nome:"Pandas", arq:"html_pandas_prog1.html" }
];

function iniciarSupabase(){
    try{
        if(typeof SUPABASE_URL === "undefined" || typeof SUPABASE_KEY === "undefined"){
            console.warn("config.js não carregou SUPABASE_URL ou SUPABASE_KEY.");
            return;
        }

        if(!window.supabase){
            console.warn("Biblioteca Supabase não carregada.");
            return;
        }

        db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        console.log("Supabase inicializado.");
    }catch(e){
        console.error("Erro ao iniciar Supabase:", e);
    }
}

function montarMenu(lista, pasta, destino){
    const area = document.getElementById(destino);
    area.innerHTML = "";

    lista.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        const titulo = document.createElement("h3");
        titulo.innerText = item.nome;

        const btnLer = document.createElement("button");
        btnLer.innerText = "📖 Ler Guia";
        btnLer.onclick = function(){
            abrirGuia(pasta, item);
        };

        const btnDownload = document.createElement("button");
        btnDownload.innerText = "📥 Download Guia";
        btnDownload.onclick = function(){
            downloadDireto(pasta, item);
        };

        card.appendChild(titulo);
        card.appendChild(btnLer);
        card.appendChild(btnDownload);

        area.appendChild(card);
    });
}

function abrirGuia(pasta, item){
    const caminho = `${BASE}/${pasta}/${item.arq}`;

    guiaAtual = {
        id: item.id,
        nome: item.nome,
        caminho: caminho
    };

    document.getElementById("areaMenu").style.display = "none";
    document.getElementById("areaViewer").style.display = "block";
    document.getElementById("viewer").src = caminho;
    document.getElementById("status").innerText = "Exibindo: " + item.nome;
}

function voltar(){
    document.getElementById("viewer").src = "";
    document.getElementById("areaViewer").style.display = "none";
    document.getElementById("areaMenu").style.display = "block";
    document.getElementById("status").innerText = "Escolha um guia.";
    guiaAtual = null;
}

async function incrementarDownload(id){
    if(!db){
        alert("Supabase não inicializado. Verifique o arquivo config.js.");
        return false;
    }

    const { error } = await db.rpc("incrementar_download", {
        p_id: id
    });

    if(error){
        console.error("Erro ao incrementar download:", error);
        alert("Erro ao registrar download.");
        return false;
    }

    return true;
}

async function baixarGuiaAtual(){
    if(!guiaAtual){
        alert("Escolha um guia primeiro.");
        return;
    }

    const ok = await incrementarDownload(guiaAtual.id);

    if(!ok){
        return;
    }

    const link = document.createElement("a");
    link.href = guiaAtual.caminho;
    link.download = guiaAtual.caminho.split("/").pop();

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    document.getElementById("status").innerText =
        "Download registrado: " + guiaAtual.nome;
}

async function downloadDireto(pasta, item){
    const caminho = `${BASE}/${pasta}/${item.arq}`;

    guiaAtual = {
        id: item.id,
        nome: item.nome,
        caminho: caminho
    };

    await baixarGuiaAtual();
}

iniciarSupabase();
montarMenu(bancos, "bancos", "bancos");
montarMenu(linguagens, "linguagens", "linguagens");
</script>

</body>
</html>
