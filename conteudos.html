<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Conteúdos POLYDEV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

</head>

<body>

<h2>Lista de Conteúdos</h2>

<table border="1">
<thead>
<tr>
<th>Título</th>
<th>Categoria</th>
<th>Download</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>

<script>

const params = new URLSearchParams(window.location.search)
const categoria = params.get("categoria")

async function carregar(){

let query = db.from("conteudos").select("*")

if(categoria){
query = query.eq("categoria", categoria)
}

const { data, error } = await query

let tabela = document.getElementById("tabela")
tabela.innerHTML = ""

data.forEach(item => {
tabela.innerHTML += `
<tr>
<td>${item.titulo}</td>
<td>${item.categoria}</td>
<td>
<button onclick="baixar(${item.id}, '${item.arquivo_url}')">
Download
</button>
</td>
</tr>
`
})

}

carregar()

</script>
<script>
async function baixar(id, url) {

    const { error } = await db
        .from("downloads")
        .insert([
            {
                conteudo_id: id,
                email: "anonimo@polydev.com",
                ip: "0.0.0.0"
            }
        ])

    if (error) {
        console.log("Erro ao registrar download:", error)
        alert("Erro ao registrar download")
        return
    }

    console.log("Download registrado com sucesso")

    // abre o arquivo
    window.open(url, "_blank")
}
</script>
</body>
</html>
