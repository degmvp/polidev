<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Conteúdos POLYDEV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

</head>

<body>

<h2>Lista de Conteúdos</h2>

<table border="1">
<thead>
<tr>
<th>Título</th>
<th>Categoria</th>
<th>Downloads</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>

<script>

// pegar categoria da URL
const params = new URLSearchParams(window.location.search)
const categoria = params.get("categoria")

async function carregar(){

    let query = db.from("conteudos").select("*")

    if(categoria){
        query = query.eq("categoria", categoria)
    }

    const { data, error } = await query

    if(error){
        console.log(error)
        alert("Erro ao carregar dados")
        return
    }

    let tabela = document.getElementById("tabela")
    tabela.innerHTML = ""

    data.forEach(item => {
        tabela.innerHTML += `
        <tr>
            <td>${item.titulo}</td>
            <td>${item.categoria}</td>
            <td>${item.downloads}</td>
            <td>
                <button onclick="baixar(${item.id}, '${item.arquivo_url}')">
                Download
                </button>
            </td>
        </tr>
        `
    })

}

carregar()

</script>

<script>

// FUNÇÃO FINAL 1.0
async function baixar(id, url) {

    // buscar downloads atuais
    const { data: item, error } = await db
        .from("conteudos")
        .select("downloads")
        .eq("id", id)
        .single()

    if(error){
        console.log(error)
        alert("Erro ao buscar downloads")
        return
    }

    let total = item.downloads + 1

    // atualizar contador
    const { error: erroUpdate } = await db
        .from("conteudos")
        .update({ downloads: total })
        .eq("id", id)

    if(erroUpdate){
        console.log(erroUpdate)
        alert("Erro ao atualizar downloads")
        return
    }

    // abrir arquivo
    window.open(url, "_blank")
}

</script>

</body>
</html>
