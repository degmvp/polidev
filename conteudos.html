<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>POLYDEV - Conteúdos</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
body{
    background:navy;
    color:white;
    font-family:Arial;
    margin:20px;
}

h1{
    text-align:center;
    color:lightgreen;
}

#lista{
    max-width:900px;
    margin:auto;
}

.card{
    background:black;
    border:1px solid yellowgreen;
    border-radius:10px;
    padding:15px;
    margin:10px 0;
}

button{
    background:yellowgreen;
    border:0;
    padding:10px;
    font-weight:bold;
    cursor:pointer;
    margin:5px;
}

#viewer{
    display:none;
    max-width:1000px;
    margin:20px auto;
    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
    border:3px solid yellowgreen;
}
</style>
</head>

<body>

<h1>POLYDEV - GUIAS</h1>

<div id="lista">Carregando...</div>

<div id="viewer">
    <button onclick="voltar()">⬅ Voltar</button>
    <button id="btnDownload">⬇ Download</button>
    <hr>
    <div id="conteudo"></div>
</div>

<script>

const BASE = "https://degmvp.github.io/polidev/";

function montarCaminho(arquivo){
    if(!arquivo) return null;
    arquivo = arquivo.trim().replace(/^\/+/, "");
    return BASE + arquivo;
}

async function carregar(){

    const lista = document.getElementById("lista");
    lista.innerHTML = "Carregando...";

    try{

        const { data, error } = await db
            .from("conteudos")
            .select("*")
            .order("id");

        if(error){
            throw error;
        }

        if(!data || data.length === 0){
            lista.innerHTML = "Sem dados";
            return;
        }

        console.log("DADOS:", data);

        lista.innerHTML = "";

        data.forEach(item => {

            if(!item.arquivo){
                console.log("IGNORADO (sem arquivo):", item);
                return;
            }

            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <h2>${item.titulo || item.nome || item.arquivo}</h2>
                <p>${item.arquivo}</p>
                <p>Downloads: ${item.downloads || 0}</p>
                <button>Exibir</button>
            `;

            div.querySelector("button").onclick = () => abrir(item);

            lista.appendChild(div);
        });

    }catch(e){
        console.error("ERRO GERAL:", e);
        lista.innerHTML = "<p style='color:red'>Erro ao carregar (ver console)</p>";
    }
}

async function abrir(item){

    const viewer = document.getElementById("viewer");
    const lista = document.getElementById("lista");

    lista.style.display = "none";
    viewer.style.display = "block";

    const caminho = montarCaminho(item.arquivo);

    console.log("ABRINDO:", caminho);

    if(!caminho){
        document.getElementById("conteudo").innerHTML = "Arquivo inválido";
        return;
    }

    try{

        const r = await fetch(caminho);

        if(!r.ok){
            throw new Error("HTTP " + r.status);
        }

        const html = await r.text();
        document.getElementById("conteudo").innerHTML = html;

    }catch(e){
        console.error("ERRO FETCH:", e);
        document.getElementById("conteudo").innerHTML =
            "<p style='color:red'>Erro ao abrir:<br>" + caminho + "</p>";
    }

    document.getElementById("btnDownload").onclick = () => baixar(item);
}

function voltar(){
    document.getElementById("viewer").style.display = "none";
    document.getElementById("lista").style.display = "block";
}

async function baixar(item){

    const caminho = montarCaminho(item.arquivo);

    const a = document.createElement("a");
    a.href = caminho;
    a.download = item.arquivo.split("/").pop();
    a.click();

    try{

        const { data } = await db
            .from("conteudos")
            .select("downloads")
            .eq("id", item.id)
            .single();

        const novo = (data.downloads || 0) + 1;

        await db
            .from("conteudos")
            .update({ downloads: novo })
            .eq("id", item.id);

        console.log("OK download:", novo);

    }catch(e){
        console.error("ERRO UPDATE:", e);
    }
}

carregar();

</script>
</body>
</html>
