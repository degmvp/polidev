<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>POLYDEV - Guias</title>

<style>
body{
    background:navy;
    color:white;
    font-family:Arial;
    margin:20px;
}

h1{
    color:lightgreen;
    text-align:center;
}

h2{
    color:yellowgreen;
}

.container{
    display:flex;
    gap:20px;
}

.menu{
    width:32%;
    background:black;
    border:1px solid yellowgreen;
    padding:15px;
}

.viewer{
    width:68%;
    background:white;
    color:black;
    border:3px solid yellowgreen;
    min-height:600px;
}

button{
    display:block;
    width:100%;
    margin:8px 0;
    padding:10px;
    background:yellowgreen;
    color:black;
    border:0;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:lightgreen;
}

iframe{
    width:100%;
    height:650px;
    border:0;
}

#status{
    color:lightgreen;
    font-weight:bold;
    margin-bottom:10px;
}
</style>
</head>

<body>

<h1>📚 POLYDEV - GUIAS</h1>

<div id="status">Escolha um guia para visualizar.</div>

<div class="container">

    <div class="menu">
        <h2>🗄️ Bancos</h2>
        <div id="bancos"></div>

        <h2>💻 Linguagens</h2>
        <div id="linguagens"></div>
    </div>

    <div class="viewer">
        <iframe id="visualizador"></iframe>
    </div>

</div>

<script>

const BASE = "downloads";

const bancos = [
    { titulo:"MySQL", arquivo:"bancos/html_mysql_guia.html" },
    { titulo:"Oracle 23 Backup", arquivo:"bancos/html_ora23_backup.html" },
    { titulo:"Oracle 23 Comandos", arquivo:"bancos/html_ora23_cmd.html" },
    { titulo:"Oracle 23 Guia", arquivo:"bancos/html_ora23_guia.html" },
    { titulo:"Oracle 23 PL/SQL", arquivo:"bancos/html_ora23_pl.html" },
    { titulo:"PostgreSQL", arquivo:"bancos/html_postgres_guia.html" },
    { titulo:"SQL Server", arquivo:"bancos/html_sqlserver_guia.html" }
];

const linguagens = [
    { titulo:"C++", arquivo:"linguagens/html_cpp_prog1.html" },
    { titulo:"Go", arquivo:"linguagens/html_go_prog1.html" },
    { titulo:"JavaScript", arquivo:"linguagens/html_js_prog1.html" },
    { titulo:"Knex", arquivo:"linguagens/html_knex_prog1.html" },
    { titulo:"Node.js", arquivo:"linguagens/html_nodejs_prog1.html" },
    { titulo:"OOP C++", arquivo:"linguagens/html_oopcpp_prog1.html" },
    { titulo:"OOP Go", arquivo:"linguagens/html_oopgo_prog1.html" },
    { titulo:"OOP Python", arquivo:"linguagens/html_ooppy_prog1.html" },
    { titulo:"OOP Rust", arquivo:"linguagens/html_ooprust_prog1.html" },
    { titulo:"Pandas", arquivo:"linguagens/html_pandas_prog1.html" },
    { titulo:"Python", arquivo:"linguagens/html_python_prog1.html" },
    { titulo:"Ruby", arquivo:"linguagens/html_ruby_prog1.html" },
    { titulo:"Rust", arquivo:"linguagens/html_rust_rog1.html" }
];

function abrirGuia(caminho, titulo){
    document.getElementById("visualizador").src = caminho;
    document.getElementById("status").innerText = "Exibindo: " + titulo;
}

function montarMenu(lista, destino){
    const area = document.getElementById(destino);
    area.innerHTML = "";

    lista.forEach(item => {
        const caminho = BASE + "/" + item.arquivo;

        const botao = document.createElement("button");
        botao.innerText = item.titulo;
        botao.onclick = function(){
            abrirGuia(caminho, item.titulo);
        };

        area.appendChild(botao);
    });
}

montarMenu(bancos, "bancos");
montarMenu(linguagens, "linguagens");

</script>

</body>
</html>
