<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>POLYDEV | Viewer Genérico</title>

<!-- 🔴 O QUE FALTAVA -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:yellowgreen;
    text-align:center;
}

header{
    background:black;
    color:#FFD700;
    padding:20px;
}

.container{
    display:flex;
    gap:10px;
    padding:10px;
}

.menu{
    width:30%;
    background:black;
    color:white;
    padding:10px;
    border-radius:10px;
    overflow-y:auto;
    max-height:75vh;
}

.viewer{
    width:70%;
    background:white;
    border:3px solid black;
    border-radius:10px;
    padding:10px;
}

button{
    width:100%;
    margin:5px 0;
    padding:10px;
    background:yellowgreen;
    border:0;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#FFD700;
}

.action{
    width:auto;
    margin:10px;
    background:black;
    color:#FFD700;
}

iframe{
    width:100%;
    height:60vh;
    border:0;
}

pre{
    background:black;
    color:white;
    padding:15px;
    overflow:auto;
    height:60vh;
}

.status{
    margin:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
    <h1>📚 POLYDEV Viewer</h1>
</header>

<div class="status" id="status">Carregando conteúdos...</div>

<div class="container">

    <div class="menu">
        <h2 id="tituloMenu"></h2>
        <div id="lista"></div>
    </div>

    <div class="viewer">
        <h2 id="tituloViewer">Selecione</h2>

        <button class="action" onclick="baixar()">⬇ Download</button>
        <button class="action" onclick="voltar()">⬅ Voltar</button>

        <div id="conteudo">Nenhum conteúdo</div>
    </div>

</div>

<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let dados = [];
let atual = null;

function getCategoria(){
    const p = new URLSearchParams(window.location.search);
    return p.get("categoria") || "lang";
}

function limparPath(p){
    if(!p) return "";

    p = p.trim();
    p = p.replace(/^\/+/, "");

    p = p.replace("downloads/html/bancos/","downloads/bancos/");
    p = p.replace("/downloads/html/bancos/","downloads/bancos/");

    return p;
}

async function carregar(){

    const cat = getCategoria();

    document.getElementById("tituloMenu").innerText =
        cat === "sql" ? "Guias SQL" : "Linguagens";

    const { data, error } = await db
        .from("conteudos")
        .select("*")
        .eq("categoria", cat)
        .eq("ativo", true)
        .order("id");

    if(error){
        console.error(error);
        document.getElementById("status").innerText = "Erro banco";
        return;
    }

    dados = data;

    montarMenu();

    document.getElementById("status").innerText =
        "OK - " + dados.length + " itens";
}

function montarMenu(){
    const div = document.getElementById("lista");
    div.innerHTML = "";

    dados.forEach(i=>{
        const b = document.createElement("button");
        b.innerText = i.titulo + " ("+(i.downloads||0)+")";
        b.onclick = ()=>abrir(i);
        div.appendChild(b);
    });
}

async function abrir(i){

    atual = i;

    document.getElementById("tituloViewer").innerText = i.titulo;

    let arq = limparPath(i.arquivo_url);

    if(!arq){
        document.getElementById("conteudo").innerHTML = "Sem arquivo";
        return;
    }

    const ext = arq.split(".").pop();

    if(ext === "html"){
        document.getElementById("conteudo").innerHTML =
            `<iframe src="${arq}"></iframe>`;
    }else{
        const r = await fetch(arq);
        const t = await r.text();

        document.getElementById("conteudo").innerHTML =
            `<pre>${t.replace(/</g,"&lt;")}</pre>`;
    }
}

async function baixar(){

    if(!atual){
        alert("Selecione um item");
        return;
    }

    let arq = limparPath(atual.arquivo_url);

    await db
        .from("conteudos")
        .update({ downloads: (atual.downloads||0)+1 })
        .eq("id", atual.id);

    const a = document.createElement("a");
    a.href = arq;
    a.download = "";
    a.click();

    carregar();
}

function voltar(){
    atual = null;
    document.getElementById("conteudo").innerHTML = "Nenhum conteúdo";
}

carregar();
</script>

</body>
</html>
