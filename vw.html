<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>POLYDEV | Viewer de Linguagens</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#FFD700;
    color:black;
}

header{
    background:black;
    color:#FFD700;
    text-align:center;
    padding:25px;
}

header h1{
    margin:0;
    font-size:38px;
}

header p{
    color:white;
    font-weight:bold;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:25px;
}

.card{
    background:black;
    color:white;
    border-radius:10px;
    padding:18px;
    margin-bottom:18px;
    box-shadow:0 4px 10px rgba(0,0,0,.35);
}

.card h2{
    color:#FFD700;
    margin-top:0;
}

.card p{
    color:white;
    line-height:1.5;
}

button{
    background:#FFD700;
    color:black;
    border:0;
    padding:10px 16px;
    margin:5px;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:white;
}

pre{
    background:#111;
    color:#00ff99;
    padding:18px;
    border-radius:8px;
    overflow-x:auto;
    white-space:pre-wrap;
    display:none;
}

.msg{
    background:black;
    color:#FFD700;
    padding:20px;
    border-radius:8px;
    text-align:center;
    font-weight:bold;
}

footer{
    background:black;
    color:#FFD700;
    text-align:center;
    padding:18px;
    margin-top:30px;
}
</style>
</head>

<body>

<header>
    <h1>POLYDEV</h1>
    <p>Viewer de Linguagens | Leia • Entenda • Execute seu código</p>
</header>

<div class="container">
    <div id="lista" class="msg">Carregando códigos...</div>
</div>

<footer>
    POLYDEV - Viewer de Códigos de Linguagens
</footer>

<script>
const lista = document.getElementById("lista");

async function carregarConteudos(){

    const { data, error } = await db
        .from("conteudos")
        .select("*")
        .eq("categoria", "lang")
        .order("titulo", { ascending: true });

    if(error){
        lista.innerHTML = "Erro ao carregar conteúdos.";
        console.error(error);
        return;
    }

    if(!data || data.length === 0){
        lista.innerHTML = "Nenhum código encontrado.";
        return;
    }

    lista.className = "";

    let html = "";
    let totalCodigos = 0;

    data.forEach(item => {

        let arquivo = item.arquivo_url || "";

        /*
           POLYDEV JUMP / NOP
           Se for guia HTML, ignora.
           Não altera banco, não altera categoria, não altera estrutura.
        */
        if(arquivo.toLowerCase().endsWith(".html")){
            return;
        }

        totalCodigos++;

        html += `
            <div class="card">
                <h2>${item.titulo}</h2>
                <p>${item.descricao || "Código de linguagem disponível no POLYDEV."}</p>

                <button onclick="visualizar('${arquivo}', 'codigo_${item.id}')">
                    Visualizar
                </button>

                <button onclick="baixar('${arquivo}', ${item.id})">
                    Download
                </button>

                <pre id="codigo_${item.id}"></pre>
            </div>
        `;
    });

    if(totalCodigos === 0){
        lista.className = "msg";
        lista.innerHTML = "Nenhum código de linguagem encontrado. Guias HTML foram ignorados pelo JUMP/NOP.";
        return;
    }

    lista.innerHTML = html;
}

async function visualizar(arquivo, elementoId){

    const area = document.getElementById(elementoId);

    try{
        const resp = await fetch(arquivo);

        if(!resp.ok){
            area.style.display = "block";
            area.textContent = "Erro ao abrir arquivo: " + arquivo;
            return;
        }

        const texto = await resp.text();

        area.style.display = "block";
        area.textContent = texto;

    }catch(e){
        area.style.display = "block";
        area.textContent = "Erro ao carregar arquivo.";
        console.error(e);
    }
}

async function baixar(arquivo, id){

    try{
        await fetch(arquivo);

        await db
            .from("conteudos")
            .update({ downloads: db.raw ? db.raw("downloads + 1") : undefined })
            .eq("id", id);

    }catch(e){
        console.log("Download liberado, mas incremento pode depender da sua rotina atual.");
    }

    window.open(arquivo, "_blank");
}

carregarConteudos();
</script>

</body>
</html>
