<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>POLYDEV | Viewer Genérico</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:yellowgreen;
    color:black;
    text-align:center;
}

header{
    background:black;
    color:#FFD700;
    padding:20px;
}

header h1{
    margin:0;
}

.status{
    margin:10px;
    font-weight:bold;
}

.container{
    display:flex;
    gap:12px;
    padding:12px;
}

.menu{
    width:30%;
    background:black;
    color:white;
    padding:12px;
    border-radius:10px;
    max-height:75vh;
    overflow-y:auto;
}

.viewer{
    width:70%;
    background:white;
    border:3px solid black;
    border-radius:10px;
    padding:12px;
}

button{
    width:100%;
    margin:6px 0;
    padding:10px;
    background:yellowgreen;
    color:black;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#FFD700;
}

.action{
    width:auto;
    background:black;
    color:#FFD700;
    padding:10px 20px;
    margin:10px;
}

iframe{
    width:100%;
    height:65vh;
    border:none;
    background:white;
}

pre{
    background:black;
    color:white;
    text-align:left;
    padding:20px;
    overflow:auto;
    height:60vh;
    border-radius:8px;
}

@media(max-width:800px){
    .container{
        flex-direction:column;
    }

    .menu,.viewer{
        width:auto;
    }
}
</style>
</head>

<body>

<header>
    <h1>📚 POLYDEV Viewer</h1>
    <p>Leia • Entenda • Execute seu código</p>
</header>

<div class="status" id="status">Carregando conteúdos...</div>

<div class="container">

    <div class="menu">
        <h2 id="tituloMenu">Conteúdos</h2>
        <div id="lista"></div>
    </div>

    <div class="viewer">
        <h2 id="tituloViewer">Selecione</h2>

        <button class="action" onclick="baixar()">⬇ Download</button>
        <button class="action" onclick="voltar()">⬅ Voltar</button>

        <div id="conteudo">
            <p>Nenhum conteúdo</p>
        </div>
    </div>

</div>

<script>
let dados = [];
let atual = null;

function getCategoria(){
    const params = new URLSearchParams(window.location.search);
    return params.get("categoria") || "lang";
}

function limparPath(path){
    if(!path) return "";

    path = path.trim();
    path = path.replace(/^\/+/, "");

    path = path.replace("downloads/html/bancos/", "downloads/bancos/");
    path = path.replace("/downloads/html/bancos/", "downloads/bancos/");

    return path;
}

async function carregar(){
    const categoria = getCategoria();

    document.getElementById("tituloMenu").innerText =
        categoria === "sql" ? "Guias SQL / Bancos" : "Guias Linguagens";

    const { data, error } = await db
        .from("conteudos")
        .select("id,titulo,descricao,categoria,arquivo_url,downloads,ativo")
        .eq("categoria", categoria)
        .eq("ativo", true)
        .order("id", { ascending:true });

    if(error){
        console.error("ERRO SUPABASE:", error);
        document.getElementById("status").innerText = "Erro ao carregar conteúdos.";
        return;
    }

    dados = data || [];

    if(dados.length === 0){
        document.getElementById("status").innerText =
            "Nenhum conteúdo encontrado para categoria: " + categoria;
        return;
    }

    montarMenu();

    document.getElementById("status").innerText =
        "Categoria: " + categoria + " | Itens: " + dados.length;
}

function montarMenu(){
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    dados.forEach(item => {
        const btn = document.createElement("button");
        btn.innerText = item.titulo + " (" + (item.downloads || 0) + ")";
        btn.onclick = () => abrir(item);
        lista.appendChild(btn);
    });
}

async function abrir(item){
    atual = item;

    document.getElementById("tituloViewer").innerText = item.titulo;

    const arquivo = limparPath(item.arquivo_url);

    if(!arquivo){
        document.getElementById("conteudo").innerHTML =
            "<p>Este conteúdo não possui arquivo_url.</p>";
        return;
    }

    const ext = arquivo.split(".").pop().toLowerCase();

    if(ext === "html" || ext === "htm"){
        document.getElementById("conteudo").innerHTML =
            `<iframe src="${arquivo}"></iframe>`;
    }else{
        try{
            const resp = await fetch(arquivo);
            const texto = await resp.text();

            document.getElementById("conteudo").innerHTML =
                `<pre>${escapeHtml(texto)}</pre>`;
        }catch(e){
            console.error("ERRO AO ABRIR ARQUIVO:", e);
            document.getElementById("conteudo").innerHTML =
                "<p>Erro ao exibir arquivo.</p>";
        }
    }
}

async function baixar(){
    if(!atual){
        alert("Selecione um conteúdo primeiro.");
        return;
    }

    const arquivo = limparPath(atual.arquivo_url);

    if(!arquivo){
        alert("Arquivo não encontrado.");
        return;
    }

    const novoValor = (atual.downloads || 0) + 1;

    const { error } = await db
        .from("conteudos")
        .update({ downloads: novoValor })
        .eq("id", atual.id);

    if(error){
        console.error("ERRO AO INCREMENTAR:", error);
        alert("Download feito, mas erro ao atualizar contador.");
    }else{
        atual.downloads = novoValor;
    }

    const a = document.createElement("a");
    a.href = arquivo;
    a.download = arquivo.split("/").pop();
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    await carregar();
}

function voltar(){
    atual = null;
    document.getElementById("tituloViewer").innerText = "Selecione";
    document.getElementById("conteudo").innerHTML = "<p>Nenhum conteúdo</p>";
}

function escapeHtml(texto){
    return texto
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

carregar();
</script>

</body>
</html>
