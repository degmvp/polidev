<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>POLYDEV | Python</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:yellowgreen;
    color:black;
    text-align:center;
}

header{
    background:black;
    color:#FFD700;
    padding:20px;
}

header h1{
    margin:0;
}

header p{
    color:yellowgreen;
    font-weight:bold;
}

.container{
    max-width:1000px;
    margin:25px auto;
    background:black;
    padding:20px;
    border-radius:12px;
}

button{
    width:90%;
    margin:8px;
    padding:14px;
    background:#FFD700;
    color:black;
    border:0;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:white;
}

#msg{
    color:white;
    font-size:20px;
    margin:20px;
}
</style>
</head>

<body>

<header>
    <h1>🐍 POLYDEV Python</h1>
    <p>Leia • Entenda • Execute seu código</p>
</header>

<div class="container">
    <div id="msg">Carregando programas Python...</div>
    <div id="lista"></div>
</div>

<script>
const CATEGORIA = "python";

async function carregarPython(){
    const msg = document.getElementById("msg");
    const lista = document.getElementById("lista");

    lista.innerHTML = "";

    const { data, error } = await db
        .from("conteudos")
        .select("id,titulo,categoria,arquivo_url,ativo")
        .eq("categoria", CATEGORIA)
        .eq("ativo", true)
        .order("id", { ascending:true });

    if(error){
        msg.innerHTML = "Erro Supabase: " + error.message;
        return;
    }

    const somentePython = (data || []).filter(item => {
        const categoria = String(item.categoria || "").trim().toLowerCase();
        const arquivo = String(item.arquivo_url || "").trim().toLowerCase();

        return categoria === "python" && arquivo !== "";
    });

    if(somentePython.length === 0){
        msg.innerHTML = "Nenhum programa Python encontrado.";
        return;
    }

    msg.innerHTML = `Foram encontrados ${somentePython.length} programas Python.`;

    somentePython.forEach(item => {
        const btn = document.createElement("button");
        btn.innerHTML = item.titulo;

        btn.onclick = () => {
            window.location.href = "viewer_py.html?id=" + item.id;
        };

        lista.appendChild(btn);
    });
}

carregarPython();
</script>

</body>
</html>
