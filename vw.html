<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>POLYDEV | Python</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:yellowgreen;
    color:black;
    text-align:center;
}

header{
    background:black;
    color:#FFD700;
    padding:20px;
}

header h1{
    margin:0;
}

header p{
    color:yellowgreen;
    font-weight:bold;
}

.container{
    max-width:1000px;
    margin:25px auto;
    background:black;
    padding:20px;
    border-radius:12px;
}

button{
    width:90%;
    margin:8px;
    padding:14px;
    background:#FFD700;
    color:black;
    border:0;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:white;
}

#msg{
    color:white;
    font-size:20px;
    margin:20px;
}

.btn-voltar-sistema{
    width:auto;
    min-width:260px;
    margin:20px auto 5px;
    padding:14px 28px;
    display:block;
    background:#FFD700;
    color:black;
    border:0;
    border-radius:0;
    font-weight:bold;
    font-size:17px;
    cursor:pointer;
    box-shadow:8px 8px 0 #111;
    transform:skew(-12deg);
}

.btn-voltar-sistema:hover{
    background:white;
    box-shadow:5px 5px 0 #111;
}
</style>
</head>

<body>

<header>
    <h1>🐍 POLYDEV Python</h1>
    <p>Leia • Entenda • Execute seu código</p>
</header>
<button class="btn-voltar-sistema"
onclick="window.location.href='home.html'">
⬅ Voltar ao Sistema
</button>

<div class="container">

<div class="container">
    <div id="msg">Carregando programas Python...</div>
    <div id="lista"></div>
</div>

<div class="container">
    <div id="msg">Carregando programas Python...</div>
    <div id="lista"></div>
</div>

<script>

async function carregarProgramas() {

    const params = new URLSearchParams(window.location.search);
    const categoria = params.get("categoria") || "python";

    const { data, error } = await db
        .from("conteudos")
        .select("*")
        .eq("categoria", categoria)
        .eq("ativo", true)
        .order("titulo", { ascending: true });

    if (error) {
        console.error(error);
        document.getElementById("msg").innerHTML =
            "Erro ao carregar programas.";
        return;
    }

    if (!data || data.length === 0) {
        document.getElementById("msg").innerHTML =
            "Nenhum programa encontrado.";
        return;
    }

    document.getElementById("msg").style.display = "none";

    document.getElementById("lista").innerHTML = data.map(item => `
        <div class="card">

            <h3>${item.titulo}</h3>

            <p>${item.descricao || ""}</p>

            <button onclick="window.location.href='viewer_py.html?id=${item.id}'">
                👁 Exibir
            </button>

            <a href="${item.arquivo_url}" download>
                <button>⬇ Download</button>
            </a>

        </div>
    `).join("");

}

carregarProgramas();

</script>

</body>
</html>
