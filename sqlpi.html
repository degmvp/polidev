<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POLYDEV | SQL Server Page Internals</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
*{ box-sizing:border-box; }

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#000;
    color:#FFD700;
}

header{
    text-align:center;
    padding:18px 20px 14px;
    border-bottom:3px solid #FFD700;
}

.banner{
    max-width:420px;
    width:80%;
    border-radius:14px;
    margin-bottom:12px;
    box-shadow:0 0 22px rgba(255,215,0,0.35);
}

header h1{
    margin:0;
    font-size:36px;
}

header p{
    color:yellowgreen;
    font-weight:bold;
}

.container{
    display:flex;
    gap:20px;
    padding:20px;
}

.menu{
    width:30%;
    background:#111;
    border:2px solid #FFD700;
    border-radius:12px;
    padding:15px;
    max-height:80vh;
    overflow:auto;
}

.viewer{
    width:70%;
    background:#071107;
    border:2px solid yellowgreen;
    border-radius:12px;
    padding:15px;
}

button{
    width:100%;
    margin:6px 0;
    padding:12px;
    background:#FFD700;
    color:#000;
    border:0;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:yellowgreen;
}

.acoes{
    display:flex;
    gap:10px;
    margin-bottom:12px;
    flex-wrap:wrap;
}

.acoes button{
    width:auto;
    min-width:150px;
}

.imagem-tecnica{
    text-align:center;
    margin:16px 0 18px;
    display:none;
}

.imagem-tecnica img{
    max-width:100%;
    max-height:520px;
    border-radius:12px;
    border:2px solid #FFD700;
    box-shadow:0 0 18px rgba(255,215,0,0.25);
    background:#fff;
}

.legenda-imagem{
    color:yellowgreen;
    font-weight:bold;
    margin-top:8px;
    font-size:14px;
}

pre{
    background:#001400;
    color:#d7ffd7;
    padding:18px;
    border-radius:10px;
    min-height:430px;
    overflow:auto;
    border:1px solid yellowgreen;
    text-align:left;
    line-height:1.45;
    white-space:pre-wrap;
}

#tituloArquivo{
    color:yellowgreen;
}

.desc{
    color:white;
    margin-top:-5px;
}

footer{
    text-align:center;
    padding:26px 10px 30px;
    color:#777;
    font-size:14px;
}

.footer-logo{
    width:72px;
    height:72px;
    border-radius:50%;
    display:block;
    margin:0 auto 10px;
    border:2px solid #FFD700;
    box-shadow:0 0 18px rgba(255,215,0,0.35);
}

@media(max-width:800px){
    .container{ flex-direction:column; }
    .menu,.viewer{ width:100%; }
    .acoes{ flex-direction:column; }
    .acoes button{ width:100%; }
}
</style>
</head>

<body>

<header>
    <img class="banner" src="banpol.jpg" alt="POLYDEV Banner">
    <h1>🧠 POLYDEV SQL SERVER PAGE INTERNALS</h1>
    <p>SQL Server • Páginas de 8 KB • Slot Array • Offset Table • Row Overflow</p>
</header>

<div class="container">

<aside class="menu">
    <h2>SQL Page Internals</h2>
    <div id="listaProgramas">Carregando scripts...</div>
</aside>

<main class="viewer">
    <h2 id="tituloArquivo">Selecione um tópico SQL Page Internals</h2>
    <p class="desc" id="descricaoArquivo"></p>

    <div class="acoes">
        <button onclick="baixar()">⬇ Download</button>
        <button onclick="location.href='sqlbit.html'">⬅ SQLBIT</button>
        <button onclick="location.href='home.html'">🏠 Home</button>
    </div>

    <div class="imagem-tecnica" id="imagemTecnica">
        <img id="imgInternals" src="" alt="SQL Server Page Internals">
        <div class="legenda-imagem" id="legendaImagem"></div>
    </div>

    <pre id="codigo">// selecione um tópico no menu lateral</pre>
</main>

</div>

<footer>
    <img class="footer-logo" src="poly.jpg" alt="POLYDEV">
    POLYDEV | SQL Server Page Internals
</footer>

<script>
let itemAtual = null;
let listaItens = [];

function normalizarUrl(url){
    if(!url) return "";

    if(url.startsWith("http://") || url.startsWith("https://")){
        return url;
    }

    if(url.startsWith("/")){
        return "https://degmvp.github.io" + url;
    }

    return "https://degmvp.github.io/polidev/" + url;
}

function aplicarImagemTecnica(item){
    const box = document.getElementById("imagemTecnica");
    const img = document.getElementById("imgInternals");
    const legenda = document.getElementById("legendaImagem");

    box.style.display = "none";
    img.src = "";
    legenda.innerText = "";

    const arquivo = (item.arquivo_url || "").toLowerCase();

    if(arquivo.includes("sqlpi01")){
        img.src = "sqlpage01.jpg";
        legenda.innerText = "Estrutura interna de uma página de dados no SQL Server";
        box.style.display = "block";
        return;
    }

    if(arquivo.includes("sqlpi09")){
        img.src = "sqlpage02.jpg";
        legenda.innerText = "Comparação entre registro fixo, registro variável e row overflow";
        box.style.display = "block";
        return;
    }
}

async function carregarProgramas(){
    const lista = document.getElementById("listaProgramas");
    lista.innerHTML = "Carregando SQL Page Internals...";

    const { data, error } = await db
        .from("conteudos")
        .select("id,titulo,descricao,categoria,arquivo_url,downloads")
        .eq("categoria", "sqlbit")
        .ilike("arquivo_url", "%sqlpi%")
        .order("arquivo_url", { ascending:true });

    if(error){
        lista.innerHTML = "Erro ao consultar o banco.";
        document.getElementById("codigo").innerText = error.message;
        return;
    }

    if(!data || data.length === 0){
        lista.innerHTML = "Nenhum tópico encontrado para SQL Page Internals.";
        return;
    }

    listaItens = data;
    lista.innerHTML = "";

    data.forEach(item => {
        const btn = document.createElement("button");
        btn.innerText = item.titulo || item.arquivo_url || "SQL Page Internals";
        btn.onclick = () => exibirPrograma(item);
        lista.appendChild(btn);
    });

    exibirPrograma(data[0]);
}

async function exibirPrograma(item){
    itemAtual = item;

    const titulo = item.titulo || "SQL Page Internals";
    const url = normalizarUrl(item.arquivo_url);

    document.getElementById("tituloArquivo").innerText = titulo;
    document.getElementById("descricaoArquivo").innerText = item.descricao || "";
    document.getElementById("codigo").innerText = "Carregando conteúdo...";

    aplicarImagemTecnica(item);

    try{
        const resposta = await fetch(url + "?v=" + Date.now());

        if(!resposta.ok){
            throw new Error("HTTP " + resposta.status);
        }

        const texto = await resposta.text();
        document.getElementById("codigo").innerText = texto;

    }catch(e){
        document.getElementById("codigo").innerText =
            "Erro ao abrir:\n" + url + "\n\n" + e.message;
    }
}

async function incrementarDownload(item){
    const atual = Number(item.downloads || 0);
    const novoTotal = atual + 1;

    const { error } = await db
        .from("conteudos")
        .update({ downloads: novoTotal })
        .eq("id", item.id);

    if(!error){
        item.downloads = novoTotal;
    }
}

async function baixar(){
    if(!itemAtual){
        alert("Selecione primeiro um tópico SQL Page Internals.");
        return;
    }

    const url = normalizarUrl(itemAtual.arquivo_url);

    await incrementarDownload(itemAtual);

    const link = document.createElement("a");
    link.href = url;
    link.download = url.split("/").pop();
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

carregarProgramas();
</script>

</body>
</html>
