<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Categorias</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

</head>

<body>

<h2>Categorias de Conteúdos</h2>

<table border="1">
<thead>
<tr>
<th>Categoria</th>
<th>Quantidade</th>
<th>Abrir</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>

<script>

async function carregarCategorias(){

const { data, error } = await db
.from("conteudos")
.select("categoria")

if(error){
alert(error.message)
return
}

// contar categorias
let contagem = {}

data.forEach(item => {
if(!contagem[item.categoria]){
contagem[item.categoria] = 0
}
contagem[item.categoria]++
})

// montar tabela
let tabela = document.getElementById("tabela")
tabela.innerHTML = ""

for(let cat in contagem){
tabela.innerHTML += `
<tr>
<td>${cat}</td>
<td>${contagem[cat]}</td>
<td><a href="conteudos.html?categoria=${cat}">Ver</a></td>
</tr>
`
}

}

carregarCategorias()

</script>

</body>
</html>
