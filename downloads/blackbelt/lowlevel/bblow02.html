<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>BBLOW02 - AND OR XOR NOT</title>
<style>
body{background:#050505;color:#FFD700;font-family:Consolas,Arial;padding:30px;}
h1,h2{color:#FFD700;}
p,li{color:#f2f2f2;line-height:1.7;font-size:17px;}
.box{border:2px solid #FFD700;border-left:8px solid yellowgreen;border-radius:12px;padding:20px;margin:20px 0;background:#0b0b0b;}
pre{background:#000;color:#00ff66;padding:18px;border-radius:8px;overflow:auto;}
</style>
</head>
<body>

<h1>BBLOW02 - AND OR XOR NOT</h1>

<div class="box">
<h2>AND</h2>
<p>Retorna 1 somente quando os dois bits são 1.</p>
<pre>
0101
AND
0011
----
0001
</pre>
</div>

<div class="box">
<h2>OR</h2>
<p>Retorna 1 quando pelo menos um dos bits é 1.</p>
<pre>
0101
OR
0011
----
0111
</pre>
</div>

<div class="box">
<h2>XOR</h2>
<p>Retorna 1 quando os bits são diferentes.</p>
<pre>
0101
XOR
0011
----
0110
</pre>
</div>

<div class="box">
<h2>NOT</h2>
<p>Inverte os bits.</p>
<pre>
NOT 0101
=   1010
</pre>
</div>

</body>
</html>
