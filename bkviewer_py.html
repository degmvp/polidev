<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>POLYDEV | Viewer Python</title>

<style>
body{
    background-color: yellowgreen;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
    margin: 0;
}

header{
    background-color: black;
    color: #FFD700;
    padding: 20px;
}

pre{
    background: black;
    color: white;
    padding: 20px;
    margin: 20px;
    text-align: left;
    overflow-x: auto;
    border-radius: 8px;
}

button{
    margin: 10px;
    padding: 10px 20px;
    cursor: pointer;
    background: black;
    color: #FFD700;
    border: none;
    border-radius: 5px;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
    <h1>🐍 POLYDEV Python Viewer</h1>
    <p>Leia • Entenda • Execute seu código</p>
</header>

<button onclick="baixar()">⬇ Download</button>
<button onclick="voltar()">⬅ Voltar ao Menu</button>

<pre id="codigo">Carregando...</pre>

<script>

// 🔗 BASE ARQUIVOS
const BASE = "https://degmvp.github.io/polidev/downloads/python/";

// 🔑 SUA CHAVE (COLE AQUI)
const KEY = "COLE_SUA_ANON_KEY_AQUI";

// 📌 PARAMETRO
const params = new URLSearchParams(window.location.search);
let prog = params.get("prog");

// 🔧 NORMALIZAÇÃO
function normalizarPrograma(valor){

    if(!valor) return null;

    valor = valor.trim();
    valor = valor.replace(".py", "");
    valor = valor.replace("python_progpython_prog", "python_prog");

    if(!valor.startsWith("python_prog")){
        valor = "python_prog" + valor;
    }

    return valor;
}

prog = normalizarPrograma(prog);

// 🔙 VOLTAR
function voltar(){
    window.location.href = "/polidev/menu.html";
}

// 📄 CARREGAR CÓDIGO
async function carregar(){

    const tela = document.getElementById("codigo");

    if(!prog){
        tela.innerText = "Programa não informado.";
        return;
    }

    const arquivo = prog + ".py";
    const url = BASE + arquivo;

    try{
        const resp = await fetch(url);

        if(!resp.ok){
            tela.innerText = "Erro ao carregar: " + resp.status + "\n" + url;
            return;
        }

        const texto = await resp.text();
        tela.innerText = texto;

    }catch(e){
        tela.innerText = "Erro de conexão";
    }
}

// ⬇ DOWNLOAD
function baixar(){

    if(!prog){
        alert("Programa inválido.");
        return;
    }

    const arquivo = prog + ".py";
    const url = BASE + arquivo;

    const a = document.createElement("a");
    a.href = url;
    a.download = arquivo;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

// 🧪 TESTE BANCO (NÃO ALTERA NADA)
async function testeBanco(){

    try{
        const resp = await fetch(
            "https://vdpucrilxzlnxxnaohdh.supabase.co/rest/v1/conteudos?limit=1",
            {
                headers: {
                    "apikey": KEY,
                    "Authorization": "Bearer " + KEY
                }
            }
        );

        console.log("STATUS BANCO:", resp.status);

    }catch(e){
        console.log("Erro conexão banco");
    }
}

// 🚀 START
carregar();
testeBanco();

</script>

</body>
</html>
