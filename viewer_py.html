<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>POLYDEV | Python Viewer</title>

<style>
body {
    background: navy;
    color: white;
    font-family: Consolas, monospace;
    margin: 0;
}

header {
    background: #FFD700;
    color: black;
    padding: 15px;
    text-align: center;
}

.container {
    padding: 20px;
}

pre {
    background: #2b2b2b;
    padding: 15px;
    overflow: auto;
    border-radius: 5px;
    max-height: 80vh;
    color: #00FF00;
}

button {
    padding: 8px 12px;
    margin-right: 10px;
    background: #FFD700;
    border: none;
    cursor: pointer;
    font-weight: bold;
}
</style>

</head>

<body>

<header>
<h2>🐍 Python - Visualizador de Código</h2>
<p id="titulo"></p>
</header>

<div class="container">

<button onclick="voltar()">⬅ Voltar</button>
<button onclick="baixar()">⬇ Download</button>

<pre id="codigo">Carregando código...</pre>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const prog = params.get("prog");

const BASE = "/polidev/downloads/python/";

document.getElementById("titulo").innerText = "Programa " + prog;

async function carregar(){

    try{

        const resp = await fetch(BASE + "python_prog" + prog + ".py");
        const texto = await resp.text();

        document.getElementById("codigo").innerText = texto;

    }catch(e){
        document.getElementById("codigo").innerText = "Erro ao carregar código";
    }

}

function voltar(){
    window.history.back();
}

function baixar(){
    window.open(BASE + "python_prog" + prog + ".py", "_blank");
}

carregar();

</script>

</body>
</html>
