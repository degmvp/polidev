<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Viewer Python</title>

<style>
body{
    background-color: yellowgreen;
    font-family: Arial;
    text-align: center;
}

pre{
    background: black;
    color: white;
    padding: 20px;
    margin: 20px;
    text-align: left;
    overflow-x: auto;
}
</style>

</head>

<body>

<h2>Visualizador de Código Python</h2>

<button onclick="baixar()">Download</button>
<button onclick="voltar()">Voltar</button>

<pre id="codigo">Carregando...</pre>

<script>

// 🔥 COLE SUA CHAVE ANON (JWT grande)
const KEY = "COLE_SUA_ANON_KEY_AQUI";

// 🔗 URLs
const BASE = "https://degmvp.github.io/polidev/downloads/python/";
const API = "https://vdpucrilxzlnxxnaohdh.supabase.co/rest/v1/conteudos";

// 📌 parâmetro
const params = new URLSearchParams(window.location.search);
const prog = params.get("prog");

// 🔙 voltar
function voltar(){
    window.location.href = "/polidev/menu.html";
}

// 📄 carregar código
async function carregar(){

    if(!prog){
        document.getElementById("codigo").innerText = "Programa não informado";
        return;
    }

    try{
        const resp = await fetch(BASE + prog + ".py");

        if(!resp.ok){
            document.getElementById("codigo").innerText = "Erro " + resp.status;
            return;
        }

        const txt = await resp.text();
        document.getElementById("codigo").innerText = txt;

    }catch{
        document.getElementById("codigo").innerText = "Erro ao carregar";
    }
}

// 🔥 incrementar contador (+1)
async function incrementar(){

    try{

        // 1. busca registro
        const resp = await fetch(API + "?programa=eq." + prog, {
            headers: {
                "apikey": KEY,
                "Authorization": "Bearer " + KEY
            }
        });

        const data = await resp.json();

        if(data.length === 0) return;

        const id = data[0].id;
        const atual = data[0].downloads || 0;

        // 2. atualiza somando +1
        await fetch(API + "?id=eq." + id, {
            method: "PATCH",
            headers: {
                "apikey": KEY,
                "Authorization": "Bearer " + KEY,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                downloads: atual + 1
            })
        });

    }catch(e){
        console.log("Erro ao atualizar contador:", e);
    }
}

// ⬇️ download + contador
async function baixar(){

    if(!prog){
        alert("Programa inválido");
        return;
    }

    // 🔹 incrementa antes
    await incrementar();

    // 🔹 download
    const url = BASE + prog + ".py";

    const a = document.createElement("a");
    a.href = url;
    a.download = prog + ".py";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    // 🔹 volta ao menu
    setTimeout(() => {
        window.location.href = "/polidev/menu.html";
    }, 1000);
}

// 🚀 iniciar
carregar();

</script>

</body>
</html>
