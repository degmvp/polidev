<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Viewer Python</title>

<style>
body{
    background-color: yellowgreen;
    font-family: Arial;
    text-align: center;
}

pre{
    background: black;
    color: white;
    padding: 20px;
    margin: 20px;
    text-align: left;
    overflow-x: auto;
}
</style>

</head>

<body>

<h2>Visualizador de Código Python</h2>

<button onclick="baixar()">Download</button>
<button onclick="voltar()">Voltar</button>

<pre id="codigo">Carregando...</pre>

<script>

const params = new URLSearchParams(window.location.search);
const prog = params.get("prog");

const BASE = "https://degmvp.github.io/polidev/downloads/python/";

function voltar(){
    window.location.href = "menu_py.html";
}

// 🔹 carregar código
async function carregar(){

    if(!prog){
        document.getElementById("codigo").innerText = "Programa não informado";
        return;
    }

    try{
        const resp = await fetch(BASE + prog + ".py");
        const txt = await resp.text();
        document.getElementById("codigo").innerText = txt;
    }catch{
        document.getElementById("codigo").innerText = "Erro ao carregar código";
    }
}

// 🔹 TESTE SIMPLES (SEM BANCO AINDA)
function baixar(){
    alert("Download funcionando ✔");
    window.open(BASE + prog + ".py", "_blank");
}

// inicia
carregar();

</script>

</body>
</html>
