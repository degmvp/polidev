<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Viewer Python</title>

<style>
body{
    background-color: yellowgreen;
    font-family: Arial;
    text-align: center;
}

pre{
    background: black;
    color: white;
    padding: 20px;
    margin: 20px;
    text-align: left;
    overflow-x: auto;
}

button{
    margin: 10px;
    padding: 10px 20px;
    cursor: pointer;
}
</style>

</head>

<body>

<h2>Visualizador de Código Python</h2>

<button onclick="baixar()">Download</button>
<button onclick="voltar()">Voltar ao Menu</button>

<pre id="codigo">Carregando...</pre>

<script>

// 🔥 COLE SUA CHAVE ANON (JWT GRANDE)
const KEY = "COLE_SUA_ANON_KEY_AQUI";

// 🔗 BASE DOS ARQUIVOS
const BASE = "https://degmvp.github.io/polidev/downloads/python/";

// 🔗 API SUPABASE (RPC)
const API_RPC = "https://vdpucrilxzlnxxnaohdh.supabase.co/rest/v1/rpc/incrementar_download";

// 📌 PEGAR PARÂMETRO
const params = new URLSearchParams(window.location.search);
const prog = params.get("prog");

// 🔙 VOLTAR
function voltar(){
    window.location.href = "/polidev/menu.html";
}

// 📄 CARREGAR CÓDIGO
async function carregar(){

    if(!prog){
        document.getElementById("codigo").innerText = "Programa não informado";
        return;
    }

    try{
        const resp = await fetch(BASE + prog + ".py");

        if(!resp.ok){
            document.getElementById("codigo").innerText = "Erro " + resp.status;
            return;
        }

        const txt = await resp.text();
        document.getElementById("codigo").innerText = txt;

    }catch{
        document.getElementById("codigo").innerText = "Erro ao carregar";
    }
}

// 🔥 INCREMENTAR CONTADOR (CORRETO)
async function incrementar(){

    try{

        // 🔹 monta o valor EXATO do banco
        const programa = "python_prog" + prog;

        await fetch(
            "https://vdpucrilxzlnxxnaohdh.supabase.co/rest/v1/rpc/incrementar_download",
            {
                method: "POST",
                headers: {
                    "apikey": KEY,
                    "Authorization": "Bearer " + KEY,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    p_programa: programa
                })
            }
        );

    }catch(e){
        console.log("Erro contador:", e);
    }
}

// ⬇️ DOWNLOAD + CONTADOR
async function baixar(){

    if(!prog){
        alert("Programa inválido");
        return;
    }

    await incrementar();

    const url = BASE + prog + ".py";

    const a = document.createElement("a");
    a.href = url;
    a.download = "python_prog" + prog + ".py";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

// 🚀 INICIAR
carregar();

</script>

</body>
</html>
