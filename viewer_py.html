<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>POLYDEV | Python Viewer</title>

<style>
body {
    background: navy;
    color: white;
    font-family: Consolas;
    margin: 0;
}

header {
    background: gold;
    color: black;
    padding: 15px;
    text-align: center;
}

.container {
    padding: 20px;
}

pre {
    background: #2b2b2b;
    padding: 15px;
    border-radius: 5px;
    max-height: 70vh;
    overflow: auto;
    color: #00FF00;
}

button {
    padding: 8px 12px;
    margin-right: 10px;
    background: gold;
    border: none;
    cursor: pointer;
    font-weight: bold;
}
</style>

</head>

<body>

<header>
<h2>🐍 Python Viewer</h2>
<p id="titulo"></p>
</header>

<div class="container">

<button type="button" onclick="voltar()">⬅ Voltar</button>
<button type="button" onclick="menu()">🏠 Menu</button>
<button type="button" onclick="baixar()">⬇ Download</button>

<pre id="codigo">Carregando...</pre>

</div>

<script>

// 🔹 PARÂMETRO
const params = new URLSearchParams(window.location.search);
const prog = params.get("prog");

// 🔹 BASE DOS ARQUIVOS
const BASE = "/polidev/downloads/python/";

// 🔹 TÍTULO
document.getElementById("titulo").innerText = "Programa " + prog;

// 🔹 CARREGAR CÓDIGO
async function carregar(){
    try{
        const resp = await fetch(BASE + "python_prog" + prog + ".py");
        const texto = await resp.text();
        document.getElementById("codigo").innerText = texto;
    }catch(e){
        document.getElementById("codigo").innerText = "Erro ao carregar código";
    }
}

// 🔹 VOLTAR
function voltar(){
    if (document.referrer && document.referrer.includes("menu.html")) {
        window.history.back();
    } else {
        window.location.href = "menu.html";
    }
}

// 🔹 MENU
function menu(){
    window.location.href = "menu.html";
}

// 🔥 DOWNLOAD + SUPABASE (VERSÃO FINAL)
async function baixar(){

    const id = parseInt(prog);

    if (isNaN(id)) {
        alert("Programa inválido");
        return;
    }

    try {

        const resp = await fetch("https://vdpucrilxzlnxxnaohdh.supabase.co/rest/v1/downloads", {
            method: "POST",
            headers: {
                "apikey": "sb_publishable_iCOZMw9xc0QZaGQWTHdxMQ_O33nfE42",
                "Authorization": "Bearer sb_publishable_iCOZMw9xc0QZaGQWTHdxMQ_O33nfE42",
                "Content-Type": "application/json",
                "Prefer": "return=minimal"
            },
            body: JSON.stringify({
                conteudo_id: id,
                programa: "python_prog" + id
            })
        });

        const txt = await resp.text();

        console.log("STATUS:", resp.status);
        console.log("RESPOSTA:", txt);

        alert("STATUS: " + resp.status);

    } catch(e){
        console.log("ERRO FETCH:", e);
        alert("Erro na conexão");
    }

    // 🔹 DOWNLOAD DO ARQUIVO
    window.open(BASE + "python_prog" + id + ".py", "_blank");
}

// 🔹 INIT
carregar();

</script>

</body>
</html>
