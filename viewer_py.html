<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Polydev - Viewer Python</title>

<style>
body{
    background-color: yellowgreen;
    font-family: Arial;
    text-align: center;
}

pre{
    background: black;
    color: white;
    padding: 20px;
    margin: 20px;
    text-align: left;
    overflow-x: auto;
}

button{
    margin: 10px;
    padding: 10px 20px;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>Visualizador de Código Python</h2>

<button onclick="baixar()">Download</button>
<button onclick="voltar()">Voltar</button>

<pre id="codigo">Carregando...</pre>

<script>

const BASE = "https://degmvp.github.io/polidev/downloads/python/";

const params = new URLSearchParams(window.location.search);
const prog = params.get("prog");

// 🔙 voltar
function voltar(){
    window.location.href = "/polidev/menu.html";
}

// 📄 carregar código
async function carregar(){

    const tela = document.getElementById("codigo");

    if(!prog){
        tela.innerText = "Programa não informado";
        return;
    }

    try{
        const url = BASE + "python_prog" + prog + ".py";

        const resp = await fetch(url);

        if(!resp.ok){
            tela.innerText = "Erro ao carregar: " + resp.status;
            return;
        }

        const txt = await resp.text();
        tela.innerText = txt;

    }catch(e){
        tela.innerText = "Erro de conexão";
    }
}

// ⬇ download simples
function baixar(){

    if(!prog){
        alert("Programa inválido");
        return;
    }

    const url = BASE + "python_prog" + prog + ".py";

    const a = document.createElement("a");
    a.href = url;
    a.download = "python_prog" + prog + ".py";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

// 🚀 iniciar
carregar();

</script>

</body>
</html>
