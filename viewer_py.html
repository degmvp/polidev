<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Polydev - Viewer Python</title>

<style>
body{
    background-color: yellowgreen;
    font-family: Arial;
    text-align: center;
}

h2{
    color: black;
}

pre{
    background: black;
    color: white;
    padding: 20px;
    margin: 20px;
    text-align: left;
    overflow-x: auto;
    border-radius: 10px;
}

button{
    margin: 10px;
    padding: 10px 20px;
    cursor: pointer;
    border: none;
    border-radius: 5px;
    background-color: black;
    color: white;
}

button:hover{
    background-color: #333;
}
</style>

</head>

<body>

<h2>Visualizador de Código Python</h2>

<button onclick="baixar()">⬇ Download</button>
<button onclick="voltar()">⬅ Voltar ao Menu</button>

<pre id="codigo">Carregando...</pre>

<script>

// 🔑 COLE SUA CHAVE ANON AQUI (JWT LONGA)
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcHVjcmlseHpsbnh4bmFvaGRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0OTc0NzIsImV4cCI6MjA4ODA3MzQ3Mn0.hdGtfK0eQf0-Iu_LqYqKKLvt8189euaGy-mmGMALJ_I
";

// 🔗 BASE DOS ARQUIVOS
const BASE = "https://degmvp.github.io/polidev/downloads/python/";

// 🔗 API RPC SUPABASE
const API = "https://vdpucrilxzlnxxnaohdh.supabase.co/rest/v1/rpc/incrementar_download";

// 📌 PEGAR PARAMETRO ?prog=XX
const params = new URLSearchParams(window.location.search);
const prog = params.get("prog");

// 🔙 VOLTAR
function voltar(){
    window.location.href = "/polidev/menu.html";
}

// 📄 CARREGAR CÓDIGO
async function carregar(){

    if(!prog){
        document.getElementById("codigo").innerText = "Programa não informado";
        return;
    }

    try{

        const resp = await fetch(BASE + "python_prog" + prog + ".py");

        if(!resp.ok){
            document.getElementById("codigo").innerText = "Erro " + resp.status;
            return;
        }

        const txt = await resp.text();
        document.getElementById("codigo").innerText = txt;

    }catch{
        document.getElementById("codigo").innerText = "Erro ao carregar arquivo";
    }
}

// 🔥 INCREMENTAR DOWNLOAD NO BANCO
async function incrementar(){

    try{

        const programa = "python_prog" + prog;

        // 1. buscar valor atual
        const sel = await fetch(
            "https://vdpucrilxzlnxxnaohdh.supabase.co/rest/v1/conteudos?programa=eq." + programa,
            {
                headers: {
                    "apikey": KEY,
                    "Authorization": "Bearer " + KEY
                }
            }
        );

        const dados = await sel.json();

        if(!dados.length) return;

        const atual = dados[0].downloads || 0;

        // 2. atualizar
        await fetch(
            "https://vdpucrilxzlnxxnaohdh.supabase.co/rest/v1/conteudos?programa=eq." + programa,
            {
                method: "PATCH",
                headers: {
                    "apikey": KEY,
                    "Authorization": "Bearer " + KEY,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    downloads: atual + 1
                })
            }
        );

    }catch(e){
        console.log("erro contador", e);
    }
}
// ⬇ DOWNLOAD + CONTADOR
async function baixar(){

    if(!prog){
        alert("Programa inválido");
        return;
    }

    await incrementar(); // grava no banco

    const url = BASE + "python_prog" + prog + ".py";

    const a = document.createElement("a");
    a.href = url;
    a.download = "python_prog" + prog + ".py";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

// 🚀 INICIALIZAÇÃO
carregar();

</script>

</body>
</html>
