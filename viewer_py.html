<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>POLYDEV | Viewer de Código</title>

<style>
body{
    background-color: yellowgreen;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
    margin: 0;
}

header{
    background-color: black;
    color: #FFD700;
    padding: 20px;
}

header p{
    color: yellowgreen;
    font-weight: bold;
}

#msg{
    margin: 15px;
    font-weight: bold;
    color: black;
}

pre{
    background: black;
    color: white;
    padding: 20px;
    margin: 20px;
    text-align: left;
    overflow-x: auto;
    border-radius: 8px;
    min-height: 400px;
    white-space: pre-wrap;
}

button{
    margin: 10px;
    padding: 10px 20px;
    cursor: pointer;
    background: black;
    color: #FFD700;
    border: none;
    border-radius: 5px;
    font-weight: bold;
}

button:hover{
    background: #222;
}
</style>
</head>

<body>

<header>
    <h1>🚀 POLYDEV Code Viewer</h1>
    <p>Leia • Entenda • Execute seu código</p>
</header>

<div id="msg">Carregando programa...</div>

<button onclick="baixar()">⬇ Download</button>
<button onclick="voltar()">⬅ Voltar ao Menu</button>

<pre id="codigo">Carregando...</pre>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const ID = params.get("id");

let programaAtual = null;

function montarUrl(caminho){
    if(caminho.startsWith("/")){
        return "https://degmvp.github.io/polidev" + caminho;
    }
    return caminho;
}

function voltar(){
    window.location.href = "vw.html?categoria=" + (programaAtual?.categoria || "python");
}

async function carregarPrograma(){
    const msg = document.getElementById("msg");
    const codigo = document.getElementById("codigo");

    if(!ID){
        msg.innerHTML = "ID do programa não informado.";
        codigo.textContent = "";
        return;
    }

    const { data, error } = await db
        .from("conteudos")
        .select("id,titulo,categoria,arquivo_url,downloads")
        .eq("id", ID)
        .single();

    if(error){
        msg.innerHTML = "Erro Supabase: " + error.message;
        codigo.textContent = "";
        return;
    }

    if(!data || !data.arquivo_url){
        msg.innerHTML = "Programa não encontrado.";
        codigo.textContent = "";
        return;
    }

    programaAtual = data;

    document.title = "POLYDEV | " + data.titulo;
    msg.innerHTML = data.titulo + " | Categoria: " + data.categoria.toUpperCase();

    try{
        const caminho = montarUrl(data.arquivo_url);
        const resp = await fetch(caminho);

        if(!resp.ok){
            codigo.textContent = "Erro ao carregar arquivo: " + caminho;
            return;
        }

        const texto = await resp.text();
        codigo.textContent = texto;
    }
    catch(e){
        codigo.textContent = "Erro ao ler arquivo: " + e.message;
    }
}

async function incrementar(){
    if(!programaAtual) return;

    const atual = programaAtual.downloads || 0;

    const { error } = await db
        .from("conteudos")
        .update({ downloads: atual + 1 })
        .eq("id", programaAtual.id);

    if(error){
        console.log("Erro contador:", error.message);
    }
}

async function baixar(){
    if(!programaAtual || !programaAtual.arquivo_url){
        alert("Programa inválido.");
        return;
    }

    await incrementar();

    const url = montarUrl(programaAtual.arquivo_url);
    const nomeArquivo = url.split("/").pop();

    const a = document.createElement("a");
    a.href = url;
    a.download = nomeArquivo;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

carregarPrograma();
</script>

</body>
</html>
