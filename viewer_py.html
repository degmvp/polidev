<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Viewer Python</title>

<style>
body{
    background-color: yellowgreen;
    font-family: Arial;
    text-align: center;
}

pre{
    background: black;
    color: white;
    padding: 20px;
    margin: 20px;
    text-align: left;
    overflow-x: auto;
}
</style>

</head>

<body>

<h2>Visualizador de Código Python</h2>

<button onclick="baixar()">Download</button>
<button onclick="voltar()">Voltar</button>

<pre id="codigo">Carregando...</pre>

<script>

const params = new URLSearchParams(window.location.search);
const prog = params.get("prog");

const BASE = "https://degmvp.github.io/polidev/downloads/python/";

function voltar(){
    window.location.href = "menu_py.html";
}

// 🔹 carregar código
async function carregar(){

    if(!prog){
        document.getElementById("codigo").innerText = "Programa não informado";
        return;
    }

    const url = BASE + prog + ".py";

    try{
        const resp = await fetch(url);

        if(!resp.ok){
            document.getElementById("codigo").innerText =
                "Erro ao carregar: " + resp.status + "\n" + url;
            return;
        }

        const txt = await resp.text();
        document.getElementById("codigo").innerText = txt;

    }catch{
        document.getElementById("codigo").innerText =
            "Erro de conexão\n" + url;
    }
}

// 🔹 DOWNLOAD SIMPLES (SEM BANCO)
async function baixar(){

    if(!prog){
        alert("Programa inválido");
        return;
    }

    const url = BASE + prog + ".py";

    // 🔹 1. tenta gravar no banco (sem travar)
    try{

        const respBusca = await fetch(
            "https://vdpucrilxzlnxxnaohdh.supabase.co/rest/v1/conteudos?programa=eq." + prog,
            {
                headers: {
                    "apikey": "sb_publishable_iCOZMw9xc0QZaGQWTHdxMQ_O33nfE42",
                    "Authorization": "Bearer sb_publishable_iCOZMw9xc0QZaGQWTHdxMQ_O33nfE42"
                }
            }
        );

        const data = await respBusca.json();

        if(data.length > 0){

            const id = data[0].id;

            await fetch(
                "https://vdpucrilxzlnxxnaohdh.supabase.co/rest/v1/downloads",
                {
                    method: "POST",
                    headers: {
                        "apikey": "sb_publishable_iCOZMw9xc0QZaGQWTHdxMQ_O33nfE42",
                        "Authorization": "Bearer sb_publishable_iCOZMw9xc0QZaGQWTHdxMQ_O33nfE42",
                        "Content-Type": "application/json",
                        "Prefer": "return=minimal"
                    },
                    body: JSON.stringify({
                        conteudo_id: id,
                        programa: prog
                    })
                }
            );
        }

    }catch(e){
        console.log("Erro ao gravar (não bloqueia):", e);
    }

    // 🔹 2. download garantido
    const a = document.createElement("a");
    a.href = url;
    a.download = prog + ".py";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    // 🔹 3. voltar automático após 1s
setTimeout(() => {
    window.location.href = "/polidev/menu.html";
}, 1000);
}
carregar();

</script>

</body>
</html>
