<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>POLYDEV | Viewer Python</title>

<style>
body{
    background-color: yellowgreen;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
    margin: 0;
}

header{
    background-color: black;
    color: #FFD700;
    padding: 20px;
}

pre{
    background: black;
    color: white;
    padding: 20px;
    margin: 20px;
    text-align: left;
    overflow-x: auto;
    border-radius: 8px;
}

button{
    margin: 10px;
    padding: 10px 20px;
    cursor: pointer;
    background: black;
    color: #FFD700;
    border: none;
    border-radius: 5px;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
    <h1>🐍 POLYDEV Python Viewer</h1>
    <p>Leia • Entenda • Execute seu código</p>
</header>

<button onclick="baixar()">⬇ Download</button>
<button onclick="voltar()">⬅ Voltar ao Menu</button>

<pre id="codigo">Carregando...</pre>

<script>

const BASE = "https://degmvp.github.io/polidev/downloads/python/";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcHVjcmlseHpsbnh4bmFvaGRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0OTc0NzIsImV4cCI6MjA4ODA3MzQ3Mn0.hdGtfK0eQf0-Iu_LqYqKKLvt8189euaGy-mmGMALJ_I";

const params = new URLSearchParams(window.location.search);
let prog = params.get("prog");

function normalizarPrograma(valor){
    if(!valor) return null;

    valor = valor.trim();
    valor = valor.replace(".py", "");
    valor = valor.replace("python_progpython_prog", "python_prog");

    if(!valor.startsWith("python_prog")){
        valor = "python_prog" + valor;
    }

    return valor;
}

prog = normalizarPrograma(prog);

function voltar(){
    window.location.href = "/polidev/menu.html";
}

async function carregar(){

    const tela = document.getElementById("codigo");

    if(!prog){
        tela.innerText = "Programa não informado.";
        return;
    }

    const arquivo = prog + ".py";
    const url = BASE + arquivo;

    try{
        const resp = await fetch(url);

        if(!resp.ok){
            tela.innerText = "Erro ao carregar: " + resp.status + "\n" + url;
            return;
        }

        const texto = await resp.text();
        tela.innerText = texto;

    }catch(e){
        tela.innerText = "Erro de conexão";
    }
}

// 🔥 CONTADOR
async function incrementar(){

    try{

        const programa = prog;

        const resp = await fetch(
            "https://vdpucrilxzlnxxnaohdh.supabase.co/rest/v1/conteudos?programa=eq." + programa,
            {
                headers: {
                    "apikey": KEY,
                    "Authorization": "Bearer " + KEY
                }
            }
        );

        const data = await resp.json();

        alert("SELECT status: " + resp.status + "\nPrograma: " + programa + "\nRegistros: " + data.length);

        if(!data.length){
            return;
        }

        const atual = data[0].downloads || 0;

        const upd = await fetch(
            "https://vdpucrilxzlnxxnaohdh.supabase.co/rest/v1/conteudos?programa=eq." + programa,
            {
                method: "PATCH",
                headers: {
                    "apikey": KEY,
                    "Authorization": "Bearer " + KEY,
                    "Content-Type": "application/json",
                    "Prefer": "return=representation"
                },
                body: JSON.stringify({
                    downloads: atual + 1
                })
            }
        );

        const txt = await upd.text();

        alert("PATCH status: " + upd.status + "\n" + txt);

    }catch(e){
        alert("Erro geral no contador");
    }
}

// ⬇ DOWNLOAD + CONTADOR
async function baixar(){

    if(!prog){
        alert("Programa inválido.");
        return;
    }

    await incrementar(); // 🔥 AQUI

    const arquivo = prog + ".py";
    const url = BASE + arquivo;

    const a = document.createElement("a");
    a.href = url;
    a.download = arquivo;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

// 🚀 START
carregar();

</script>

</body>
</html>
