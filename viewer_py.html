<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Viewer Python</title>

<style>
body{
    background-color: yellowgreen;
    font-family: Arial;
    text-align: center;
}

pre{
    background: black;
    color: white;
    padding: 20px;
    margin: 20px;
    text-align: left;
    overflow-x: auto;
}
</style>

</head>

<body>

<h2>Visualizador de Código Python</h2>

<button onclick="baixar()">Download</button>
<button onclick="voltar()">Voltar</button>

<pre id="codigo">Carregando...</pre>

<script>

// 🔥 SUA CHAVE ANON AQUI (OBRIGATÓRIO TROCAR)
const KEY = "COLE_AQUI_SUA_ANON_PUBLIC_KEY";

// 🔗 URLs
const BASE = "https://degmvp.github.io/polidev/downloads/python/";
const API_CONTEUDOS = "https://vdpucrilxzlnxxnaohdh.supabase.co/rest/v1/conteudos";
const API_DOWNLOADS = "https://vdpucrilxzlnxxnaohdh.supabase.co/rest/v1/downloads";

// 📌 pega parâmetro da URL
const params = new URLSearchParams(window.location.search);
const prog = params.get("prog");

// 🔙 voltar menu
function voltar(){
    window.location.href = "/polidev/menu.html";
}

// 📄 carregar código
async function carregar(){

    if(!prog){
        document.getElementById("codigo").innerText = "Programa não informado";
        return;
    }

    try{
        const resp = await fetch(BASE + prog + ".py");

        if(!resp.ok){
            document.getElementById("codigo").innerText = "Erro " + resp.status;
            return;
        }

        const txt = await resp.text();
        document.getElementById("codigo").innerText = txt;

    }catch{
        document.getElementById("codigo").innerText = "Erro ao carregar";
    }
}

// 🔍 buscar ID real no banco
async function buscarId(){

    const resp = await fetch(API_CONTEUDOS + "?programa=eq." + prog, {
        headers: {
            "apikey": KEY,
            "Authorization": "Bearer " + KEY
        }
    });

    const data = await resp.json();

    if(data.length === 0) return null;

    return data[0].id;
}

// ⬇️ download + gravação
async function baixar(){

    if(!prog){
        alert("Programa inválido");
        return;
    }

    const url = BASE + prog + ".py";

    try{

        const id = await buscarId();

        if(id){

            await fetch(API_DOWNLOADS, {
                method: "POST",
                headers: {
                    "apikey": KEY,
                    "Authorization": "Bearer " + KEY,
                    "Content-Type": "application/json",
                    "Accept": "application/json",
                    "Prefer": "return=representation"
                },
                body: JSON.stringify([{
                    conteudo_id: id,
                    programa: prog
                }])
            });

        }

    }catch(e){
        console.log("Erro ao gravar:", e);
    }

    // download garantido
    const a = document.createElement("a");
    a.href = url;
    a.download = prog + ".py";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    // voltar para menu
    setTimeout(() => {
        window.location.href = "/polidev/menu.html";
    }, 1000);
}

// 🚀 iniciar
carregar();

</script>

</body>
</html>
