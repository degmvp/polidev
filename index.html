<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>POLYDEV | Plataforma de Aprendizado</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:yellowgreen;
}

header{
    background:black;
    color:#FFD700;
    text-align:center;
    padding:30px;
}

header h1{
    margin:0;
    font-size:42px;
}

.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:40px;
}

.box{
    background:black;
    color:white;
    padding:30px;
    border-radius:10px;
    width:320px;
    text-align:center;
}

input{
    width:90%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:5px;
}

button{
    width:95%;
    padding:12px;
    background:#FFD700;
    border:none;
    font-weight:bold;
    cursor:pointer;
    border-radius:5px;
    margin-top:10px;
}

button:hover{
    background:white;
}

.desc{
    max-width:600px;
    text-align:center;
    margin-top:20px;
    font-size:18px;
}
</style>
</head>

<body>

<header>
    <h1>🚀 POLYDEV</h1>
    <p>Leia • Entenda • Execute seu código</p>
</header>

<div class="container">

    <div class="desc">
        Plataforma de aprendizado focada em código real.<br>
        Explore conteúdos de Python, SQL, APIs e muito mais.
    </div>

    <div class="box">
        <h2>Entrar no Sistema</h2>

        <input type="text" id="nome" placeholder="Seu nome">
        <input type="email" id="email" placeholder="Seu email">
        <input type="text" id="celular" placeholder="Seu celular">

        <button onclick="entrar()">Acessar</button>
    </div>

</div>

<script>
const usuario = localStorage.getItem("polydev_usuario");

if (usuario) {
    window.location.href = "home.html";
}

async function entrar(){

    const nome = document.getElementById("nome").value.trim();
    const email = document.getElementById("email").value.trim();
    const celular = document.getElementById("celular").value.trim();

    if(nome === "" || email === "" || celular === ""){
        alert("Preencha todos os campos.");
        return;
    }

    try{

        const { data: existe, error: erroBusca } = await db
            .from("cadastros")
            .select("id,email")
            .eq("email", email);

        if (erroBusca) {
            alert("Erro: " + erroBusca.message);
            return;
        }

        if (existe.length === 0) {

            const { error: erroInsert } = await db
                .from("cadastros")
                .insert([
                    {
                        nome: nome,
                        email: email,
                        celular: celular
                    }
                ]);

            if (erroInsert) {
                alert("Erro: " + erroInsert.message);
                return;
            }
        }

        localStorage.setItem("polydev_usuario", email);
        window.location.href = "home.html";

    } catch(e){
        alert("Erro inesperado: " + e.message);
    }
}
</script>

</body>
</html>
