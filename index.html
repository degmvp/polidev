<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>POLYDEV | Entrada</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
</head>

<body>

<h2>Entrada POLYDEV</h2>

<input type="text" id="nome" placeholder="Nome"><br><br>
<input type="email" id="email" placeholder="Email"><br><br>
<input type="text" id="telefone" placeholder="WhatsApp / Celular"><br><br>

<button onclick="entrar()">Entrar</button>

<script>
const usuario = localStorage.getItem("polydev_usuario");

if (usuario) {
    window.location.href = "conteudos.html";
}

async function entrar() {

    const nome = document.getElementById("nome").value.trim();
    const email = document.getElementById("email").value.trim();
    const telefone = document.getElementById("telefone").value.trim();

    if (nome === "" || email === "" || telefone === "") {
        alert("Preencha nome, email e celular.");
        return;
    }

    try {

        const { data: existe, error: erroBusca } = await db
            .from("cadastros")
            .select("id,email")
            .eq("email", email);

        if (erroBusca) {
            alert("Erro ao verificar cadastro: " + erroBusca.message);
            return;
        }

        if (existe.length === 0) {

            const { error: erroInsert } = await db
                .from("cadastros")
                .insert([
                    {
                        nome: nome,
                        email: email,
                        telefone: telefone
                    }
                ]);

            if (erroInsert) {
                alert("Erro ao cadastrar: " + erroInsert.message);
                return;
            }
        }

        localStorage.setItem("polydev_usuario", email);

        window.location.href = "conteudos.html";

    } catch (e) {
        alert("Erro inesperado: " + e.message);
    }
}
</script>

</body>
</html>
