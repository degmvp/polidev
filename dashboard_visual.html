<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>POLYDEV | Dashboard Visual</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:yellowgreen;color:black;}
header{background:black;color:#FFD700;text-align:center;padding:25px;}
.container{max-width:1100px;margin:25px auto;padding:20px;}
.card{background:black;color:white;border-radius:14px;padding:20px;margin-bottom:25px;}
h2{color:#FFD700;text-align:center;}
.box{background:#111;border:2px solid yellowgreen;border-radius:12px;padding:20px;text-align:center;}
.resumo{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;}
.numero{font-size:38px;color:#FFD700;font-weight:bold;}
canvas{background:white;border-radius:12px;padding:15px;}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{border:1px solid yellowgreen;padding:10px;}
th{background:#222;color:#FFD700;}
button{background:black;color:#FFD700;border:2px solid #FFD700;padding:12px 20px;border-radius:8px;font-weight:bold;cursor:pointer;}
.erro{background:#300;color:#fff;border:2px solid red;padding:15px;border-radius:10px;margin:15px 0;}
.ok{background:#063;color:white;padding:12px;border-radius:10px;margin:15px 0;}
</style>
</head>

<body>

<header>
    <h1>📊 POLYDEV Dashboard Visual</h1>
    <p>Leia • Entenda • Execute seu código</p>
</header>

<div class="container">

<button onclick="location.href='index.html'">⬅ Voltar</button>

<div id="status" class="ok">Carregando dados do Supabase...</div>

<div class="card">
    <h2>Resumo Geral</h2>
    <div class="resumo">
        <div class="box">
            <div>Total de Conteúdos</div>
            <div class="numero" id="totalConteudos">0</div>
        </div>
        <div class="box">
            <div>Total de Downloads</div>
            <div class="numero" id="totalDownloads">0</div>
        </div>
        <div class="box">
            <div>Categorias</div>
            <div class="numero" id="totalCategorias">0</div>
        </div>
    </div>
</div>

<div class="card">
    <h2>Downloads por Categoria</h2>
    <canvas id="graficoCategorias"></canvas>
</div>

<div class="card">
    <h2>Top Conteúdos</h2>
    <canvas id="graficoTop"></canvas>
</div>

<div class="card">
    <h2>Tabela Geral</h2>
    <table>
        <thead>
            <tr>
                <th>Categoria</th>
                <th>Total Downloads</th>
            </tr>
        </thead>
        <tbody id="tabelaCategorias"></tbody>
    </table>
</div>

</div>

<script>
const statusBox = document.getElementById("status");

function mostrarErro(msg, erro){
    statusBox.className = "erro";
    statusBox.innerHTML = "<b>Erro:</b> " + msg;
    console.error(msg, erro || "");
}

function mostrarOk(msg){
    statusBox.className = "ok";
    statusBox.innerHTML = msg;
}

if(typeof SUPABASE_URL === "undefined" || typeof SUPABASE_KEY === "undefined"){
    mostrarErro("config.js não carregou SUPABASE_URL ou SUPABASE_KEY.");
} else if(typeof supabase === "undefined"){
    mostrarErro("Biblioteca Supabase não carregou.");
} else {
    iniciar();
}

async function iniciar(){

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    const { data, error } = await db
        .from("conteudos")
        .select("id,titulo,categoria,downloads")
        .order("downloads", { ascending:false });

    if(error){
        mostrarErro(error.message, error);
        return;
    }

    console.log("DADOS RECEBIDOS:", data);

    if(!data || data.length === 0){
        mostrarErro("Consulta executou, mas retornou zero registros.");
        return;
    }

    mostrarOk("Dashboard atualizado com sucesso: " + data.length + " registros.");

    let totalConteudos = data.length;
    let totalDownloads = data.reduce((soma,item) => soma + Number(item.downloads || 0), 0);

    let categorias = {};

    data.forEach(item => {
        let cat = item.categoria || "sem categoria";
        categorias[cat] = (categorias[cat] || 0) + Number(item.downloads || 0);
    });

    let labelsCategorias = Object.keys(categorias);
    let valoresCategorias = Object.values(categorias);

    document.getElementById("totalConteudos").innerText = totalConteudos;
    document.getElementById("totalDownloads").innerText = totalDownloads;
    document.getElementById("totalCategorias").innerText = labelsCategorias.length;

    montarTabela(labelsCategorias, valoresCategorias);
    montarGraficoCategorias(labelsCategorias, valoresCategorias);
    montarGraficoTop(data.slice(0,10));
}

function montarTabela(labels, valores){
    const tbody = document.getElementById("tabelaCategorias");
    tbody.innerHTML = "";

    labels.forEach((label, i) => {
        tbody.innerHTML += `
        <tr>
            <td>${label}</td>
            <td>${valores[i]}</td>
        </tr>`;
    });
}

function montarGraficoCategorias(labels, valores){
    new Chart(document.getElementById("graficoCategorias"), {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Downloads",
                data: valores
            }]
        },
        options: {
            responsive:true,
            scales:{
                y:{beginAtZero:true}
            }
        }
    });
}

function montarGraficoTop(lista){
    new Chart(document.getElementById("graficoTop"), {
        type: "bar",
        data: {
            labels: lista.map(x => x.titulo),
            datasets: [{
                label: "Downloads",
                data: lista.map(x => Number(x.downloads || 0))
            }]
        },
        options: {
            indexAxis:"y",
            responsive:true,
            scales:{
                x:{beginAtZero:true}
            }
        }
    });
}
</script>

</body>
</html>
