<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POLYDEV | C# VWCS
    ,
</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#000;
    color:#FFD700;
}

header{
    text-align:center;
    padding:24px;
    border-bottom:3px solid #FFD700;
}

header h1{
    margin:0;
    font-size:38px;
}

header p{
    color:yellowgreen;
    font-weight:bold;
}

.container{
    display:flex;
    gap:20px;
    padding:20px;
}

.menu{
    width:30%;
    background:#111;
    border:2px solid #FFD700;
    border-radius:12px;
    padding:15px;
    max-height:80vh;
    overflow:auto;
}

.viewer{
    width:70%;
    background:#111;
    border:2px solid yellowgreen;
    border-radius:12px;
    padding:15px;
}

button{
    width:100%;
    margin:6px 0;
    padding:12px;
    background:#FFD700;
    color:#000;
    border:0;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:yellowgreen;
}

.acoes{
    display:flex;
    gap:10px;
    margin-bottom:12px;
    flex-wrap:wrap;
}

.acoes button{
    width:auto;
    min-width:150px;
}

pre{
    background:#000;
    color:white;
    padding:18px;
    border-radius:10px;
    min-height:430px;
    overflow:auto;
    border:1px solid #FFD700;
    text-align:left;
}

#tituloArquivo{
    color:yellowgreen;
}

.desc{
    color:white;
    margin-top:-5px;
}

@media(max-width:800px){
    .container{
        flex-direction:column;
    }

    .menu,
    .viewer{
        width:100%;
    }

    .acoes{
        flex-direction:column;
    }

    .acoes button{
        width:100%;
    }
}
</style>
</head>

<body>

<header>
    <h1>💻 POLYDEV TSQL VWTSQL </h1>
    <p>Leia • Entenda • Execute seu código</p>
</header>

<div class="container">

    <aside class="menu">
        <h2>Programas TSQL VWTSQL</h2>
        <div id="listaProgramas">Carregando programas...</div>
    </aside>

    <main class="viewer">
        <h2 id="tituloArquivo">Selecione um programa TSQL</h2>
        <p class="desc" id="descricaoArquivo"></p>

        <div class="acoes">
            <button onclick="baixar()">⬇ Download</button>
            <button onclick="location.href='home.html'">🏠 Home</button>
        </div>

        <pre id="codigo">// selecione um programa TSQL no menu lateral</pre>
    </main>

</div>

<script>
let itemAtual = null;
let listaItens = [];

function normalizarUrl(url){
    if(!url) return "";

    if(url.startsWith("http://") || url.startsWith("https://")){
        return url;
    }

if(url.startsWith("/")){
    return "https://degmvp.github.io/polidev" + url;
}

return "https://degmvp.github.io/polidev/" + url;

}
async function carregarProgramas(){
    const lista = document.getElementById("listaProgramas");
    lista.innerHTML = "Carregando programas TSQL...";

    const { data, error } = await db
        .from("conteudos")
        .select("id,titulo,descricao,categoria,arquivo_url,downloads")
        .eq("categoria", "tsql")
        .order("titulo", { ascending:true });

    if(error){
        lista.innerHTML = "Erro ao consultar o banco.";
        document.getElementById("codigo").innerText = error.message;
        return;
    }

    if(!data || data.length === 0){
        lista.innerHTML = "Nenhum programa TSQL encontrado na categoria tsql.";
        return;
    }

    listaItens = data;
    lista.innerHTML = "";

    data.forEach(item => {
        const btn = document.createElement("button");
        btn.innerText = item.titulo || item.arquivo_url || "Programa TSQL";
        btn.onclick = () => exibirPrograma(item);
        lista.appendChild(btn);
    });

    exibirPrograma(data[0]);
}

async function exibirPrograma(item){
    itemAtual = item;

    const titulo = item.titulo || "Programa TSQL";
    const url = normalizarUrl(item.arquivo_url);

    document.getElementById("tituloArquivo").innerText = titulo;
    document.getElementById("descricaoArquivo").innerText = item.descricao || "";
    document.getElementById("codigo").innerText = "Carregando código...";

    try{
        const resposta = await fetch(url + "?v=" + Date.now());

        if(!resposta.ok){
            throw new Error("HTTP " + resposta.status);
        }

        const texto = await resposta.text();
        document.getElementById("codigo").innerText = texto;

    }catch(e){
        document.getElementById("codigo").innerText =
            "Erro ao abrir:\n" + url + "\n\n" + e.message;
    }
}

async function incrementarDownload(item){
    const atual = Number(item.downloads || 0);
    const novoTotal = atual + 1;

    const { error } = await db
        .from("conteudos")
        .update({ downloads: novoTotal })
        .eq("id", item.id);

    if(!error){
        item.downloads = novoTotal;
    }
}

async function baixar(){
    if(!itemAtual){
        alert("Selecione primeiro um programa TSQL.");
        return;
    }

    const url = normalizarUrl(itemAtual.arquivo_url);

    await incrementarDownload(itemAtual);

    const link = document.createElement("a");
    link.href = url;
    link.download = url.split("/").pop();
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

carregarProgramas();
</script>

</body>
</html>
