<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Buscar Conteúdos</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h2>Buscar por linguagem</h2>

<input type="text" id="ling">
<button onclick="buscar()">Buscar</button>

<table border="1">
<thead>
<tr>
<th>Título</th>
<th>Linguagem</th>
<th>Tipo</th>
<th>Download</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>

<script>

const { createClient } = supabase

const db = createClient(
"https://vdpucrilxzlnxxnaohdh.supabase.co",
"SUA_CHAVE"
)

async function buscar(){

let linguagem = document.getElementById("ling").value

const { data, error } = await db
.from("conteudos")
.select("*")
.eq("linguagem", linguagem)

let tabela = document.getElementById("tabela")
tabela.innerHTML = ""

data.forEach(item => {
tabela.innerHTML += `
<tr>
<td>${item.titulo}</td>
<td>${item.linguagem}</td>
<td>${item.tipo}</td>
<td><a href="${item.arquivo_url}" target="_blank">Download</a></td>
</tr>
`
})

}

</script>

</body>
</html>
