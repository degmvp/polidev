<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Buscar Conteúdos</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
</head>

<body>

<h2>Buscar por categoria</h2>

<input type="text" id="ling">
<button onclick="buscar()">Buscar</button>

<table border="1">
<thead>
<tr>
<th>Título</th>
<th>Categoria</th>
<th>Tipo</th>
<th>Download</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>

<script>

async function buscar(){

let linguagem = document.getElementById("ling").value
let texto = document.getElementById("busca").value

let query = db.from("conteudos").select("*")

if(linguagem){
  query = query.eq("categoria", linguagem)
}

if(texto){
  query = query.ilike("titulo", "%" + texto + "%")
}

const { data, error } = await query

}

</script>
<script>
async function baixar(id, url) {

    const { data: item } = await db
        .from("conteudos")
        .select("downloads")
        .eq("id", id)
        .single()

    let total = item.downloads + 1

    await db
        .from("conteudos")
        .update({ downloads: total })
        .eq("id", id)

    window.open(url, "_blank")
}
</script>
</body>
</html>
